<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XMR BATTLE 2.5D</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
        }
        #container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            width: 90%;
            max-width: 640px;
            padding: 18px 28px 22px;
            background: rgba(10, 14, 30, 0.55);
            backdrop-filter: blur(14px) saturate(1.4);
            -webkit-backdrop-filter: blur(14px) saturate(1.4);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), inset 0 0 40px rgba(255, 255, 255, 0.03);
            text-align: center;
            user-select: none;
            pointer-events: none;
            font-family: 'Rajdhani', sans-serif;
        }
        #hud::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 26px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(100, 200, 255, 0.2), rgba(255, 100, 100, 0.2));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        #hud::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.08) 0%, transparent 100%);
            border-radius: 24px 24px 0 0;
            pointer-events: none;
        }
        .hud-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 22px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.4), 0 0 60px rgba(255, 215, 0, 0.2);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .hud-title .icon { font-size: 26px; filter: drop-shadow(0 0 8px rgba(255, 200, 50, 0.6)); }
        .hud-price-row {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 14px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .hud-price {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 34px;
            color: #f0e6d0;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.25), 0 0 60px rgba(255, 215, 0, 0.1);
            letter-spacing: 1px;
        }
        .hud-price .currency { font-size: 20px; color: #aaa; margin-right: 4px; }
        .hud-trend {
            font-size: 22px;
            font-weight: 700;
            padding: 2px 12px;
            border-radius: 40px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .hud-trend.up { color: #4caf50; text-shadow: 0 0 20px rgba(76, 175, 80, 0.5); }
        .hud-trend.down { color: #f44336; text-shadow: 0 0 20px rgba(244, 67, 54, 0.5); }
        .hud-trend.stable { color: #ffaa00; text-shadow: 0 0 20px rgba(255, 170, 0, 0.4); }
        .hud-progress-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 6px 0 10px;
        }
        .hud-progress-label {
            font-weight: 600;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
            min-width: 44px;
        }
        .hud-progress-track {
            flex: 1;
            height: 12px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.4);
        }
        .hud-progress-fill {
            height: 100%;
            position: absolute;
            top: 0;
            transition: width 0.35s ease;
            border-radius: 20px;
        }
        .hud-progress-fill.green {
            background: linear-gradient(90deg, #2e7d32, #4caf50);
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.3);
            left: 0;
        }
        .hud-progress-fill.red {
            background: linear-gradient(90deg, #f44336, #8b1a1a);
            box-shadow: 0 0 20px rgba(244, 67, 54, 0.3);
            left: auto;
            right: 0;
        }
        .hud-progress-divider {
            position: absolute;
            left: 50%;
            top: 0;
            height: 100%;
            width: 2px;
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(-50%);
            z-index: 2;
        }
        .hud-armies {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 600;
            font-size: 18px;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            margin-top: 2px;
            flex-wrap: wrap;
        }
        .hud-armies .army { display: flex; align-items: center; gap: 6px; }
        .hud-armies .army.green { color: #81c784; }
        .hud-armies .army.red { color: #ef9a9a; }
        .hud-armies .army .count {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 24px;
            min-width: 30px;
            display: inline-block;
        }
        .hud-armies .vs { font-size: 16px; color: rgba(255, 255, 255, 0.25); font-weight: 700; letter-spacing: 1px; padding: 0 4px; }
        .hud-armies .army .label { font-size: 14px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; }
        .hud-variation {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 4px;
            letter-spacing: 0.5px;
            font-weight: 500;
        }
        @media (max-width: 600px) {
            #hud { top: 12px; padding: 12px 16px 16px; max-width: 98%; border-radius: 18px; }
            .hud-title { font-size: 16px; gap: 6px; }
            .hud-title .icon { font-size: 20px; }
            .hud-price { font-size: 26px; }
            .hud-price .currency { font-size: 16px; }
            .hud-trend { font-size: 18px; padding: 0 10px; }
            .hud-armies { font-size: 15px; gap: 8px; }
            .hud-armies .army .count { font-size: 20px; }
            .hud-armies .army .label { font-size: 12px; }
            .hud-progress-label { font-size: 11px; min-width: 30px; }
            .hud-progress-track { height: 10px; }
        }
        @media (max-width: 400px) {
            .hud-price { font-size: 20px; }
            .hud-armies { font-size: 13px; }
            .hud-armies .army .count { font-size: 17px; }
        }
    </style>
</head>
<body>

    <div id="container"></div>

    <!-- HUD -->
    <div id="hud">
        <div class="hud-title">
            <span class="icon">⚔️</span>
            <span>XMR BATTLE 2.5D</span>
        </div>
        <div class="hud-price-row">
            <span class="hud-price"><span class="currency">$</span><span id="priceDisplay">0.00</span></span>
            <span class="hud-trend" id="trendDisplay">●</span>
        </div>
        <div class="hud-progress-wrap">
            <span class="hud-progress-label">PWR</span>
            <div class="hud-progress-track">
                <div class="hud-progress-fill green" id="greenBarFill" style="width:50%"></div>
                <div class="hud-progress-fill red" id="redBarFill" style="width:50%"></div>
                <div class="hud-progress-divider"></div>
            </div>
        </div>
        <div class="hud-armies">
            <span class="army green"><span class="label">GREEN</span><span class="count" id="greenCount">0</span></span>
            <span class="vs">VS</span>
            <span class="army red"><span class="count" id="redCount">0</span><span class="label">RED</span></span>
        </div>
        <div class="hud-variation" id="variationText">Aguardando ticker...</div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>

    <script>
        // ================================================================
        // 1. CENA, CÂMERA (2.5D - lateral isométrica)
        // ================================================================
        const container = document.getElementById('container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.FogExp2(0x1a1a2e, 0.004);

        const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 250);
        camera.position.set(0, 22, 40);
        camera.lookAt(0, 1, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let cameraOffset = { x: 0, y: 0 };

        renderer.domElement.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousMousePosition.x = e.clientX;
            previousMousePosition.y = e.clientY;
        });
        renderer.domElement.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - previousMousePosition.x;
            const deltaY = e.clientY - previousMousePosition.y;
            cameraOffset.x += deltaX * 0.05;
            cameraOffset.y += deltaY * 0.05;
            cameraOffset.y = Math.max(-5, Math.min(5, cameraOffset.y));
            cameraOffset.x = Math.max(-15, Math.min(15, cameraOffset.x));
            camera.position.x = cameraOffset.x;
            camera.position.y = 22 + cameraOffset.y;
            camera.lookAt(cameraOffset.x * 0.3, 1, 0);
            previousMousePosition.x = e.clientX;
            previousMousePosition.y = e.clientY;
        });
        renderer.domElement.addEventListener('mouseup', () => { isDragging = false; });
        renderer.domElement.addEventListener('mouseleave', () => { isDragging = false; });

        renderer.domElement.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoom = e.deltaY * 0.02;
            const newZ = camera.position.z + zoom;
            camera.position.z = Math.max(15, Math.min(80, newZ));
            camera.lookAt(cameraOffset.x * 0.3, 1, 0);
        }, { passive: false });

        // ================================================================
        // 2. LUZES
        // ================================================================
        const ambientLight = new THREE.AmbientLight(0x404060, 0.4);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.8);
        sunLight.position.set(10, 35, 25);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 100;
        sunLight.shadow.camera.left = -50;
        sunLight.shadow.camera.right = 50;
        sunLight.shadow.camera.top = 50;
        sunLight.shadow.camera.bottom = -50;
        scene.add(sunLight);

        const fillLight = new THREE.DirectionalLight(0x8888ff, 0.3);
        fillLight.position.set(-20, 15, -15);
        scene.add(fillLight);

        const rimLight = new THREE.DirectionalLight(0xffaa66, 0.4);
        rimLight.position.set(-10, 10, -25);
        scene.add(rimLight);

        const crystalLight = new THREE.PointLight(0xff8800, 0.8, 30);
        crystalLight.position.set(0, 3, 0);
        scene.add(crystalLight);

        // ================================================================
        // 3. CÉU DINÂMICO
        // ================================================================
        const skyGeo = new THREE.SphereGeometry(120, 32, 32);
        const skyMat = new THREE.ShaderMaterial({
            side: THREE.BackSide,
            uniforms: {
                topColor: { value: new THREE.Color(0x0a0a2a) },
                bottomColor: { value: new THREE.Color(0x2a1a0a) },
                offset: { value: 30 },
                exponent: { value: 0.3 }
            },
            vertexShader: `
                varying vec3 vWorldPosition;
                void main() {
                    vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                    vWorldPosition = worldPosition.xyz;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform vec3 topColor;
                uniform vec3 bottomColor;
                uniform float offset;
                uniform float exponent;
                varying vec3 vWorldPosition;
                void main() {
                    float h = normalize(vWorldPosition + offset).y;
                    gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h, 0.0), exponent), 0.0)), 1.0);
                }
            `
        });
        const sky = new THREE.Mesh(skyGeo, skyMat);
        sky.position.y = 10;
        scene.add(sky);

        function createCloudTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            gradient.addColorStop(0, 'rgba(255,255,255,0.8)');
            gradient.addColorStop(0.4, 'rgba(255,255,255,0.5)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 128, 128);
            return new THREE.CanvasTexture(canvas);
        }
        const cloudTex = createCloudTexture();
        const clouds = [];
        for (let i = 0; i < 30; i++) {
            const mat = new THREE.SpriteMaterial({
                map: cloudTex,
                transparent: true,
                opacity: 0.2 + Math.random() * 0.4,
                color: new THREE.Color(0xffddbb),
                depthWrite: false
            });
            const cloud = new THREE.Sprite(mat);
            const scale = 15 + Math.random() * 30;
            cloud.scale.set(scale, scale * 0.4, 1);
            cloud.position.set(
                (Math.random() - 0.5) * 120,
                18 + Math.random() * 20,
                (Math.random() - 0.5) * 80 - 20
            );
            scene.add(cloud);
            clouds.push(cloud);
        }

        // ================================================================
        // 4. VALE 2.5D
        // ================================================================
        const VALLEYSIZE = 60;
        const SEG = 120;

        function getTerrainHeight(x, z) {
            const distCenter = Math.abs(x);
            const valley = Math.max(0, 2.5 * (1 - distCenter / 14));
            const base = 0.2 * Math.sin(x * 0.05) * Math.cos(z * 0.07) + 0.15 * Math.sin(x * 0.1 + z * 0.08);
            const mountain = 0;
            const fortGreen = (x > -17 && x < -6 && z > -5 && z < 5) ? 1.8 : 0;
            const fortRed = (x > 6 && x < 17 && z > -5 && z < 5) ? 1.8 : 0;
            return base + valley * 0.6 + mountain + fortGreen + fortRed;
        }

        const geo = new THREE.PlaneGeometry(VALLEYSIZE, VALLEYSIZE, SEG, SEG);
        geo.rotateX(-Math.PI / 2);
        const posAttr = geo.attributes.position;
        const vertex = new THREE.Vector3();
        const colors = [];

        function getTerrainColor(x, z, h) {
            const isLava = Math.abs(x) < 2.0;
            if (isLava) {
                const pulse = 0.7 + 0.3 * Math.sin(z * 0.3 + performance.now() * 0.001);
                return { r: 1.0, g: 0.3 * pulse, b: 0.0 };
            }
            const noise = Math.sin(x * 0.15) * Math.cos(z * 0.12) + Math.sin(x * 0.3 + z * 0.2) * 0.5;
            const value = (noise + 0.5) / 2;
            let r = 0.15 + value * 0.2,
                g = 0.30 + value * 0.3,
                b = 0.05 + value * 0.1;
            if ((x > -17 && x < -6 && z > -5 && z < 5) || (x > 6 && x < 17 && z > -5 && z < 5)) {
                r = 0.5;
                g = 0.45;
                b = 0.3;
            }
            if (Math.abs(x) > 1.8 && Math.abs(x) < 3.0) {
                r *= 0.6;
                g *= 0.6;
                b *= 0.6;
            }
            return { r: Math.min(1, r), g: Math.min(1, g), b: Math.min(1, b) };
        }

        for (let i = 0; i < posAttr.count; i++) {
            vertex.x = posAttr.getX(i);
            vertex.z = posAttr.getZ(i);
            const h = getTerrainHeight(vertex.x, vertex.z);
            vertex.y = h;
            posAttr.setXYZ(i, vertex.x, vertex.y, vertex.z);
            const col = getTerrainColor(vertex.x, vertex.z, h);
            colors.push(col.r, col.g, col.b);
        }
        geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        geo.computeVertexNormals();

        const terrainMat = new THREE.MeshStandardMaterial({
            vertexColors: true,
            roughness: 0.9,
            metalness: 0.0,
            flatShading: false,
            side: THREE.DoubleSide,
        });
        const terrain = new THREE.Mesh(geo, terrainMat);
        terrain.receiveShadow = true;
        terrain.castShadow = true;
        terrain.position.y = -0.2;
        scene.add(terrain);

        // ================================================================
        // 5. RIO DE LAVA
        // ================================================================
        function createGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.3, 'rgba(255,200,100,0.8)');
            gradient.addColorStop(1, 'rgba(255,100,0,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 128, 128);
            return new THREE.CanvasTexture(canvas);
        }

        function createLavaRiver() {
            const group = new THREE.Group();
            const lavaGeo = new THREE.PlaneGeometry(3.5, 60, 1, 80);
            lavaGeo.rotateX(-Math.PI / 2);
            const lavaMat = new THREE.MeshBasicMaterial({
                color: 0xff4400,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide
            });
            const lavaMesh = new THREE.Mesh(lavaGeo, lavaMat);
            lavaMesh.position.set(0, 0.05, 0);
            group.add(lavaMesh);

            const particleCount = 200;
            const positions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 3;
                positions[i * 3 + 1] = 0.1 + Math.random() * 0.5;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 55;
            }
            const pGeo = new THREE.BufferGeometry();
            pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const pMat = new THREE.PointsMaterial({
                color: 0xff8800,
                size: 0.2,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            });
            const particles = new THREE.Points(pGeo, pMat);
            group.add(particles);

            const glowMat = new THREE.SpriteMaterial({
                map: createGlowTexture(),
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                color: 0xff4400,
                transparent: true,
                opacity: 0.3
            });
            const glow = new THREE.Sprite(glowMat);
            glow.scale.set(4, 25, 1);
            glow.position.set(0, 0.2, 0);
            group.add(glow);

            scene.add(group);
            return { group, particles, lavaMesh, glow };
        }

        const lavaRiver = createLavaRiver();

        // ================================================================
        // 6. FORTALEZAS
        // ================================================================
        function createFortress(x, z, color, flagColor) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.7, metalness: 0.2 });

            const base = new THREE.Mesh(new THREE.BoxGeometry(6, 0.8, 4.5), mat);
            base.position.set(0, 0.4, 0);
            base.castShadow = true;
            base.receiveShadow = true;
            group.add(base);

            const wallMat = new THREE.MeshStandardMaterial({ color: 0x8a7a5a, roughness: 0.8 });
            for (let i = -1; i <= 1; i += 2) {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(5.5, 1.2, 0.4), wallMat);
                wall.position.set(0, 1.0, i * 2.2);
                wall.castShadow = true;
                wall.receiveShadow = true;
                group.add(wall);
            }
            for (let i = -1; i <= 1; i += 2) {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.2, 4.2), wallMat);
                wall.position.set(i * 2.8, 1.0, 0);
                wall.castShadow = true;
                wall.receiveShadow = true;
                group.add(wall);
            }

            const towerMat = new THREE.MeshStandardMaterial({ color: 0x7a6a4a, roughness: 0.7 });
            const tPos = [
                [-2.5, -2.0],
                [-2.5, 2.0],
                [2.5, -2.0],
                [2.5, 2.0]
            ];
            for (const [tx, tz] of tPos) {
                const tower = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.8, 1.8, 8), towerMat);
                tower.position.set(tx, 1.4, tz);
                tower.castShadow = true;
                tower.receiveShadow = true;
                group.add(tower);
                const roof = new THREE.Mesh(new THREE.ConeGeometry(0.8, 0.6, 8),
                    new THREE.MeshStandardMaterial({ color: 0x5a3a2a, roughness: 0.8 }));
                roof.position.set(tx, 2.5, tz);
                roof.castShadow = true;
                group.add(roof);
            }

            const gateMat = new THREE.MeshStandardMaterial({ color: 0x4a3a2a, roughness: 0.9 });
            const gate = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.2, 0.3), gateMat);
            gate.position.set(0, 0.8, 2.4);
            group.add(gate);

            const poleMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1.8), poleMat);
            pole.position.set(0, 2.6, 0);
            pole.castShadow = true;
            group.add(pole);

            const flagMat = new THREE.MeshStandardMaterial({
                color: flagColor,
                emissive: flagColor,
                emissiveIntensity: 0.2,
                side: THREE.DoubleSide
            });
            const flag = new THREE.Mesh(new THREE.PlaneGeometry(0.7, 0.4), flagMat);
            flag.position.set(0.5, 3.0, 0);
            flag.rotation.y = -0.2;
            flag.castShadow = true;
            flag.userData.isFlag = true;
            group.add(flag);

            const y = getTerrainHeight(x, z);
            group.position.set(x, y, z);
            group.rotation.y = x < 0 ? 0 : Math.PI;

            group.userData.flag = flag;
            return group;
        }

        // --- Sistema de áudio (som de tiro) ---
        let audioCtx = null;
        let audioEnabled = true;

        function initAudio() {
            if (!audioCtx) {
                try {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                } catch (e) { /* sem áudio */ }
            }
        }

        function playGunshot() {
            if (!audioCtx || !audioEnabled) return;
            try {
                const now = audioCtx.currentTime;
                // Ruído branco filtrado
                const bufferSize = audioCtx.sampleRate * 0.08;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.25));
                }
                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.35, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 1200 + Math.random() * 400;
                filter.Q.value = 1.4;
                source.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                source.start(now);
                source.stop(now + 0.07);
                // Clique metálico
                const osc = audioCtx.createOscillator();
                osc.type = 'square';
                osc.frequency.value = 180 + Math.random() * 60;
                const g2 = audioCtx.createGain();
                g2.gain.setValueAtTime(0.08, now);
                g2.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
                osc.connect(g2);
                g2.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 0.04);
            } catch (e) { /* ignora */ }
        }

        // ================================================================
        // 10.1 CLASSE SOLDIER
        // ================================================================
        class Soldier {
            constructor(side, spawnPosition) {
                this.side = side;
                this.alive = true;
                this.collisionRadius = 0.35;
                this.state = 'idle';
                this.deathTimer = 0;
                this.deathDuration = 2.0;
                this.walkCycle = 0;

                this.baseMaxHealth = 100;
                this.baseDamage = 20;
                this.maxHealth = this.baseMaxHealth;
                this.health = this.maxHealth;
                this.damage = this.baseDamage;

                this.group = this.createModel();
                const pos = spawnPosition ? spawnPosition.clone() : getTentDoorPosition(side);
                this.group.position.copy(pos);
                scene.add(this.group);

                this.speed = 0.8 + Math.random() * 0.5;
                this.walkSpeed = this.speed * 0.7;
                this.runSpeed = this.speed * 1.4;
                this.retreatSpeed = this.speed * 0.6;

                this.targetPos = getRandomCombatPosition(side);
                const dir = new THREE.Vector3().subVectors(this.targetPos, pos);
                if (dir.length() > 0.1) {
                    this.group.rotation.y = Math.atan2(dir.x, dir.z);
                }

                this.lastShot = 0;
                this.shootInterval = 0.8 + Math.random() * 1.2;
                this.wanderAngle = Math.random() * Math.PI * 2;
                this.wanderTimer = 0;
                this.wanderInterval = 1.0 + Math.random() * 1.5;
                this.enemyTarget = null;
                this.targetSearchTimer = 0;

                this.leftLeg = null;
                this.rightLeg = null;
                this.leftArm = null;
                this.rightArm = null;
                this.rifleGroup = null;
                this.shield = null;
                this.bodyGroup = null;

                this.group.children.forEach(child => {
                    if (child.userData.part === 'leftLeg') this.leftLeg = child;
                    if (child.userData.part === 'rightLeg') this.rightLeg = child;
                    if (child.userData.part === 'leftArm') this.leftArm = child;
                    if (child.userData.part === 'rightArm') this.rightArm = child;
                    if (child.userData.part === 'rifle') this.rifleGroup = child;
                    if (child.userData.part === 'shield') this.shield = child;
                    if (child.userData.part === 'body') this.bodyGroup = child;
                });

                this.stateTimer = 0;
                this.recalculateStats(currentVariation);
            }

            recalculateStats(variation) {
                const healthBonus = (this.side === 'green' ? 1 : -1) * variation * 2.0;
                const damageBonus = (this.side === 'green' ? 1 : -1) * variation * 0.8;
                this.maxHealth = Math.max(20, this.baseMaxHealth + healthBonus);
                if (this.health > this.maxHealth) this.health = this.maxHealth;
                if (this.health < 0) this.health = 0;
                this.damage = Math.max(5, this.baseDamage + damageBonus);
                const baseInterval = 0.8 + Math.random() * 1.2;
                const rateFactor = (this.side === 'green' ? 1 : -1) * variation * 0.02;
                const adjusted = baseInterval * (1 - rateFactor);
                this.shootInterval = Math.max(0.3, Math.min(2.5, adjusted));
            }

            updateAnimations(delta, isMoving) {
                if (this.state === 'dying') return;
                const speedFactor = this.state === 'running' ? 1.8 :
                    (this.state === 'walking' ? 1.0 :
                        (this.state === 'retreating' ? 1.2 : 0.5));
                const amplitude = this.state === 'running' ? 0.7 :
                    (this.state === 'walking' ? 0.4 :
                        (this.state === 'retreating' ? 0.4 : 0.1));
                const leanTarget = this.state === 'running' ? 0.15 :
                    (this.state === 'retreating' ? -0.05 : 0);

                if (isMoving) {
                    this.walkCycle += delta * speedFactor * 5.0;
                } else {
                    this.walkCycle += delta * 0.5;
                }

                const swing = Math.sin(this.walkCycle) * amplitude;

                if (this.leftLeg) {
                    this.leftLeg.rotation.x = swing;
                    this.leftLeg.rotation.z = 0.05;
                }
                if (this.rightLeg) {
                    this.rightLeg.rotation.x = -swing;
                    this.rightLeg.rotation.z = -0.05;
                }

                if (this.leftArm) {
                    this.leftArm.rotation.x = -swing * 0.6;
                    this.leftArm.rotation.z = 0.2 + swing * 0.1;
                }
                if (this.rightArm) {
                    this.rightArm.rotation.x = swing * 0.6;
                    this.rightArm.rotation.z = -0.2 - swing * 0.1;
                }

                if (this.bodyGroup) {
                    this.bodyGroup.rotation.x += (leanTarget - this.bodyGroup.rotation.x) * 0.1;
                }

                if (this.rifleGroup) {
                    const aimTarget = (this.state === 'aiming' || this.state === 'shooting') ? -0.6 : 0;
                    this.rifleGroup.rotation.x += (aimTarget - this.rifleGroup.rotation.x) * 0.1;
                    const yTarget = (this.state === 'aiming' || this.state === 'shooting') ? 0.04 * 0.65 : 0;
                    this.rifleGroup.position.y += (yTarget - this.rifleGroup.position.y) * 0.1;
                }

                if (this.state === 'shooting') {
                    if (this.rifleGroup) {
                        this.rifleGroup.position.z = 0.08 * 0.65 + 0.03 * 0.65;
                        this.rifleGroup.rotation.x -= 0.1;
                    }
                    if (this.bodyGroup) {
                        this.bodyGroup.position.z = -0.02;
                    }
                } else {
                    if (this.rifleGroup) {
                        this.rifleGroup.position.z += (0.08 * 0.65 - this.rifleGroup.position.z) * 0.1;
                    }
                    if (this.bodyGroup) {
                        this.bodyGroup.position.z += (0 - this.bodyGroup.position.z) * 0.1;
                    }
                }
            }

            triggerShoot() {
                this.state = 'shooting';
                this.stateTimer = 0.2;
                // Toca som
                initAudio();
                playGunshot();
                setTimeout(() => {
                    if (this.state === 'shooting') {
                        this.state = 'idle';
                    }
                }, 200);
            }

            takeDamage(amount) {
                if (!this.alive) return;
                this.health -= amount;
                if (this.health <= 0) {
                    this.health = 0;
                    this.die();
                }
            }

            die() {
                if (!this.alive) return;
                this.alive = false;
                this.state = 'dying';
                this.deathTimer = 0;
                const fall = () => {
                    const dt = 0.016;
                    this.deathTimer += dt;
                    const progress = Math.min(1, this.deathTimer / this.deathDuration);
                    const angle = progress * Math.PI * 0.5;
                    this.group.rotation.x = angle;
                    this.group.position.y -= dt * 0.5;
                    if (progress < 1) {
                        requestAnimationFrame(fall);
                    } else {
                        scene.remove(this.group);
                        setTimeout(() => {
                            const side = this.side;
                            const target = side === 'green' ? greenTargetCount : redTargetCount;
                            const alive = side === 'green' ?
                                greenSoldiers.filter(s => s.alive).length :
                                redSoldiers.filter(s => s.alive).length;
                            if (alive < target) spawnSoldierAtTent(side);
                            else if (alive < MIN_SOLDIERS) spawnSoldierAtTent(side);
                        }, 2000);
                    }
                };
                fall();
            }

            pickTarget() {
                this.targetPos = getRandomCombatPosition(this.side);
            }

            update(delta, now) {
                if (!this.alive || this.state === 'dying') return;
                const pos = this.group.position;

                if (this.stateTimer > 0) {
                    this.stateTimer -= delta;
                    if (this.stateTimer <= 0 && this.state === 'shooting') {
                        this.state = 'idle';
                    }
                }

                this.targetSearchTimer += delta;
                if (this.targetSearchTimer > 0.3) {
                    this.targetSearchTimer = 0;
                    const enemies = this.side === 'green' ? redSoldiers : greenSoldiers;
                    let closest = null,
                        minDist = Infinity;
                    for (const enemy of enemies) {
                        if (!enemy.alive) continue;
                        const d = pos.distanceTo(enemy.group.position);
                        if (d < minDist) { minDist = d;
                            closest = enemy; }
                    }
                    this.enemyTarget = closest;
                }

                const enemy = this.enemyTarget;
                let moveDir = new THREE.Vector3();
                let isMoving = false;
                let targetSpeed = 0;

                if (enemy && enemy.alive) {
                    const distToEnemy = pos.distanceTo(enemy.group.position);
                    if (distToEnemy < 1.8) {
                        this.state = 'retreating';
                        const away = new THREE.Vector3().subVectors(pos, enemy.group.position);
                        away.y = 0;
                        if (away.length() > 0.01) away.normalize();
                        else away.set(1, 0, 0);
                        moveDir.copy(away);
                        isMoving = true;
                        targetSpeed = this.retreatSpeed;
                    } else if (distToEnemy < 8.0) {
                        if (this.state !== 'shooting') {
                            this.state = 'aiming';
                        }
                        const dirToEnemy = new THREE.Vector3().subVectors(enemy.group.position, pos);
                        dirToEnemy.y = 0;
                        if (dirToEnemy.length() > 0.01) {
                            const angle = Math.atan2(dirToEnemy.x, dirToEnemy.z);
                            let currentAngle = this.group.rotation.y;
                            let diff = angle - currentAngle;
                            while (diff > Math.PI) diff -= Math.PI * 2;
                            while (diff < -Math.PI) diff += Math.PI * 2;
                            this.group.rotation.y += diff * 0.1;
                        }
                        isMoving = false;
                        targetSpeed = 0;
                        if (now - this.lastShot > this.shootInterval) {
                            this.lastShot = now;
                            this.triggerShoot();
                            shootProjectile(this, enemy);
                        }
                    } else {
                        const target = this.targetPos.clone();
                        const dirToTarget = new THREE.Vector3().subVectors(target, pos);
                        if (dirToTarget.length() > 0.5) {
                            moveDir.copy(dirToTarget);
                            isMoving = true;
                            targetSpeed = this.runSpeed;
                            this.state = 'running';
                        } else {
                            this.pickTarget();
                            this.state = 'idle';
                        }
                    }
                } else {
                    const dirToTarget = new THREE.Vector3().subVectors(this.targetPos, pos);
                    if (dirToTarget.length() > 0.5) {
                        moveDir.copy(dirToTarget);
                        isMoving = true;
                        if (dirToTarget.length() > 5) {
                            targetSpeed = this.runSpeed;
                            this.state = 'running';
                        } else {
                            targetSpeed = this.walkSpeed;
                            this.state = 'walking';
                        }
                    } else {
                        this.pickTarget();
                        this.state = 'idle';
                        isMoving = false;
                    }
                }

                if (this.state !== 'aiming' && this.state !== 'shooting' && this.state !== 'retreating') {
                    if (moveDir.length() > 0.01) {
                        const angle = Math.atan2(moveDir.x, moveDir.z);
                        let currentAngle = this.group.rotation.y;
                        let diff = angle - currentAngle;
                        while (diff > Math.PI) diff -= Math.PI * 2;
                        while (diff < -Math.PI) diff += Math.PI * 2;
                        this.group.rotation.y += diff * 0.1;
                    }
                }

                if (isMoving && moveDir.length() > 0.01) {
                    moveDir.normalize();
                    this.wanderTimer += delta;
                    if (this.wanderTimer > this.wanderInterval) {
                        this.wanderTimer = 0;
                        this.wanderAngle += (Math.random() - 0.5) * 1.0;
                    }
                    const lateral = new THREE.Vector3(-Math.sin(this.wanderAngle), 0, Math.cos(this.wanderAngle));
                    lateral.multiplyScalar(0.05 * targetSpeed * delta);
                    const finalDir = moveDir.clone().add(lateral).normalize();
                    const speed = targetSpeed * delta;
                    let newPos = pos.clone().add(finalDir.multiplyScalar(speed));

                    const zone = this.side === 'green' ? GREEN_COMBAT_ZONE : RED_COMBAT_ZONE;
                    newPos.x = Math.max(zone.xMin, Math.min(zone.xMax, newPos.x));
                    newPos.z = Math.max(zone.zMin, Math.min(zone.zMax, newPos.z));

                    newPos.y = getTerrainHeight(newPos.x, newPos.z) + 0.1;
                    this.group.position.copy(newPos);
                } else {
                    const y = getTerrainHeight(pos.x, pos.z) + 0.1;
                    if (Math.abs(pos.y - y) > 0.01) {
                        pos.y = y;
                    }
                }

                this.updateAnimations(delta, isMoving);

                if (this.state === 'aiming' && enemy && enemy.alive) {
                    const dirToEnemy = new THREE.Vector3().subVectors(enemy.group.position, pos);
                    dirToEnemy.y = 0;
                    if (dirToEnemy.length() > 0.01) {
                        const angle = Math.atan2(dirToEnemy.x, dirToEnemy.z);
                        let currentAngle = this.group.rotation.y;
                        let diff = angle - currentAngle;
                        while (diff > Math.PI) diff -= Math.PI * 2;
                        while (diff < -Math.PI) diff += Math.PI * 2;
                        this.group.rotation.y += diff * 0.1;
                    }
                }
            }
        }

        // ================================================================
        // 11. PROJÉTEIS COM RASTRO (sem partículas, sem fumaça)
        // ================================================================
        let projectiles = [];

        class Projectile {
            constructor(startPos, targetSoldier, color, speed = 28, damage = 20) {
                this.startPos = startPos.clone();
                this.targetSoldier = targetSoldier;
                this.color = color;
                this.speed = speed;
                this.damage = damage;
                this.alive = true;
                this.trail = [];
                this.trailLength = 10;

                // Esfera do projétil (menor)
                const geo = new THREE.SphereGeometry(0.07, 8, 8);
                const mat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 2.0 });
                this.mesh = new THREE.Mesh(geo, mat);
                this.mesh.position.copy(startPos);
                this.mesh.castShadow = false;
                scene.add(this.mesh);

                // Brilho pequeno
                const glowMat = new THREE.SpriteMaterial({
                    map: createGlowTexture(),
                    blending: THREE.AdditiveBlending,
                    depthWrite: false,
                });
                this.glow = new THREE.Sprite(glowMat);
                this.glow.scale.set(0.35, 0.35, 1);
                this.mesh.add(this.glow);

                // Rastro (linha com fade)
                this.trailGeo = new THREE.BufferGeometry();
                this.trailPositions = new Float32Array(this.trailLength * 3);
                this.trailGeo.setAttribute('position', new THREE.BufferAttribute(this.trailPositions, 3));
                const trailMat = new THREE.LineBasicMaterial({
                    color: color,
                    transparent: true,
                    opacity: 0.7,
                    blending: THREE.AdditiveBlending
                });
                this.trailLine = new THREE.Line(this.trailGeo, trailMat);
                scene.add(this.trailLine);

                const targetPos = targetSoldier.group.position.clone();
                this.direction = new THREE.Vector3().subVectors(targetPos, startPos).normalize();
                this.direction.x += (Math.random() - 0.5) * 0.05;
                this.direction.z += (Math.random() - 0.5) * 0.05;
                this.direction.normalize();
                this.totalDist = startPos.distanceTo(targetPos);
                this.traveled = 0;
            }

            update(delta) {
                if (!this.alive) return;
                const move = this.direction.clone().multiplyScalar(this.speed * delta);
                this.mesh.position.add(move);
                this.traveled += move.length();

                // Atualiza rastro
                this.trail.push(this.mesh.position.clone());
                if (this.trail.length > this.trailLength) this.trail.shift();
                const positions = this.trailLine.geometry.attributes.position.array;
                for (let i = 0; i < this.trailLength; i++) {
                    const idx = i * 3;
                    if (i < this.trail.length) {
                        const p = this.trail[i];
                        positions[idx] = p.x;
                        positions[idx + 1] = p.y;
                        positions[idx + 2] = p.z;
                    } else {
                        positions[idx] = this.mesh.position.x;
                        positions[idx + 1] = this.mesh.position.y;
                        positions[idx + 2] = this.mesh.position.z;
                    }
                }
                this.trailLine.geometry.attributes.position.needsUpdate = true;
                // Opacidade do rastro decai com o tempo
                const progress = this.traveled / this.totalDist;
                this.trailLine.material.opacity = Math.max(0, 0.7 * (1 - progress * 0.8));

                const pos = this.mesh.position;
                if (pos.y < 0.1) {
                    this.alive = false;
                    this.cleanup();
                    return;
                }

                const target = this.targetSoldier;
                if (target.alive && pos.distanceTo(target.group.position) < 0.7) {
                    this.alive = false;
                    this.cleanup();
                    target.takeDamage(this.damage);
                    // Pequeno flash no impacto (sem partículas)
                    flashImpact(pos.clone(), this.color);
                    return;
                }

                if (this.traveled > this.totalDist * 1.5 || pos.x > 35 || pos.x < -35 || pos.z > 30 || pos.z < -30) {
                    this.alive = false;
                    this.cleanup();
                }
            }

            cleanup() {
                scene.remove(this.mesh);
                scene.remove(this.trailLine);
            }
        }

        // Flash de impacto (simples esfera que desaparece)
        function flashImpact(position, color) {
            const geo = new THREE.SphereGeometry(0.3, 8, 8);
            const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1.0, blending: THREE
                    .AdditiveBlending });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.copy(position);
            scene.add(mesh);
            const start = performance.now();

            function animFlash() {
                const elapsed = (performance.now() - start) / 1000;
                if (elapsed > 0.2) { scene.remove(mesh); return; }
                const scale = 1 + elapsed * 4;
                mesh.scale.set(scale, scale, scale);
                mesh.material.opacity = 1 - elapsed / 0.2;
                requestAnimationFrame(animFlash);
            }
            animFlash();
        }

        function shootProjectile(shooter, target) {
            const startPos = shooter.group.position.clone();
            startPos.y += 0.40 * 0.65;
            const forward = new THREE.Vector3(shooter.side === 'green' ? 1 : -1, 0, 0);
            startPos.add(forward.multiplyScalar(0.30 * 0.65));
            const color = shooter.side === 'green' ? 0x66ff66 : 0xff4444;
            const proj = new Projectile(startPos, target, color, 24 + Math.random() * 8, shooter.damage);
            projectiles.push(proj);
        }

        // ================================================================
        // 12. GERENCIAMENTO DE SOLDADOS
        // ================================================================
        let greenSoldiers = [];
        let redSoldiers = [];
        let greenTargetCount = INITIAL_SOLDIERS;
        let redTargetCount = INITIAL_SOLDIERS;

        function spawnSoldierAtTent(side) {
            const doorPos = getTentDoorPosition(side);
            const soldier = new Soldier(side, doorPos);
            if (side === 'green') greenSoldiers.push(soldier);
            else redSoldiers.push(soldier);
            updateCountsAndHUD();
        }

        function updateCountsAndHUD() {
            const greenAlive = greenSoldiers.filter(s => s.alive).length;
            const redAlive = redSoldiers.filter(s => s.alive).length;
            updateHUD(currentPrice || 0, currentVariation, greenAlive, redAlive);
        }

        function initSoldiers() {
            for (let i = 0; i < INITIAL_SOLDIERS; i++) {
                spawnSoldierAtTent('green');
                spawnSoldierAtTent('red');
            }
            greenTargetCount = INITIAL_SOLDIERS;
            redTargetCount = INITIAL_SOLDIERS;
            updateCountsAndHUD();
        }

        // ================================================================
        // 13. COLISÕES
        // ================================================================
        function resolveSoldierCollisions() {
            const allSoldiers = [...greenSoldiers, ...redSoldiers];
            const aliveSoldiers = allSoldiers.filter(s => s.alive);
            for (let i = 0; i < aliveSoldiers.length; i++) {
                for (let j = i + 1; j < aliveSoldiers.length; j++) {
                    const a = aliveSoldiers[i];
                    const b = aliveSoldiers[j];
                    const posA = a.group.position;
                    const posB = b.group.position;
                    const dx = posA.x - posB.x;
                    const dz = posA.z - posB.z;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    const minDist = a.collisionRadius + b.collisionRadius;
                    if (dist < minDist && dist > 0.001) {
                        const nx = dx / dist;
                        const nz = dz / dist;
                        const overlap = (minDist - dist) * 0.5;
                        posA.x += nx * overlap;
                        posA.z += nz * overlap;
                        posB.x -= nx * overlap;
                        posB.z -= nz * overlap;
                        posA.y = getTerrainHeight(posA.x, posA.z) + 0.1;
                        posB.y = getTerrainHeight(posB.x, posB.z) + 0.1;
                    }
                }
            }
        }

        // ================================================================
        // 14. AMBIENTE DINÂMICO
        // ================================================================
        function adjustByVariation(variation) {
            currentVariation = variation;
            const clamped = Math.max(-10, Math.min(10, variation));
            const ratio = 0.5 + (clamped / 20);
            const total = INITIAL_SOLDIERS * 2;
            let greenTarget = Math.round(ratio * total);
            let redTarget = total - greenTarget;
            greenTarget = Math.max(MIN_SOLDIERS, Math.min(MAX_SOLDIERS, greenTarget));
            redTarget = Math.max(MIN_SOLDIERS, Math.min(MAX_SOLDIERS, redTarget));
            if (greenTarget + redTarget > total) {
                if (greenTarget > MIN_SOLDIERS) greenTarget--;
                else redTarget--;
            } else if (greenTarget + redTarget < total) {
                if (greenTarget < MAX_SOLDIERS) greenTarget++;
                else redTarget++;
            }
            greenTargetCount = greenTarget;
            redTargetCount = redTarget;

            let greenAlive = greenSoldiers.filter(s => s.alive).length;
            let redAlive = redSoldiers.filter(s => s.alive).length;

            while (greenAlive < greenTarget) {
                spawnSoldierAtTent('green');
                greenAlive++;
            }
            while (greenAlive > greenTarget) {
                for (let i = greenSoldiers.length - 1; i >= 0; i--) {
                    if (greenSoldiers[i].alive) {
                        const s = greenSoldiers[i];
                        s.alive = false;
                        scene.remove(s.group);
                        greenAlive--;
                        break;
                    }
                }
            }
            while (redAlive < redTarget) {
                spawnSoldierAtTent('red');
                redAlive++;
            }
            while (redAlive > redTarget) {
                for (let i = redSoldiers.length - 1; i >= 0; i--) {
                    if (redSoldiers[i].alive) {
                        const s = redSoldiers[i];
                        s.alive = false;
                        scene.remove(s.group);
                        redAlive--;
                        break;
                    }
                }
            }

            const allSoldiers = [...greenSoldiers, ...redSoldiers];
            for (const soldier of allSoldiers) {
                if (soldier.alive) {
                    soldier.recalculateStats(variation);
                }
            }

            updateCountsAndHUD();

            // Efeitos visuais (mantido)
            const strength = clamped / 10;
            const topColor = new THREE.Color(0x0a0a2a).lerp(new THREE.Color(0x4a2a0a), Math.max(0, strength));
            const bottomColor = new THREE.Color(0x2a1a0a).lerp(new THREE.Color(0xff8844), Math.max(0, strength));
            if (strength < 0) {
                topColor.lerp(new THREE.Color(0x1a0a0a), -strength);
                bottomColor.lerp(new THREE.Color(0x0a0a1a), -strength);
            }
            skyMat.uniforms.topColor.value.copy(topColor);
            skyMat.uniforms.bottomColor.value.copy(bottomColor);

            const intensity = 1.2 + strength * 0.6;
            sunLight.intensity = Math.max(0.4, intensity);
            const sunColor = new THREE.Color(0xffeedd).lerp(new THREE.Color(0xffaa44), Math.max(0, strength));
            sunLight.color.copy(sunColor);

            const scale = 1.0 + strength * 0.8;
            crystal.userData.crystal.scale.set(scale, scale, scale);
            crystal.userData.inner.scale.set(scale * 0.75, scale * 0.75, scale * 0.75);
            crystal.userData.crystal.material.emissiveIntensity = Math.max(0.2, 0.6 + strength * 0.8);
            crystal.userData.light.intensity = 1.2 + strength * 1.5;
            crystal.userData.glow.scale.set(5 + strength * 3, 5 + strength * 3, 1);
            const crystalColor = new THREE.Color(0xff8800).lerp(new THREE.Color(0xffdd44), Math.max(0, strength));
            crystal.userData.crystal.material.color.copy(crystalColor);
            crystal.userData.crystal.material.emissive.copy(crystalColor);

            const lavaBright = 0.5 + strength * 0.5;
            lavaRiver.lavaMesh.material.color.setHSL(0.07, 1, 0.3 + lavaBright * 0.3);
            lavaRiver.glow.material.opacity = 0.3 + strength * 0.4;

            const cloudOpacity = 0.2 + (1 - Math.abs(strength)) * 0.3;
            const cloudColor = new THREE.Color(0xffddbb).lerp(new THREE.Color(0x444466), Math.max(0, -strength));
            clouds.forEach(c => {
                c.material.opacity = cloudOpacity * (0.5 + Math.random() * 0.5);
                c.material.color.copy(cloudColor);
            });

            scene.children.forEach(child => {
                if (child.userData && child.userData.isLightBeam) {
                    scene.remove(child);
                }
            });
            if (strength > 0.3) {
                const numBeams = Math.floor(strength * 8);
                for (let i = 0; i < numBeams; i++) {
                    const beamMat = new THREE.SpriteMaterial({
                        map: createGlowTexture(),
                        blending: THREE.AdditiveBlending,
                        depthWrite: false,
                        color: 0xffdd44,
                        transparent: true,
                        opacity: 0.06 + strength * 0.06
                    });
                    const beam = new THREE.Sprite(beamMat);
                    const x = (Math.random() - 0.5) * 35;
                    const z = (Math.random() - 0.5) * 40;
                    beam.position.set(x, 5 + Math.random() * 15, z);
                    beam.scale.set(3 + Math.random() * 6, 15 + Math.random() * 20, 1);
                    beam.userData.isLightBeam = true;
                    scene.add(beam);
                }
            }

            if (strength < -0.3 && Math.random() < 0.008) {
                createLightning();
            }
        }

        function createLightning() {
            const points = [];
            const startX = (Math.random() - 0.5) * 40;
            const startZ = (Math.random() - 0.5) * 40;
            let x = startX,
                z = startZ,
                y = 20;
            points.push(new THREE.Vector3(x, y, z));
            for (let i = 0; i < 6; i++) {
                x += (Math.random() - 0.5) * 5;
                z += (Math.random() - 0.5) * 5;
                y -= 2 + Math.random() * 3;
                points.push(new THREE.Vector3(x, y, z));
            }
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            const mat = new THREE.LineBasicMaterial({
                color: 0x88ccff,
                transparent: true,
                opacity: 0.8,
                linewidth: 2
            });
            const lightning = new THREE.Line(geo, mat);
            scene.add(lightning);
            const flashMat = new THREE.SpriteMaterial({
                map: createGlowTexture(),
                blending: THREE.AdditiveBlending,
                color: 0x88ccff,
                transparent: true,
                opacity: 0.3
            });
            const flash = new THREE.Sprite(flashMat);
            flash.scale.set(30, 30, 1);
            flash.position.set(0, 5, 0);
            scene.add(flash);
            setTimeout(() => {
                scene.remove(lightning);
                scene.remove(flash);
            }, 200);
        }

        // ================================================================
        // 15. HUD
        // ================================================================
        function updateHUD(price, variation, greenCount, redCount) {
            document.getElementById('priceDisplay').textContent = price.toFixed(2);
            const trendEl = document.getElementById('trendDisplay');
            if (variation > 0.1) {
                trendEl.textContent = '▲ +' + variation.toFixed(2) + '%';
                trendEl.className = 'hud-trend up';
            } else if (variation < -0.1) {
                trendEl.textContent = '▼ ' + variation.toFixed(2) + '%';
                trendEl.className = 'hud-trend down';
            } else {
                trendEl.textContent = '● ' + variation.toFixed(2) + '%';
                trendEl.className = 'hud-trend stable';
            }
            document.getElementById('greenCount').textContent = greenCount;
            document.getElementById('redCount').textContent = redCount;
            const total = greenCount + redCount;
            if (total > 0) {
                document.getElementById('greenBarFill').style.width = (greenCount / total * 100) + '%';
                document.getElementById('redBarFill').style.width = (redCount / total * 100) + '%';
            }
            const varText = document.getElementById('variationText');
            if (variation > 0.1) {
                varText.textContent = '🔺 Mercado em alta · Força verde';
                varText.style.color = 'rgba(76, 175, 80, 0.6)';
            } else if (variation < -0.1) {
                varText.textContent = '🔻 Mercado em baixa · Força vermelha';
                varText.style.color = 'rgba(244, 67, 54, 0.6)';
            } else {
                varText.textContent = '➖ Mercado estável · Equilíbrio';
                varText.style.color = 'rgba(255, 170, 0, 0.5)';
            }
        }

        // ================================================================
        // 16. WEBSOCKET BINANCE - XMR/USDT
        // ================================================================
        let currentPrice = 0;
        let price15min = 0;
        let price15minTimestamp = 0;
        let variation15min = 0;

        const socket = new WebSocket('wss://fstream.binance.com/market/ws/xmrusdt@ticker');

        socket.onopen = () => {
            console.log('🟢 WebSocket Ticker conectado - XMR/USDT');
        };

        socket.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                const price = parseFloat(data.c);
                if (!isNaN(price) && price > 0) {
                    currentPrice = price;

                    const now = Date.now();
                    if (price15min === 0 || (now - price15minTimestamp) >= 15 * 60 * 1000) {
                        price15min = currentPrice;
                        price15minTimestamp = now;
                        variation15min = 0;
                    } else {
                        variation15min = ((currentPrice - price15min) / price15min) * 100;
                    }

                    const greenAlive = greenSoldiers.filter(s => s.alive).length;
                    const redAlive = redSoldiers.filter(s => s.alive).length;
                    updateHUD(currentPrice, variation15min, greenAlive, redAlive);
                    adjustByVariation(variation15min);
                }
            } catch (e) {
                console.error('Erro ao processar mensagem:', e);
            }
        };

        socket.onerror = (err) => {
            console.error('❌ WebSocket error:', err);
        };

        socket.onclose = () => {
            console.log('🔴 WebSocket fechado. Tentando reconectar em 5s...');
            setTimeout(() => {
                window.location.reload();
            }, 5000);
        };

        // ================================================================
        // 17. LOOP PRINCIPAL
        // ================================================================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const now = performance.now() / 1000;

            const time = now * 1.5;
            if (fortressGreen.userData.flag) {
                fortressGreen.userData.flag.rotation.z = Math.sin(time) * 0.15;
                fortressGreen.userData.flag.position.y = 3.0 + Math.sin(time * 1.3) * 0.05;
            }
            if (fortressRed.userData.flag) {
                fortressRed.userData.flag.rotation.z = Math.sin(time + 0.8) * 0.15;
                fortressRed.userData.flag.position.y = 3.0 + Math.sin(time * 1.3 + 0.8) * 0.05;
            }

            crystal.rotation.y += delta * 0.4;
            crystal.rotation.x = Math.sin(now * 0.2) * 0.1;
            crystal.position.y = getTerrainHeight(0, 0) + 0.8 + Math.sin(now * 0.5) * 0.1;

            lavaRiver.particles.rotation.y += delta * 0.015;

            for (const soldier of greenSoldiers) {
                if (soldier.alive) soldier.update(delta, now);
            }
            for (const soldier of redSoldiers) {
                if (soldier.alive) soldier.update(delta, now);
            }

            resolveSoldierCollisions();

            for (let i = projectiles.length - 1; i >= 0; i--) {
                const proj = projectiles[i];
                proj.update(delta);
                if (!proj.alive) {
                    projectiles.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        // ================================================================
        // 18. INICIALIZAÇÃO
        // ================================================================
        initSoldiers();
        animate();

        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        console.log('⚔️ XMR BATTLE 2.5D iniciada!');
        console.log('📊 Conectado ao WebSocket XMR/USDT da Binance');
        console.log('🔗 Endpoint: wss://fstream.binance.com/market/ws/xmrusdt@ticker');
        console.log('🟩 Verde (compradores) vs 🔴 Vermelho (vendedores)');
        console.log('💎 Cristal Monero no centro do vale');
        console.log('⚡ Variação do XMR define quantidade e força dos exércitos');
        console.log('🖱️ Arraste para mover a câmera | Scroll para zoom');
        console.log('🏰 Soldados sempre nascem no castelo e vão para a beira do rio');
        console.log('🔫 Projéteis com rastro luminoso e som de tiro!');
        console.log('❌ Sem barras de vida, sem partículas de fumaça/explosão');
    </script>
