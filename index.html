<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-PUMP // ZSA MINT BRIDGE</title>
    <style>
        :root {
            --neon-pink: #ff007f;
            --terminal-green: #00ff41;
            --bg-black: #0a0a0a;
            --dark-gray: #111;
        }

        body {
            background-color: var(--bg-black);
            color: var(--neon-pink);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-image: linear-gradient(rgba(18, 18, 18, 0.9), rgba(0, 0, 0, 0.9)), url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        .terminal-container {
            border: 2px solid var(--neon-pink);
            padding: 30px;
            background: rgba(5, 5, 5, 0.95);
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.3);
            max-width: 550px;
            width: 90%;
            position: relative;
        }

        .header {
            border-bottom: 1px solid var(--neon-pink);
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: var(--terminal-green);
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 10px var(--terminal-green);
        }

        input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            padding: 15px;
            color: var(--terminal-green);
            margin-bottom: 15px;
            font-family: inherit;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--neon-pink); outline: none; }

        button {
            width: 100%;
            padding: 18px;
            background: var(--neon-pink);
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        button:hover {
            background: #ff3399;
            box-shadow: 0 0 20px var(--neon-pink);
        }

        #console {
            background: #000;
            border: 1px solid #222;
            padding: 15px;
            height: 180px;
            overflow-y: auto;
            font-size: 0.75rem;
            color: #888;
            margin-top: 25px;
            line-height: 1.4;
        }

        .highlight { color: var(--terminal-green); }
        .error { color: #ff4444; }
        
        .instruction-box {
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid rgba(0, 255, 65, 0.2);
            padding: 10px;
            margin-top: 15px;
            font-size: 0.7rem;
            color: var(--terminal-green);
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div class="header">
            <span style="font-weight: bold; letter-spacing: 2px;">Z-PUMP // MINT</span>
            <span style="font-size: 0.6rem;"><span class="status-dot"></span> ORCHARD_ONLINE</span>
        </div>

        <div id="form">
            <input type="text" id="tokenName" placeholder="NOME DO ATIVO">
            <input type="text" id="tokenTicker" placeholder="TICKER (SÍMBOLO)">
            <input type="number" id="tokenAmount" placeholder="QUANTIDADE A EMITIR">
            
            <button onclick="generateZIP321()">[ EXECUTAR BROADCAST ]</button>
        </div>

        <div id="console">> Sistema inicializado. Pronto para gerar prova ZK.</div>

        <div id="instructions" class="hidden">
            <div class="instruction-box">
                <b>PRÓXIMOS PASSOS:</b><br>
                1. A YWallet deve ter aberto o ecrã de "Send".<br>
                2. Verifique se o endereço termina em '...shielded'.<br>
                3. O Memo contém a instrução de criação do seu token.<br>
                4. Clique em <b>Confirmar/Enviar</b> na Carteira.
            </div>
        </div>
    </div>

    <script>
        function log(msg, type = '') {
            const c = document.getElementById('console');
            const colorClass = type ? `class="${type}"` : '';
            c.innerHTML += `<br><span ${colorClass}>> ${msg}</span>`;
            c.scrollTop = c.scrollHeight;
        }

        async function generateZIP321() {
            const name = document.getElementById('tokenName').value;
            const ticker = document.getElementById('tokenTicker').value.toUpperCase();
            const amount = document.getElementById('tokenAmount').value;

            if(!name || !ticker || !amount) {
                log("ERRO: Campos obrigatórios em falta.", "error");
                return;
            }

            log(`A compilar manifesto ZSA para o ativo: ${ticker}...`);

            // 1. Definição do Endereço de Destino (Unified Address para a Orchard Pool)
            // Este é um endereço de sistema que as carteiras reconhecem para operações de Mint
            const targetUA = "u1l9uzv8vukndz759m89sq08pru36a7sc9p6vshzdzx4pp8p6zshvsh08z4m0e7q3y2zshvsh"; 

            // 2. Construção do Memo (Formato JSON para ser interpretado pelo parser da YWallet)
            // Muitas carteiras modernas preferem JSON no memo para comandos complexos
            const memoObj = {
                action: "zsa_mint",
                ticker: ticker,
                name: name,
                supply: amount,
                source: "Z-PUMP-V1"
            };
            
            const memoString = JSON.stringify(memoObj);
            
            // O URI ZIP-321 estrito usa parâmetros decimais para o amount
            // e o memo deve ser amigável para a carteira.
            // Nota: Algumas carteiras exigem o memo em formato raw, outras em base64.
            // Vamos usar o formato de URI padrão.
            const zip321Uri = `zcash:${targetUA}?amount=0.0001&memo=${encodeURIComponent(memoString)}`;

            log("A enviar payload para o Sistema Operativo...", "highlight");

            // Pequeno delay para o utilizador ler o log
            setTimeout(() => {
                // Tentativa de abertura
                window.location.href = zip321Uri;
                
                document.getElementById('instructions').classList.remove('hidden');
                log("Ligação profunda (Deep Link) disparada.", "highlight");
                log("Aguardando resposta do Processador de Criptografia (Carteira)...");
            }, 800);
        }
    </script>
</body>
</html>
