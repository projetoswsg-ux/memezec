<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-PUMP // MINT TERMINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --neon: #ff007f;
            --green: #00ff41;
            --bg: #050505;
        }

        body {
            background: var(--bg);
            color: var(--neon);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .terminal {
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--neon);
            padding: 25px;
            background: rgba(0,0,0,0.9);
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.2);
        }

        input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: var(--green);
            padding: 12px;
            margin-bottom: 10px;
            font-family: inherit;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--neon);
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        #qr-container {
            background: white;
            padding: 15px;
            margin: 20px auto;
            width: fit-content;
            display: none;
        }

        .copy-box {
            background: #111;
            border: 1px solid #333;
            padding: 10px;
            font-size: 0.65rem;
            color: #888;
            margin-top: 10px;
            word-break: break-all;
            cursor: pointer;
        }

        .copy-box:hover { border-color: var(--green); color: var(--green); }

        #log {
            font-size: 0.7rem;
            color: var(--green);
            margin-top: 15px;
            height: 60px;
            overflow-y: auto;
        }

        .hidden { display: none; }
        .tab { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #222; }
        .tab-btn { background: none; border: none; color: #555; cursor: pointer; padding: 5px; width: auto; font-size: 0.7rem; }
        .tab-btn.active { color: var(--neon); border-bottom: 2px solid var(--neon); }
    </style>
</head>
<body>

<div class="terminal">
    <div style="display: flex; justify-content: space-between; font-size: 0.6rem; margin-bottom: 20px;">
        <span>Z-PUMP v4.0 // ZSA</span>
        <span id="conn-status" style="color: var(--green);">● BRIDGE_ACTIVE</span>
    </div>

    <div id="mint-fields">
        <input type="text" id="tTicker" placeholder="TICKER (EX: ZMEME)">
        <input type="number" id="tAmount" placeholder="SUPPLY TOTAL">
        <button onclick="generateMintRequest()">[ LANÇAR TOKEN ]</button>
    </div>

    <div id="interaction-zone" class="hidden">
        <div class="tab">
            <button class="tab-btn active" onclick="switchTab('qr')">QR CODE</button>
            <button class="tab-btn" onclick="switchTab('manual')">MANUAL</button>
        </div>

        <div id="qr-view">
            <p style="font-size: 0.6rem; text-align: center; color: #888;">Digitalize com a YWallet ou Zashi para confirmar o Mint</p>
            <div id="qr-container"></div>
            <button onclick="tryDeepLink()" style="background: var(--green); color: black;">[ TENTAR ABRIR APP DIRETAMENTE ]</button>
        </div>

        <div id="manual-view" class="hidden">
            <p style="font-size: 0.6rem; color: #888;">Se a app não abrir, copie e cole na YWallet (Ecrã Send):</p>
            <div class="copy-box" onclick="copyToClipboard('addr')">
                <b>ENDEREÇO:</b><br>
                <span id="target-addr">u1l9uzv8vukndz759m89sq08pru36a7sc9p6vshzdzx4pp8p6zshvsh08z4m0e7q3y2zshvsh</span>
            </div>
            <div class="copy-box" onclick="copyToClipboard('memo')">
                <b>MEMO (COMANDO):</b><br>
                <span id="target-memo"></span>
            </div>
        </div>

        <button onclick="resetForm()" style="background: transparent; border: 1px solid #444; color: #444; margin-top: 20px;">VOLTAR</button>
    </div>

    <div id="log">> Aguardando configuração do ativo...</div>
</div>

<script>
    let currentUri = "";

    function log(msg) {
        const l = document.getElementById('log');
        l.innerHTML = `> ${msg}`;
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if(tab === 'qr') {
            document.getElementById('qr-view').classList.remove('hidden');
            document.getElementById('manual-view').classList.add('hidden');
            event.target.classList.add('active');
        } else {
            document.getElementById('qr-view').classList.add('hidden');
            document.getElementById('manual-view').classList.remove('hidden');
            event.target.classList.add('active');
        }
    }

    function generateMintRequest() {
        const ticker = document.getElementById('tTicker').value.toUpperCase();
        const amount = document.getElementById('tAmount').value;

        if(!ticker || !amount) return log("ERRO: Preencha os campos.");

        const addr = document.getElementById('target-addr').innerText;
        const memo = `ZSA_MINT:${ticker}:${amount}`;
        document.getElementById('target-memo').innerText = memo;

        // Formato ZIP-321 Estrito
        currentUri = `zcash:${addr}?amount=0.0001&memo=${btoa(memo)}`;

        // Gerar QR Code
        const qrDiv = document.getElementById('qr-container');
        qrDiv.innerHTML = "";
        qrDiv.style.display = "block";
        new QRCode(qrDiv, {
            text: currentUri,
            width: 200,
            height: 200,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        document.getElementById('mint-fields').classList.add('hidden');
        document.getElementById('interaction-zone').classList.remove('hidden');
        
        log("Manifesto gerado. Escolha o método de assinatura.");
        
        // Tenta o deep link uma vez automaticamente
        tryDeepLink();
    }

    function tryDeepLink() {
        log("A tentar disparar protocolo nativo...");
        window.location.href = currentUri;
    }

    function copyToClipboard(id) {
        const text = id === 'addr' ? document.getElementById('target-addr').innerText : document.getElementById('target-memo').innerText;
        const el = document.createElement('textarea');
        el.value = text;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        log("Copiado para a área de transferência!");
    }

    function resetForm() {
        document.getElementById('mint-fields').classList.remove('hidden');
        document.getElementById('interaction-zone').classList.add('hidden');
        log("Terminal resetado.");
    }
</script>

</body>
</html>
