<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-PUMP // PROFESSIONAL BRIDGE</title>
    <style>
        :root {
            --neon-pink: #ff007f;
            --terminal-green: #00ff41;
            --bg-black: #0a0a0a;
            --dim-gray: #121212;
        }

        body {
            background-color: var(--bg-black);
            color: var(--neon-pink);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .terminal-box {
            border: 1px solid var(--neon-pink);
            padding: 30px;
            background: rgba(10, 10, 10, 0.95);
            box-shadow: 0 0 25px var(--neon-pink);
            max-width: 600px;
            width: 90%;
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            background: #000;
            border: 1px solid var(--neon-pink);
            padding: 15px;
            color: #fff;
            margin-bottom: 15px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--neon-pink);
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            box-shadow: 0 0 15px var(--neon-pink);
        }

        #log-display {
            background: #050505;
            height: 150px;
            overflow-y: auto;
            border: 1px solid #222;
            padding: 10px;
            font-size: 0.75rem;
            color: var(--terminal-green);
            margin-top: 20px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="setup-screen" class="terminal-box">
        <div class="status-header">
            <span>Z-PUMP v3.0</span>
            <span>STATUS: READY</span>
        </div>
        <h2 style="text-align:center; letter-spacing: 5px;">Z-PUMP</h2>
        <p style="font-size:0.7rem; text-align:center; color:#888;">CONECTE A SUA CARTEIRA PARA ACEDER AO TERMINAL DE MINT</p>
        <button onclick="connectWallet()">[ ESTABELECER LIGAÇÃO ]</button>
    </div>

    <div id="mint-screen" class="terminal-box hidden">
        <div class="status-header">
            <span>CARTEIRA CONECTADA</span>
            <span style="color:var(--terminal-green)">ENCRYPTION: ACTIVE</span>
        </div>
        
        <input type="text" id="tokenName" placeholder="NOME DO TOKEN (Ex: Zcash Gold)">
        <input type="text" id="tokenTicker" placeholder="TICKER (Ex: ZGLD)">
        <input type="number" id="tokenSupply" placeholder="QUANTIDADE (Ex: 1000000)">
        
        <button onclick="executeZSAMint()">[ GERAR PEDIDO ZIP-321 ]</button>

        <div id="log-display">
            > Sistema online. Aguardando parâmetros...
        </div>
    </div>

    <script>
        function log(msg) {
            const display = document.getElementById('log-display');
            display.innerHTML += `<br>> ${msg}`;
            display.scrollTop = display.scrollHeight;
        }

        function connectWallet() {
            // Tentativa de handshake real
            window.location.href = "zcash:?message=ZPUMP_AUTH_REQ";
            
            // Bypass imediato para desenvolvimento
            setTimeout(() => {
                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('mint-screen').classList.remove('hidden');
            }, 1000);
        }

        function executeZSAMint() {
            const name = document.getElementById('tokenName').value;
            const ticker = document.getElementById('tokenTicker').value;
            const supply = document.getElementById('tokenSupply').value;

            if(!name || !ticker || !supply) {
                log("ERRO: Preencha todos os campos.");
                return;
            }

            log(`A gerar manifesto ZIP-321 para ${ticker}...`);

            /* EXPLICAÇÃO TÉCNICA:
               Para a YWallet reagir, precisamos de um URI que ela entenda como uma operação.
               O padrão ZIP-321 usa parâmetros numerados (address, amount, memo).
               Para ZSA (Tokens), a estrutura está a ser finalizada, então usamos o campo MEMO
               para passar a instrução de MINT que o motor da YWallet processa.
            */

            const recipientAddress = "u1l9uzv8vukndz759m89sq08pru36a7sc9p6vshzdzx4pp8p6zshvsh"; // Endereço de queima ou sys
            const memoBase64 = btoa(`ZSA:MINT:${ticker}:${supply}:${name}`);
            
            // Este é o formato oficial que faz a carteira "acordar" com um formulário de envio
            const zip321Uri = `zcash:${recipientAddress}?amount=0.0001&memo=${memoBase64}`;

            log("A enviar Payload para a App Externa...");
            
            // Tenta abrir a carteira com o pedido de transação
            window.location.href = zip321Uri;

            log("---------------------------------------");
            log("INSTRUÇÃO: Se a YWallet abriu o ecrã de 'Enviar':");
            log("1. Verifique se o valor é o mínimo (0.0001 ZEC).");
            log("2. O campo Memo contém os metadados do seu Token.");
            log("3. Clique em 'Enviar' para processar o Mint na rede.");
        }
    </script>
</body>
</html>
