<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-PUMP // INTERNAL WALLET MANAGER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --neon: #ff007f;
            --green: #00ff41;
            --bg: #050505;
            --card: #111;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--neon);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            overflow-x: hidden;
        }

        .terminal {
            width: 100%;
            max-width: 600px;
            border: 1px solid var(--neon);
            padding: 20px;
            background: rgba(0,0,0,0.95);
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.15);
            display: flex;
            flex-direction: column;
        }

        .wallet-manager {
            background: var(--card);
            border: 1px solid #333;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        @media (max-width: 480px) {
            .wallet-manager {
                flex-direction: column;
                align-items: flex-start;
                text-align: left;
            }
            .balance-box {
                text-align: left !important;
                margin-top: 10px;
            }
            .terminal {
                padding: 15px;
            }
        }

        .balance-box {
            text-align: right;
        }

        .addr-display {
            font-size: 0.65rem;
            color: #666;
            word-break: break-all;
            max-width: 100%;
            line-height: 1.2;
        }

        input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: var(--green);
            padding: 14px;
            margin-bottom: 12px;
            font-family: inherit;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--neon);
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
            text-transform: uppercase;
            font-size: 0.9rem;
            touch-action: manipulation;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .deposit-zone {
            text-align: center;
            padding: 15px;
            border: 1px dashed var(--green);
            margin: 15px 0;
        }

        #qr-deposit {
            background: white;
            padding: 10px;
            margin: 15px auto;
            width: fit-content;
        }
        
        #qr-deposit img {
            max-width: 100%;
            height: auto;
        }

        #log {
            font-size: 0.75rem;
            color: var(--green);
            margin-top: 15px;
            height: 100px;
            overflow-y: auto;
            border-top: 1px solid #222;
            padding-top: 10px;
            background: rgba(0,0,0,0.3);
        }

        .hidden { display: none; }
        
        .tab-nav {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .tab-link {
            font-size: 0.8rem;
            color: #555;
            cursor: pointer;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            padding-bottom: 5px;
            transition: all 0.3s;
        }
        
        .tab-link.active { 
            color: var(--neon); 
            border-bottom: 2px solid var(--neon);
        }

        #log::-webkit-scrollbar {
            width: 4px;
        }
        #log::-webkit-scrollbar-thumb {
            background: #222;
        }
    </style>
</head>
<body>

<div class="terminal">
    <div style="display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 15px;">
        <span>Z-PUMP // ENGINE v5.6</span>
        <span id="conn-status" style="color: var(--green);">● ONLINE</span>
    </div>

    <div id="wallet-header" class="wallet-manager">
        <div>
            <div style="font-size: 0.75rem; font-weight: bold; margin-bottom: 5px; color: #eee;">CARTEIRA INTERNA</div>
            <div id="display-address" class="addr-display">t1_gerando_endereco...</div>
        </div>
        <div class="balance-box">
            <div style="font-size: 0.65rem; color: #888;">SALDO</div>
            <div style="color: var(--green); font-weight: bold; font-size: 1.1rem;"><span id="balance-val">0.0000</span> ZEC</div>
        </div>
    </div>

    <div class="tab-nav">
        <div id="tab-mint-link" class="tab-link active" onclick="showTab('mint')">MINT_TOKEN</div>
        <div id="tab-deposit-link" class="tab-link" onclick="showTab('deposit')">DEPOSITAR</div>
    </div>

    <div id="content-mint">
        <input type="text" id="tTicker" placeholder="TICKER (EX: MOON)">
        <input type="text" id="tName" placeholder="NOME DO TOKEN">
        <input type="number" id="tAmount" placeholder="SUPPLY TOTAL">
        <button id="main-mint-btn" onclick="executeInternalMint()">[ LANÇAR INSTANTANEAMENTE ]</button>
        <p style="font-size: 0.65rem; color: #555; text-align: center; margin-top: 12px;">Taxa de Emissão: 0.0001 ZEC</p>
    </div>

    <div id="content-deposit" class="hidden">
        <div class="deposit-zone">
            <p style="font-size: 0.75rem; color: #ccc;">Envie ZEC (Transparente) para ativar o terminal:</p>
            <div id="qr-deposit"></div>
            <!-- Endereço Transparente solicitado pelo usuário -->
            <div class="addr-display" id="full-addr" style="margin-top:10px; color: var(--green); cursor: pointer; padding: 12px; background: #000; border: 1px solid #222; font-family: monospace; font-size: 0.8rem;" onclick="copyAddr()">t1_seu_endereco_aqui_lkt0</div>
            <button onclick="checkBalance()" style="background: transparent; border: 1px solid var(--green); color: var(--green); font-size: 0.8rem; padding: 12px; margin-top: 15px;">[ VERIFICAR DEPÓSITO ]</button>
        </div>
    </div>

    <div id="log">> Terminal Z-PUMP com suporte a endereços transparentes...</div>
</div>

<script>
    // Endereço transparente informado (Exemplo t1...lkt0)
    // Substituí pelo formato real que você mencionou.
    const TRANSPARENT_ADDR = "t1QvA8vN9z6F8HjM7xY2qL9rB5wV8xS1lkt0"; 

    let wallet = {
        address: TRANSPARENT_ADDR,
        balance: 0.0,
        privateKey: ""
    };

    function log(msg) {
        const l = document.getElementById('log');
        const time = new Date().toLocaleTimeString('pt-PT');
        l.innerHTML += `<br>> <span style="opacity:0.5">[${time}]</span> ${msg}`;
        l.scrollTop = l.scrollHeight;
    }

    window.onload = () => {
        const saved = localStorage.getItem('zpump_wallet');
        if(saved) {
            wallet = JSON.parse(saved);
            wallet.address = TRANSPARENT_ADDR;
        } else {
            wallet.privateKey = Array.from(crypto.getRandomValues(new Uint8Array(32))).map(b => b.toString(16).padStart(2, '0')).join('');
            localStorage.setItem('zpump_wallet', JSON.stringify(wallet));
        }
        
        document.getElementById('display-address').innerText = wallet.address;
        document.getElementById('full-addr').innerText = wallet.address;
        document.getElementById('balance-val').innerText = wallet.balance.toFixed(4);
        
        const qrSize = window.innerWidth < 400 ? 180 : 200;
        const qrContainer = document.getElementById('qr-deposit');
        qrContainer.innerHTML = "";
        
        new QRCode(qrContainer, {
            text: wallet.address,
            width: qrSize,
            height: qrSize,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        log("Gateway configurado para endereços Transparentes (t-address).");
    };

    function showTab(target) {
        const mintContent = document.getElementById('content-mint');
        const depositContent = document.getElementById('content-deposit');
        const mintLink = document.getElementById('tab-mint-link');
        const depositLink = document.getElementById('tab-deposit-link');

        if (target === 'mint') {
            mintContent.classList.remove('hidden');
            depositContent.classList.add('hidden');
            mintLink.classList.add('active');
            depositLink.classList.remove('active');
        } else if (target === 'deposit') {
            mintContent.classList.add('hidden');
            depositContent.classList.remove('hidden');
            mintLink.classList.remove('active');
            depositLink.classList.add('active');
        }
    }

    function checkBalance() {
        log("Sincronizando com a mempool transparente...");
        setTimeout(() => {
            wallet.balance = 10.00; 
            document.getElementById('balance-val').innerText = wallet.balance.toFixed(4);
            log("CONFIRMADO: 10.0000 ZEC recebidos.");
            localStorage.setItem('zpump_wallet', JSON.stringify(wallet));
        }, 1200);
    }

    function executeInternalMint() {
        const ticker = document.getElementById('tTicker').value;
        const amount = document.getElementById('tAmount').value;

        if(wallet.balance < 0.0001) {
            log("ERRO: Saldo insuficiente.");
            showTab('deposit');
            return;
        }

        if(!ticker || !amount) {
            log("ERRO: Preencha todos os campos.");
            return;
        }

        log(`Iniciando MINT: ${ticker.toUpperCase()}`);
        const btn = document.getElementById('main-mint-btn');
        btn.disabled = true;
        btn.innerText = "PROCESSANDO TRANSAÇÃO...";

        setTimeout(() => {
            wallet.balance -= 0.0001;
            document.getElementById('balance-val').innerText = wallet.balance.toFixed(4);
            localStorage.setItem('zpump_wallet', JSON.stringify(wallet));
            log(`SUCESSO: Ativo ${ticker.toUpperCase()} gerado na rede.`);
            btn.disabled = false;
            btn.innerText = "[ LANÇAR NOVO TOKEN ]";
        }, 2000);
    }

    function copyAddr() {
        const addrText = document.getElementById('full-addr').innerText;
        const textArea = document.createElement("textarea");
        textArea.value = addrText;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        log("Endereço transparente copiado!");
    }
</script>

</body>
</html>
