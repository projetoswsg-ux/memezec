<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Monero Solar System 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #050510;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      user-select: none;
      touch-action: none;
      cursor: grab;
    }
    body:active { cursor: grabbing; }
    #loading {
      position: fixed;
      inset: 0;
      background: #050510;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 6px;
      color: #ff6600;
      z-index: 1000;
      transition: opacity 1.2s ease;
      text-shadow: 0 0 30px rgba(255,100,0,0.3);
    }
    #loading.hide { opacity: 0; pointer-events: none; }
    #loading span { animation: pulse 1.8s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    #planet-card {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(120%);
      background: rgba(8,8,20,0.92);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,150,50,0.2);
      border-radius: 24px;
      padding: 28px 34px;
      max-width: 460px;
      width: 90%;
      z-index: 200;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s;
      opacity: 0;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      pointer-events: none;
    }
    #planet-card.active {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      pointer-events: auto;
    }
    #planet-card .close-btn {
      position: absolute;
      top: 12px;
      right: 18px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 24px;
      cursor: pointer;
      transition: color 0.2s;
    }
    #planet-card .close-btn:hover { color: #fff; }
    #planet-card h2 {
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #ff8800;
    }
    #planet-card .subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 14px;
      letter-spacing: 1px;
    }
    #planet-card p {
      font-size: 16px;
      line-height: 1.6;
      color: rgba(255,255,255,0.85);
    }
    #planet-card .planet-link {
      margin-top: 14px;
      padding: 10px 16px;
      background: rgba(255,100,0,0.08);
      border-radius: 12px;
      border-left: 3px solid #ff8800;
      font-size: 15px;
      color: #ffaa55;
    }
    #planet-card .planet-link a {
      color: #ff8800;
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px dashed rgba(255,136,0,0.3);
      transition: border-color 0.2s;
    }
    #planet-card .planet-link a:hover {
      border-color: #ff8800;
    }
    #planet-card .sun-price {
      margin-top: 14px;
      padding: 10px 16px;
      background: rgba(255,100,0,0.08);
      border-radius: 12px;
      border-left: 3px solid #ff8800;
      font-size: 15px;
      color: #ffaa55;
    }
    #planet-card .sun-price .change-positive {
      color: #44ff44;
    }
    #planet-card .sun-price .change-negative {
      color: #ff4444;
    }
    #planet-card .sun-price .change-neutral {
      color: #ffaa44;
    }
    #zoom-indicator {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      color: #ffaa44;
      border: 1px solid rgba(255,150,50,0.2);
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
      z-index: 150;
      white-space: nowrap;
    }
    #zoom-indicator.show {
      opacity: 1;
    }

    // Índices de planetas que terão luas (fixos)
    const PLANETS_WITH_MOONS = [0, 2, 3, 5, 8, 10, 12, 15, 18, 20, 25, 30, 35, 40, 45, 50, 55, 60, 65, 70];
    const MOON_NAMES = ['Lua A', 'Lua B', 'Lua C', 'Lua D', 'Lua E', 'Lua F', 'Lua G', 'Lua H', 'Lua I', 'Lua J'];

    function generateOrganizedPlanetData() {
      const planets = [];
      let planetIndex = 0;

      for (let orbit = 0; orbit < ORBIT_CONFIG.numPlanetOrbits; orbit++) {
        const radius = ORBIT_CONFIG.sunRadius + 1.5 + orbit * ORBIT_CONFIG.planetOrbitSpacing;
        const numPlanets = ORBIT_CONFIG.planetsPerOrbit[orbit % ORBIT_CONFIG.planetsPerOrbit.length];
        const angularSpacing = (Math.PI * 2) / numPlanets;
        const startAngle = 0; // Fixo para consistência

        for (let pos = 0; pos < numPlanets; pos++) {
          if (planetIndex >= PLANET_NAMES.length) break;

          const angle = startAngle + pos * angularSpacing + (orbit * 0.3);
          const speed = 0.04 + (0.12 / (orbit + 1));
          const size = ORBIT_CONFIG.planetMinRadius +
                      (ORBIT_CONFIG.planetMaxRadius - ORBIT_CONFIG.planetMinRadius) *
                      (1 - orbit / ORBIT_CONFIG.numPlanetOrbits) * 0.8 +
                      (planetIndex % 5) * 0.015;

          const name = PLANET_NAMES[planetIndex];
          const desc = PLANET_DESCRIPTIONS[planetIndex % PLANET_DESCRIPTIONS.length];
          const link = PLANET_LINKS[planetIndex % PLANET_LINKS.length];
          const textureUrl = getPlanetTexture(name);

          const hasMoons = PLANETS_WITH_MOONS.includes(planetIndex);
          const numMoons = hasMoons ? 2 + (planetIndex % 3) : 0; // Fixo: 2, 3 ou 4 luas

          const moons = [];
          if (hasMoons && numMoons > 0) {
            const moonOrbitRadius = ORBIT_CONFIG.moonOrbitMin + (planetIndex % 5) * 0.05;
            const moonAngularSpacing = (Math.PI * 2) / numMoons;
            const moonStartAngle = (planetIndex * 0.7) % (Math.PI * 2);

            for (let m = 0; m < numMoons; m++) {
              const moonAngle = moonStartAngle + m * moonAngularSpacing + (orbit * 0.2);
              const moonSize = ORBIT_CONFIG.moonMinRadius + (m * 0.01) + (planetIndex % 3) * 0.005;
              const moonSpeed = 0.3 + (m * 0.05) + (planetIndex % 4) * 0.02;
              const moonName = MOON_NAMES[m % MOON_NAMES.length];

              moons.push({
                name: moonName,
                desc: `Lua ${m+1} de ${name}. Superfície coberta de dados criptografados e minerais raros.`,
                link: link + '/moon/' + (m+1),
                textureUrl: getMoonTexture(moonName),
                size: moonSize,
                distance: moonOrbitRadius + m * ORBIT_CONFIG.moonOrbitSpacing,
                speed: moonSpeed,
                angle: moonAngle
              });
            }
          }

          const orbitType = ['Interna', 'Média', 'Externa', 'Periférica', 'Distante'][Math.min(orbit, 4)];
          const subtitle = (planetIndex === 0) ? '📘 Centro de Documentação' :
                          `Sistema Monero • Órbita ${orbit + 1} • ${orbitType}`;

          planets.push({
            name,
            subtitle,
            desc,
            size,
            link,
            textureUrl,
            distance: radius,
            speed: speed,
            angle: angle,
            orbitIndex: orbit,
            index: planetIndex,
            isDocs: (planetIndex === 0),
            moons: moons,
            verticalOffset: (planetIndex % 5) * 0.06 - 0.12
          });

          planetIndex++;
        }
      }

      return planets;
    }

    let cameraRadius = 50;

    const minPhi = 0.1;
    const maxPhi = Math.PI / 1.6;

    // --- LUZES ---

    // --- ESTRELAS ---
    function createStarField() {
      const starsGroup = new THREE.Group();
      const starCount = 8000;
      const positions = new Float32Array(starCount * 3);
      const colors = new Float32Array(starCount * 3);

      for (let i = 0; i < starCount; i++) {
        const radius = 150 + Math.random() * 300;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos((Math.random() * 2) - 1);
        positions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
        positions[i*3+1] = radius * Math.cos(phi);
        positions[i*3+2] = radius * Math.sin(phi) * Math.sin(theta);
        const colorChoice = Math.random();
        if (colorChoice < 0.6) {
          colors[i*3] = 0.8 + Math.random() * 0.2;
          colors[i*3+1] = 0.8 + Math.random() * 0.2;
          colors[i*3+2] = 1.0;
        } else if (colorChoice < 0.8) {
          colors[i*3] = 1.0;
          colors[i*3+1] = 0.8 + Math.random() * 0.2;
          colors[i*3+2] = 0.4 + Math.random() * 0.2;
        } else {
          colors[i*3] = 1.0;
          colors[i*3+1] = 0.3 + Math.random() * 0.3;
          colors[i*3+2] = 0.1 + Math.random() * 0.2;
        }
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      const material = new THREE.PointsMaterial({
        size: 0.15,
        vertexColors: true,
        transparent: true,
        opacity: 0.9,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true
      });
      const stars = new THREE.Points(geometry, material);
      starsGroup.add(stars);

      const bigStarCount = 300;
      const bigPositions = new Float32Array(bigStarCount * 3);
      const bigColors = new Float32Array(bigStarCount * 3);
      for (let i = 0; i < bigStarCount; i++) {
        const radius = 120 + Math.random() * 250;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos((Math.random() * 2) - 1);
        bigPositions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
        bigPositions[i*3+1] = radius * Math.cos(phi);
        bigPositions[i*3+2] = radius * Math.sin(phi) * Math.sin(theta);
        bigColors[i*3] = 0.9 + Math.random() * 0.1;
        bigColors[i*3+1] = 0.8 + Math.random() * 0.2;
        bigColors[i*3+2] = 0.6 + Math.random() * 0.4;
      }
      const bigGeometry = new THREE.BufferGeometry();
      bigGeometry.setAttribute('position', new THREE.BufferAttribute(bigPositions, 3));
      bigGeometry.setAttribute('color', new THREE.BufferAttribute(bigColors, 3));
      const bigMaterial = new THREE.PointsMaterial({
        size: 0.5,
        vertexColors: true,
        transparent: true,
        opacity: 0.7,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true
      });
      const bigStars = new THREE.Points(bigGeometry, bigMaterial);
      starsGroup.add(bigStars);
      return starsGroup;
    }

    const starField = createStarField();
    scene.add(starField);

    // --- NEBULOSA ---
    function createNebula() {
      const nebulaGroup = new THREE.Group();
      for (let i = 0; i < 30; i++) {
        const size = 10 + Math.random() * 30;
        const geometry = new THREE.SphereGeometry(size, 8, 8);
        const material = new THREE.MeshBasicMaterial({
          color: new THREE.Color().setHSL(0.6 + Math.random() * 0.3, 0.5, 0.03 + Math.random() * 0.02),
          transparent: true,
          opacity: 0.2,
          wireframe: true,
          blending: THREE.AdditiveBlending
        });
        const mesh = new THREE.Mesh(geometry, material);
        const radius = 60 + Math.random() * 150;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos((Math.random() * 2) - 1);
        mesh.position.set(
          radius * Math.sin(phi) * Math.cos(theta),
          radius * Math.cos(phi),
          radius * Math.sin(phi) * Math.sin(theta)
        );
        mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
        nebulaGroup.add(mesh);
      }
      return nebulaGroup;
    }

    const nebula = createNebula();
    scene.add(nebula);

    // --- SOL COM TEXTURA MAPEADA ---
    const sunGroup = new THREE.Group();

    const textureLoader = new THREE.TextureLoader();
    const sunTexture = textureLoader.load(SUN_DATA.textureUrl);

    const sunGeo = new THREE.SphereGeometry(ORBIT_CONFIG.sunRadius, 64, 64);
    const sunMat = new THREE.MeshStandardMaterial({
      map: sunTexture,
      roughness: 1.0,
      metalness: 0.0,
      emissive: new THREE.Color(0xff4400),

    });

    // --- AURA DO SOL ---
    const auraRadius = ORBIT_CONFIG.sunRadius * 1.4;
    const auraGeo = new THREE.SphereGeometry(auraRadius, 48, 48);
    
    function createAuraTexture(color1, color2) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');
      
      const gradient = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
      const c1 = new THREE.Color(color1);
      const c2 = new THREE.Color(color2);
      
      gradient.addColorStop(0, `rgba(${c1.r*255|0}, ${c1.g*255|0}, ${c1.b*255|0}, 0.1)`);
      gradient.addColorStop(0.3, `rgba(${c1.r*255|0}, ${c1.g*255|0}, ${c1.b*255|0}, 0.15)`);
      gradient.addColorStop(0.6, `rgba(${c2.r*255|0}, ${c2.g*255|0}, ${c2.b*255|0}, 0.50)`);
      gradient.addColorStop(0.85, `rgba(${c2.r*255|0}, ${c2.g*255|0}, ${c2.b*255|0}, 0.25)`);
      gradient.addColorStop(1, `rgba(${c2.r*255|0}, ${c2.g*255|0}, ${c2.b*255|0}, 0.0)`);
      
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 256, 256);
      
      return new THREE.CanvasTexture(canvas);
    }

    let auraTexture = createAuraTexture(0x44ff44, 0x44ff44);
    const auraMat = new THREE.MeshBasicMaterial({
      map: auraTexture,
      transparent: true,
      opacity: 1.0,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      side: THREE.BackSide
    });
    
    const auraMesh = new THREE.Mesh(auraGeo, auraMat);
    auraMesh.userData = {
      basePositions: null,
      noiseOffsets: [],
      baseOpacity: 0.8
    };
    
    const positionAttribute = auraGeo.attributes.position;
    const vertexCount = positionAttribute.count;
    const basePositions = new Float32Array(vertexCount * 3);
    basePositions.set(positionAttribute.array);
    auraMesh.userData.basePositions = basePositions;
    
    const noiseOffsets = [];
    for (let i = 0; i < vertexCount; i++) {
      noiseOffsets.push({
        x: Math.random() * Math.PI * 2,
        y: Math.random() * Math.PI * 2,
        z: Math.random() * Math.PI * 2,
        speed: 0.5 + Math.random() * 1.0,
        amplitude: 0.02 + Math.random() * 0.04
      });
    }
    auraMesh.userData.noiseOffsets = noiseOffsets;
    
    sunGroup.add(auraMesh);

    scene.add(sunGroup);

    function updateSunAura() {
      if (priceChangePercent === 0) {
        auraMat.opacity = 0;
        return;
      }

      const isUp = priceChangePercent >= 0;
      const intensity = Math.min(Math.abs(priceChangePercent) / 10, 0.8);
      
      let centerColor, edgeColor;
      if (isUp) {
        centerColor = 0x00ff00;
        edgeColor = 0x006600;
        auraMat.opacity = 1.5 + intensity * 1.5;
      } else {
        centerColor = 0xff0000;
        edgeColor = 0x660000;
        auraMat.opacity = 1.5 + intensity * 1.5;
      }
      
      const newTexture = createAuraTexture(centerColor, edgeColor);
      auraMat.map = newTexture;
      auraMat.needsUpdate = true;
      
      auraMesh.userData.centerColor = centerColor;
      auraMesh.userData.edgeColor = edgeColor;
    }

    // --- TÍTULO ---
    function createTextSprite(text, fontSize = 48, color = '#ff8800') {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = 512;
      canvas.height = 128;
      ctx.shadowColor = 'rgba(0,0,0,0.8)';
      ctx.shadowBlur = 20;
      ctx.font = `bold ${fontSize}px 'Segoe UI', Arial, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(255,100,0,0.3)';
      ctx.shadowBlur = 30;
      ctx.fillStyle = color;
      ctx.fillText(text, canvas.width/2, canvas.height/2);
      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        depthTest: false,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(6, 1.5, 1);
      return sprite;
    }

    const titleSprite = createTextSprite('₿ MONERO', 56, '#ffaa44');
    titleSprite.position.set(0, 3.8, 0);
    titleSprite.scale.set(7, 1.8, 1);
    scene.add(titleSprite);

    // --- ÓRBITAS DOS PLANETAS ---
    function createOrbitLines() {
      const orbitGroup = new THREE.Group();
      for (let orbit = 0; orbit < ORBIT_CONFIG.numPlanetOrbits; orbit++) {
        const radius = ORBIT_CONFIG.sunRadius + 1.5 + orbit * ORBIT_CONFIG.planetOrbitSpacing;
        const points = [];
        const segments = 64;
        for (let i = 0; i <= segments; i++) {
          const angle = (i / segments) * Math.PI * 2;
          points.push(new THREE.Vector3(Math.cos(angle) * radius, 0, Math.sin(angle) * radius));
        }
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        const material = new THREE.LineBasicMaterial({
          color: 0x334466,
          transparent: true,
          opacity: 0.08 + (orbit / ORBIT_CONFIG.numPlanetOrbits) * 0.15
        });
        const orbitLine = new THREE.Line(geometry, material);
        orbitGroup.add(orbitLine);
      }
      return orbitGroup;
    }

    const orbitLines = createOrbitLines();
    scene.add(orbitLines);

    // ------------------------------------------------------------
    // FUNÇÃO PARA CRIAR SPRITE DE TEXTO 3D (NOME DO PLANETA)
    // ------------------------------------------------------------
    function createPlanetLabel(text, fontSize = 32, color = '#ffffff') {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = 512;
      canvas.height = 128;
      
      ctx.shadowColor = 'rgba(0,0,0,0.9)';
      ctx.shadowBlur = 15;
      ctx.font = `bold ${fontSize}px 'Segoe UI', Arial, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,0,0,0.8)';
      ctx.shadowBlur = 20;
      ctx.fillStyle = color;
      ctx.fillText(text, canvas.width/2, canvas.height/2 + 4);
      
      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        depthTest: false,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(1.2, 0.35, 1);
      return sprite;
    }

    // --- HIERARQUIA: PLANETAS E LUAS COM TEXTURAS MAPEADAS ---
    const planets = [];
    const planetMeshes = [];
    const moonMeshes = [];
    const moonDataStore = {};

    PLANET_DATA.forEach((data, index) => {
      // Grupo do planeta (órbita ao redor do sol)
      const planetGroup = new THREE.Group();
      
      // Mesh do planeta
      const texture = textureLoader.load(data.textureUrl);
      const geo = new THREE.SphereGeometry(data.size, 32, 32);
      const mat = new THREE.MeshStandardMaterial({
        map: texture,
        roughness: data.isDocs ? 0.3 : 0.5 + (index % 3) * 0.15,
        metalness: data.isDocs ? 0.1 : 0.2 + (index % 4) * 0.1,
        emissive: data.isDocs ? new THREE.Color(0xff8800) : new THREE.Color(0x222222),
        emissiveIntensity: data.isDocs ? 0.15 : 0.02
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.userData = { 
        index, 
        isPlanet: true,
        planetData: data
      };
      planetGroup.add(mesh);
      planetMeshes.push(mesh);

      // --- TEXTO 3D COM O NOME DO PLANETA ---
      const label = createPlanetLabel(data.name, 28, '#ffaa66');
      label.position.set(0, data.size + 0.25, 0);
      planetGroup.add(label);

      // Atmosfera para o Planeta Docs
      if (data.isDocs) {
        const atmosGeo = new THREE.SphereGeometry(data.size * 1.04, 24, 24);
        const atmosMat = new THREE.MeshBasicMaterial({
          color: 0xff8800,
          transparent: true,
          opacity: 0.08,
          wireframe: true
        });
        const atmosMesh = new THREE.Mesh(atmosGeo, atmosMat);
        planetGroup.add(atmosMesh);
      }

      // Posicionar o planeta na órbita
      planetGroup.position.set(
        Math.cos(data.angle) * data.distance,
        data.verticalOffset || 0,
        Math.sin(data.angle) * data.distance
      );
      
      planetGroup.userData = {
        planetData: data,
        angle: data.angle,
        distance: data.distance,
        speed: data.speed,
        index,
        verticalOffset: data.verticalOffset || 0
      };
      
      scene.add(planetGroup);
      planets.push(planetGroup);

      // --- CRIAR LUAS ---
      const moons = data.moons || [];
      const moonGroupList = [];

      moons.forEach((moonData, moonIdx) => {
        const moonGroup = new THREE.Group();
        const moonTexture = textureLoader.load(moonData.textureUrl);
        const moonGeo = new THREE.SphereGeometry(moonData.size, 16, 16);
        const moonMat = new THREE.MeshStandardMaterial({
          map: moonTexture,
          roughness: 0.7,
          metalness: 0.1,
        });
        const moonMesh = new THREE.Mesh(moonGeo, moonMat);
        moonMesh.castShadow = true;
        moonMesh.receiveShadow = true;
        moonMesh.userData = {
          isMoon: true,
          planetIndex: index,
          moonIndex: moonIdx,
          moonData: moonData
        };
        moonGroup.add(moonMesh);

        // Pequena aura para a lua
        const auraMoonGeo = new THREE.SphereGeometry(moonData.size * 1.6, 8, 8);
        const auraMoonMat = new THREE.MeshBasicMaterial({
          color: 0x4488ff,
          transparent: true,
          opacity: 0.05,
          wireframe: true
        });
        const auraMoonMesh = new THREE.Mesh(auraMoonGeo, auraMoonMat);
        moonGroup.add(auraMoonMesh);

        // Posicionar a lua em relação ao planeta
        const moonAngle = moonData.angle || Math.random() * Math.PI * 2;
        const moonDist = moonData.distance || 0.3;
        moonGroup.position.set(
          Math.cos(moonAngle) * moonDist,
          (Math.random() - 0.5) * 0.05,
          Math.sin(moonAngle) * moonDist
        );

        moonGroup.userData = {
          moonData: moonData,
          angle: moonAngle,
          distance: moonDist,
          speed: moonData.speed || 0.5,
          planetIndex: index,
          moonIndex: moonIdx
        };

        planetGroup.add(moonGroup);
        moonGroupList.push(moonGroup);
        moonMeshes.push(moonMesh);

        if (!moonDataStore[index]) {
          moonDataStore[index] = [];
        }
        moonDataStore[index].push({
          ...moonData,
          mesh: moonMesh,
          group: moonGroup
        });
      });

      planetGroup.userData.moonGroups = moonGroupList;
    });

    const sunMeshForRaycast = sunMesh;

    // --- NAVEGAÇÃO ---
    let isZooming = false;
    let zoomTarget = null;
    let zoomProgress = 0;
    let zoomStartPos = new THREE.Vector3();
    let zoomEndPos = new THREE.Vector3();
    let zoomStartTarget = new THREE.Vector3();
    let zoomEndTarget = new THREE.Vector3();
    const ZOOM_DURATION = 1.5;
    const ZOOM_DISTANCE_PLANET = 2.0;
    const ZOOM_DISTANCE_SUN = 5.0;

    const zoomIndicator = document.getElementById('zoom-indicator');

    function startZoomToPlanet(index) {
      const data = PLANET_DATA[index];
      if (!data) return;
      
      const planetGroup = planets[index];
      if (!planetGroup) return;
      
      const worldPos = new THREE.Vector3();
      planetGroup.getWorldPosition(worldPos);
      
      const direction = new THREE.Vector3().subVectors(camera.position, worldPos).normalize();
      const finalPos = worldPos.clone().add(direction.multiplyScalar(ZOOM_DISTANCE_PLANET));
      
      zoomStartPos.copy(camera.position);
      zoomEndPos.copy(finalPos);
      zoomStartTarget.copy(targetPosition);
      zoomEndTarget.copy(worldPos);
      
      zoomProgress = 0;
      isZooming = true;
      zoomTarget = index;
      
      zoomIndicator.textContent = `🔭 Navegando para ${data.name}...`;
      zoomIndicator.classList.add('show');
      
      card.classList.remove('active');
    }

    function startZoomToSun() {
      const worldPos = new THREE.Vector3(0, 0, 0);
      
      const direction = new THREE.Vector3().subVectors(camera.position, worldPos).normalize();
      const finalPos = worldPos.clone().add(direction.multiplyScalar(ZOOM_DISTANCE_SUN));
      
      zoomStartPos.copy(camera.position);
      zoomEndPos.copy(finalPos);
      zoomStartTarget.copy(targetPosition);
      zoomEndTarget.copy(worldPos);
      
      zoomProgress = 0;
      isZooming = true;
      zoomTarget = 'sun';
      
      zoomIndicator.textContent = `🔭 Navegando para o Sol Monero...`;
      zoomIndicator.classList.add('show');
      
      card.classList.remove('active');
    }

    function resetCameraToInitial() {
      if (isZooming) return;
      
      zoomStartPos.copy(camera.position);
      zoomEndPos.copy(INITIAL_CAMERA_POS);
      zoomStartTarget.copy(targetPosition);
      zoomEndTarget.copy(INITIAL_TARGET_POS);
      
      zoomProgress = 0;
      isZooming = true;
      zoomTarget = 'reset';
      
      zoomIndicator.textContent = `🔭 Retornando à vista inicial...`;
      zoomIndicator.classList.add('show');
      
      card.classList.remove('active');
    }

    function updateZoom(delta) {
      if (!isZooming) return;
      
      zoomProgress += delta / ZOOM_DURATION;
      
      if (zoomProgress >= 1) {
        zoomProgress = 1;
        isZooming = false;
        zoomIndicator.classList.remove('show');
        zoomTarget = null;
      }
      
      const t = zoomProgress < 0.5 ? 2 * zoomProgress * zoomProgress : 1 - Math.pow(-2 * zoomProgress + 2, 2) / 2;
      
      camera.position.lerpVectors(zoomStartPos, zoomEndPos, t);
      targetPosition.lerpVectors(zoomStartTarget, zoomEndTarget, t);
      
      const offset = new THREE.Vector3().subVectors(camera.position, targetPosition);
      cameraRadius = offset.length();
      cameraTheta = Math.atan2(offset.x, offset.z);
      cameraPhi = Math.acos(offset.y / cameraRadius);
      
      camera.lookAt(targetPosition);
    }

    // --- FUNÇÕES DA CÂMARA ---
    function updateCameraFromAngles() {
      if (isZooming) return;
      const offset = new THREE.Vector3(
        cameraRadius * Math.sin(cameraPhi) * Math.sin(cameraTheta),
        cameraRadius * Math.cos(cameraPhi),
        cameraRadius * Math.sin(cameraPhi) * Math.cos(cameraTheta)
      );
      cameraPosition.copy(targetPosition).add(offset);
      camera.position.copy(cameraPosition);
      camera.lookAt(targetPosition);
    }

    // --- CONTROLES ---
    let touchStartX = 0, touchStartY = 0;
    let touchStartDist = 0;
    let isTouching = false;
    let isPinching = false;
    let velocityX = 0, velocityY = 0;
    let touchMoveCount = 0;
    const DAMPING = 0.92;
    const SENSITIVITY = 0.008;
    const MOVE_SENSITIVITY = 0.04;
    let touchClickCount = 0;
    let touchClickTimer = null;

    renderer.domElement.addEventListener('touchstart', (e) => {
      if (isZooming) return;
      if (e.touches.length === 1) {
        const touch = e.touches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
        isTouching = true;
        isPinching = false;
        velocityX = 0;
        velocityY = 0;
        touchMoveCount = 0;
        
        const rect = renderer.domElement.getBoundingClientRect();
        const x = ((touch.clientX) - rect.left) / rect.width * 2 - 1;
        const y = -((touch.clientY) - rect.top) / rect.height * 2 + 1;
        mouse2.set(x, y);
        raycaster.setFromCamera(mouse2, camera);
        
        const allMeshes = [...planetMeshes, ...moonMeshes, sunMeshForRaycast];
        const intersects = raycaster.intersectObjects(allMeshes);
        
        if (intersects.length === 0) {
          touchClickCount++;
          if (touchClickCount >= 3) {
            resetCameraToInitial();
            touchClickCount = 0;
            if (touchClickTimer) {
              clearTimeout(touchClickTimer);
              touchClickTimer = null;
            }
          } else {
            if (touchClickTimer) {
              clearTimeout(touchClickTimer);
            }
            touchClickTimer = setTimeout(() => {
              touchClickCount = 0;
              touchClickTimer = null;
            }, 1000);
          }
        } else {
          touchClickCount = 0;
          if (touchClickTimer) {
            clearTimeout(touchClickTimer);
            touchClickTimer = null;
          }
        }
      } else if (e.touches.length === 2) {
        isPinching = true;
        isTouching = false;
        touchStartDist = getTouchDistance(e.touches);
      }
    }, { passive: true });

    renderer.domElement.addEventListener('touchmove', (e) => {
      if (isZooming) return;
      e.preventDefault();
      if (e.touches.length === 1 && isTouching) {
        const touch = e.touches[0];
        const dx = touch.clientX - touchStartX;
        const dy = touch.clientY - touchStartY;
        touchMoveCount++;
        if (touchMoveCount < 3 && Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
        
        const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
        forward.y = 0;
        forward.normalize();
        const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
        right.y = 0;
        right.normalize();
        const moveVector = new THREE.Vector3();
        moveVector.add(right.clone().multiplyScalar(-dx * MOVE_SENSITIVITY * 0.5));
        moveVector.add(forward.clone().multiplyScalar(dy * MOVE_SENSITIVITY * 0.5));
        cameraPosition.add(moveVector);
        targetPosition.add(moveVector);
        cameraTheta -= dx * SENSITIVITY * 0.3;
        cameraPhi += dy * SENSITIVITY * 0.15;
        cameraPhi = Math.max(minPhi, Math.min(maxPhi, cameraPhi));
        velocityX = -dx * SENSITIVITY * 0.5;
        velocityY = dy * SENSITIVITY * 0.3;
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
        updateCameraFromAngles();
      } else if (e.touches.length === 2 && isPinching) {
        const dist = getTouchDistance(e.touches);
        const delta = dist - touchStartDist;
        cameraRadius = Math.max(minRadius, Math.min(maxRadius, cameraRadius - delta * 0.08));
        touchStartDist = dist;
        updateCameraFromAngles();
      }
    }, { passive: false });

    renderer.domElement.addEventListener('touchend', (e) => {
      if (e.touches.length < 2) isPinching = false;
      if (e.touches.length === 0) {
        isTouching = false;
        isPinching = false;
      }
    }, { passive: true });

    function getTouchDistance(touches) {
      if (touches.length < 2) return 0;
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.sqrt(dx*dx + dy*dy);
    }

    // --- CONTROLES POR MOUSE ---
    let mouseDown = false;
    let mouseX = 0, mouseY = 0;
    let isDragging = false;
    let dragStartX = 0, dragStartY = 0;
    let clickTimer = null;
    let clickCount = 0;
    let doubleClickTimer = null;

    renderer.domElement.addEventListener('mousedown', (e) => {
      if (isZooming) return;
      mouseDown = true;
      mouseX = e.clientX;
      mouseY = e.clientY;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      isDragging = false;
    });

    window.addEventListener('mousemove', (e) => {
      if (isZooming) return;
      if (mouseDown) {
        const dx = e.clientX - mouseX;
        const dy = e.clientY - mouseY;
        if (Math.abs(e.clientX - dragStartX) > 5 || Math.abs(e.clientY - dragStartY) > 5) {
          isDragging = true;
          clickCount = 0;
          if (clickTimer) {
            clearTimeout(clickTimer);
            clickTimer = null;
          }
          if (doubleClickTimer) {
            clearTimeout(doubleClickTimer);
            doubleClickTimer = null;
          }
        }
        if (isDragging) {
          const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
          forward.y = 0;
          forward.normalize();
          const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
          right.y = 0;
          right.normalize();
          const moveVector = new THREE.Vector3();
          moveVector.add(right.clone().multiplyScalar(-dx * MOVE_SENSITIVITY * 0.5));
          moveVector.add(forward.clone().multiplyScalar(dy * MOVE_SENSITIVITY * 0.5));
          cameraPosition.add(moveVector);
          targetPosition.add(moveVector);
          cameraTheta -= dx * SENSITIVITY * 0.3;
          cameraPhi += dy * SENSITIVITY * 0.15;
          cameraPhi = Math.max(minPhi, Math.min(maxPhi, cameraPhi));
          mouseX = e.clientX;
          mouseY = e.clientY;
          updateCameraFromAngles();
        }
      }
    });

    window.addEventListener('mouseup', (e) => {
      if (mouseDown && !isDragging) {
        const rect = renderer.domElement.getBoundingClientRect();
        const x = ((e.clientX || e.pageX) - rect.left) / rect.width * 2 - 1;
        const y = -((e.clientY || e.pageY) - rect.top) / rect.height * 2 + 1;
        mouse2.set(x, y);
        raycaster.setFromCamera(mouse2, camera);
        
        const allMeshes = [...planetMeshes, ...moonMeshes, sunMeshForRaycast];
        const intersects = raycaster.intersectObjects(allMeshes);
        
        if (intersects.length === 0) {
          clickCount++;
          if (clickCount >= 3) {
            resetCameraToInitial();
            clickCount = 0;
            if (clickTimer) {
              clearTimeout(clickTimer);
              clickTimer = null;
            }
          } else {
            if (clickTimer) {
              clearTimeout(clickTimer);
            }
            clickTimer = setTimeout(() => {
              clickCount = 0;
              clickTimer = null;
            }, 1000);
          }
        } else {
          clickCount = 0;
          if (clickTimer) {
            clearTimeout(clickTimer);
            clickTimer = null;
          }
        }
        
        if (intersects.length > 0) {
          const hit = intersects[0].object;
          
          if (doubleClickTimer) {
            clearTimeout(doubleClickTimer);
            doubleClickTimer = null;
            
            if (hit.userData.isSun) {
              showSunCard();
            } else if (hit.userData.isPlanet) {
              const index = hit.userData.index;
              if (index !== undefined) {
                showPlanetCard(index);
                selectedPlanetIndex = index;
              }
            } else if (hit.userData.isMoon) {
              const planetIdx = hit.userData.planetIndex;
              const moonIdx = hit.userData.moonIndex;
              if (planetIdx !== undefined && moonIdx !== undefined) {
                showMoonCard(planetIdx, moonIdx);
              }
            }
          } else {
            doubleClickTimer = setTimeout(() => {
              doubleClickTimer = null;
              if (hit.userData.isSun) {
                startZoomToSun();
              } else if (hit.userData.isPlanet) {
                const index = hit.userData.index;
                if (index !== undefined) {
                  startZoomToPlanet(index);
                }
              } else if (hit.userData.isMoon) {
                const planetIdx = hit.userData.planetIndex;
                if (planetIdx !== undefined) {
                  startZoomToPlanet(planetIdx);
                }
              }
            }, 300);
          }
        } else {
          card.classList.remove('active');
        }
      }
      mouseDown = false;
      isDragging = false;
    });

    renderer.domElement.addEventListener('wheel', (e) => {
      if (isZooming) return;
      e.preventDefault();
      cameraRadius += e.deltaY * 0.03;
      cameraRadius = Math.max(minRadius, Math.min(maxRadius, cameraRadius));
      updateCameraFromAngles();
    }, { passive: false });

    // --- SELETORES ---
    const raycaster = new THREE.Raycaster();
    const mouse2 = new THREE.Vector2();
    let selectedPlanetIndex = null;

    // --- CARD ---
    const card = document.getElementById('planet-card');
    const closeBtn = document.getElementById('close-card');
    const planetName = document.getElementById('planet-name');
    const planetSubtitle = document.getElementById('planet-subtitle');
    const planetDesc = document.getElementById('planet-desc');
    const planetLink = document.getElementById('planet-link-info');
    const sunPrice = document.getElementById('sun-price-info');

    function updateSunPriceDisplay() {
      const priceText = currentPrice ? `$ ${currentPrice.toFixed(2)} USD` : 'carregando...';
      const change = priceChangePercent || 0;
      const sign = change >= 0 ? '+' : '';
      const changeText = `${sign}${change.toFixed(2)}%`;
      
      let changeClass = '';
      if (change > 0) changeClass = 'change-positive';
      else if (change < 0) changeClass = 'change-negative';
      else changeClass = 'change-neutral';
      
      sunPrice.innerHTML = `☀️ Preço XMR: ${priceText} <span class="${changeClass}">(${changeText})</span>`;
    }

    function showPlanetCard(index) {
      const data = PLANET_DATA[index];
      if (!data) return;
      planetName.textContent = data.name;
      planetSubtitle.textContent = data.subtitle;
      planetDesc.textContent = data.desc;
      planetLink.innerHTML = `🔗 <a href="${data.link}" target="_blank">${data.link}</a>`;
      sunPrice.style.display = 'none';
      card.classList.add('active');
    }

    function showMoonCard(planetIdx, moonIdx) {
      const moons = moonDataStore[planetIdx];
      if (!moons || !moons[moonIdx]) return;
      const moon = moons[moonIdx];
      const planetData = PLANET_DATA[planetIdx];
      planetName.textContent = `🌙 ${moon.name}`;
      planetSubtitle.textContent = `Lua de ${planetData.name}`;
      planetDesc.textContent = moon.desc || `Lua orbitando o planeta ${planetData.name}.`;
      planetLink.innerHTML = `🔗 <a href="${moon.link || planetData.link}" target="_blank">${moon.link || planetData.link}</a>`;
      sunPrice.style.display = 'none';
      card.classList.add('active');
    }

    function showSunCard() {
      planetName.textContent = SUN_DATA.name;
      planetSubtitle.textContent = SUN_DATA.subtitle;
      planetDesc.textContent = SUN_DATA.desc;
      planetLink.innerHTML = `🔗 <a href="https://docs.getmonero.org/" target="_blank">docs.getmonero.org</a>`;
      sunPrice.style.display = 'block';
      updateSunPriceDisplay();
      card.classList.add('active');
    }

    closeBtn.addEventListener('click', () => {
      card.classList.remove('active');
      sunPrice.style.display = 'block';
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        card.classList.remove('active');
        sunPrice.style.display = 'block';
      }
    });

    // --- ANIMAÇÃO ---
    const clock = new THREE.Clock();

    function animate() {
      const delta = clock.getDelta();
      const time = clock.getElapsedTime();

      // Atualizar ebulição da aura
      if (auraMat.opacity > 0) {
        const positions = auraGeo.attributes.position;
        const array = positions.array;
        const base = auraMesh.userData.basePositions;
        const offsets = auraMesh.userData.noiseOffsets;
        
        for (let i = 0; i < vertexCount; i++) {
          const i3 = i * 3;
          const noise = offsets[i];
          const wave1 = Math.sin(time * noise.speed + noise.x) * noise.amplitude;
          const wave2 = Math.cos(time * noise.speed * 0.7 + noise.y) * noise.amplitude * 0.6;
          const wave3 = Math.sin(time * noise.speed * 0.5 + noise.z) * noise.amplitude * 0.4;
          
          const x = base[i3];
          const y = base[i3+1];
          const z = base[i3+2];
          const len = Math.sqrt(x*x + y*y + z*z);
          const normX = x / len;
          const normY = y / len;
          const normZ = z / len;
          
          const displacement = wave1 + wave2 + wave3;
          array[i3] = x + normX * displacement;
          array[i3+1] = y + normY * displacement;
          array[i3+2] = z + normZ * displacement;
        }
        positions.needsUpdate = true;
        
        const pulse = Math.sin(time * 1.5) * 0.15 + 0.85;
        auraMat.opacity = (auraMesh.userData.baseOpacity || 0.8) * pulse;
        
        const scalePulse = 1 + Math.sin(time * 0.8) * 0.02;
        auraMesh.scale.set(scalePulse, scalePulse, scalePulse);
      }

      if (isZooming) {
        updateZoom(delta);
      }

      if (!isTouching && !mouseDown && !isPinching && !isZooming) {
        if (Math.abs(velocityX) > 0.0001 || Math.abs(velocityY) > 0.0001) {
          cameraTheta += velocityX;
          cameraPhi += velocityY * 0.3;
          cameraPhi = Math.max(minPhi, Math.min(maxPhi, cameraPhi));
          velocityX *= DAMPING;
          velocityY *= DAMPING;
          updateCameraFromAngles();
        }
      }

      // Movimento orbital dos planetas
      planets.forEach((group, i) => {
        const data = group.userData;
        if (!data) return;
        data.angle += delta * data.speed * 0.15;
        group.position.x = Math.cos(data.angle) * data.distance;
        group.position.z = Math.sin(data.angle) * data.distance;
        group.position.y = data.verticalOffset + Math.sin(time * 0.2 + i * 0.3) * 0.15;
        const mesh = group.children[0];
        if (mesh) mesh.rotation.y += delta * 0.1;

        // Movimento orbital das luas
        const moonGroups = data.moonGroups || [];
        moonGroups.forEach((moonGroup, moonIdx) => {
          const moonData = moonGroup.userData;
          if (!moonData) return;
          moonData.angle += delta * moonData.speed * 0.4;
          const dist = moonData.distance || 0.3;
          moonGroup.position.x = Math.cos(moonData.angle) * dist;
          moonGroup.position.z = Math.sin(moonData.angle) * dist;
          moonGroup.position.y = Math.sin(time * 0.3 + i * 0.5 + moonIdx) * 0.02;
          const moonMesh = moonGroup.children[0];
          if (moonMesh) moonMesh.rotation.y += delta * 0.1;
        });
      });

      sunMesh.rotation.y += delta * 0.05;

      starField.rotation.y += delta * 0.001;
      starField.rotation.x += delta * 0.0005;
      nebula.rotation.y += delta * 0.0008;
      nebula.rotation.x += delta * 0.0004;

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    animate();

    // --- RESPONSIVIDADE ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- LOADING ---
    setTimeout(() => {
      document.getElementById('loading').classList.add('hide');
    }, 1200);

    // --- BUSCAR PREÇO ---
    fetchPrice();
    setInterval(fetchPrice, 30000);

    setInterval(() => {
      if (card.classList.contains('active') && planetName.textContent === SUN_DATA.name) {
        updateSunPriceDisplay();
      }
    }, 5000);

    updateCameraFromAngles();
    console.log('🚀 Sistema Solar Monero com dados fixos!');
  </script>
</body>
</html>
