<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento com Monero</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">Pagar com Monero</h1>
        
        <!-- Área do QR Code -->
        <div class="bg-gray-200 w-48 h-48 mx-auto mb-6 flex items-center justify-center rounded-lg border-2 border-dashed border-gray-400">
            <span class="text-gray-500 text-sm">QR Code (Inserir aqui)</span>
        </div>

        <p class="text-gray-600 mb-4">Envie <b>1.5 XMR</b> para o endereço abaixo:</p>

        <!-- Endereço para copiar -->
        <div class="bg-gray-50 p-3 rounded border border-gray-200 mb-6 break-all text-xs font-mono text-gray-700">
            45GjcbHh1fvEyXEA6mDAKqNDMmy1Gon6CNHrdhp9hghfLXQNQj4J76TLtwYGoooKApWLM7kaZwdAxLycceHmuVcELCSFPHq
        </div>

        <div class="flex flex-col gap-3">
            <!-- Botão de protocolo monero: -->
            <a href="monero:45GjcbHh1fvEyXEA6mDAKqNDMmy1Gon6CNHrdhp9hghfLXQNQj4J76TLtwYGoooKApWLM7kaZwdAxLycceHmuVcELCSFPHq?tx_amount=1.5" 
               class="bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 px-6 rounded-lg transition duration-200">
                Abrir na Carteira
            </a>

            <!-- Botão de cópia manual -->
            <button onclick="copiarEndereco()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-3 px-6 rounded-lg transition duration-200">
                Copiar Endereço
            </button>
        </div>
        
        <p id="mensagem" class="mt-4 text-green-600 font-medium hidden">Endereço copiado!</p>
    </div>

    <script>
        function copiarEndereco() {
            const endereco = "45GjcbHh1fvEyXEA6mDAKqNDMmy1Gon6CNHrdhp9hghfLXQNQj4J76TLtwYGoooKApWLM7kaZwdAxLycceHmuVcELCSFPHq";
            navigator.clipboard.writeText(endereco).then(() => {
                const msg = document.getElementById('mensagem');
                msg.classList.remove('hidden');
                setTimeout(() => msg.classList.add('hidden'), 2000);
            });
        }
    </script>
</body>
</html>
