<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WowOS - Wownero Dedicated System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --wow-orange: #ff9d00;
            --wow-purple: #9b59b6;
            --wow-dark: #0f0f0f;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: white;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .pixel-font { font-family: 'Fira Code', monospace; }

        .glass {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 157, 0, 0.3);
        }

        .window {
            position: absolute;
            min-width: 300px;
            min-height: 200px;
            z-index: 10;
            display: none;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .scanline::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(255, 157, 0, 0.1);
            animation: scanline 8s linear infinite;
            pointer-events: none;
        }

        /* Mobile specific adjustments */
        @media (max-width: 640px) {
            .window {
                width: 100% !important;
                height: calc(100% - 60px) !important;
                top: 0 !important;
                left: 0 !important;
                transform: none !important;
            }
        }
    </style>
</head>
<body class="scanline select-none">

    <div id="boot-screen" class="fixed inset-0 bg-black z-[100] flex flex-col p-8 pixel-font text-orange-500 overflow-hidden">
        <div id="boot-log"></div>
        <div id="boot-cursor" class="w-2 h-5 bg-orange-500 mt-2 animate-pulse"></div>
    </div>

    <main id="desktop" class="relative w-full h-full bg-cover bg-center hidden" style="background-image: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&q=80&w=2070');">
        
        <!-- Wallpaper Overlay -->
        <div class="absolute inset-0 bg-black/40"></div>

        <!-- App Icons Grid -->
        <div class="relative z-10 p-6 grid grid-cols-3 sm:grid-cols-1 gap-6 w-fit">
            <div onclick="openApp('wallet')" class="group flex flex-col items-center gap-2 cursor-pointer w-20">
                <div class="w-14 h-14 bg-orange-500 rounded-2xl flex items-center justify-center text-3xl group-hover:scale-110 transition-transform shadow-lg">💰</div>
                <span class="text-xs font-bold text-center drop-shadow-md">Much Wallet</span>
            </div>
            <div onclick="openApp('terminal')" class="group flex flex-col items-center gap-2 cursor-pointer w-20">
                <div class="w-14 h-14 bg-zinc-800 rounded-2xl border border-orange-500/50 flex items-center justify-center text-3xl group-hover:scale-110 transition-transform shadow-lg">💻</div>
                <span class="text-xs font-bold text-center drop-shadow-md">Wow Terminal</span>
            </div>
            <div onclick="openApp('stats')" class="group flex flex-col items-center gap-2 cursor-pointer w-20">
                <div class="w-14 h-14 bg-purple-600 rounded-2xl flex items-center justify-center text-3xl group-hover:scale-110 transition-transform shadow-lg">📈</div>
                <span class="text-xs font-bold text-center drop-shadow-md">Very Stats</span>
            </div>
        </div>

        
        <!-- Wallet Window -->
        <div id="app-wallet" class="window glass rounded-xl overflow-hidden" style="top: 10%; left: 20%; width: 400px;">
            <div class="bg-white/10 p-3 flex justify-between items-center cursor-move window-header">
                <span class="text-sm font-bold">💰 Much Wallet v1.0</span>
                <button onclick="closeApp('wallet')" class="text-red-400 hover:text-red-200">✕</button>
            </div>
            <div class="p-6 flex flex-col gap-4">
                <div class="bg-black/50 p-4 rounded-lg border border-orange-500/30">
                    <p class="text-xs text-gray-400 uppercase">Seu Saldo</p>
                    <h2 class="text-3xl font-bold text-orange-400">420.69 WOW</h2>
                </div>
                <button class="bg-orange-600 hover:bg-orange-500 p-3 rounded-lg font-bold transition-colors">Enviar Wow</button>
                <button class="bg-zinc-800 hover:bg-zinc-700 p-3 rounded-lg font-bold border border-white/10 transition-colors">Receber Wow</button>
            </div>
        </div>

        <!-- Terminal Window -->
        <div id="app-terminal" class="window glass rounded-xl overflow-hidden" style="top: 15%; left: 25%; width: 500px; height: 350px;">
            <div class="bg-white/10 p-3 flex justify-between items-center cursor-move window-header">
                <span class="text-sm font-bold pixel-font">💻 wow-terminal</span>
                <button onclick="closeApp('terminal')" class="text-red-400 hover:text-red-200">✕</button>
            </div>
            <div class="p-4 flex-1 pixel-font text-sm text-green-400 overflow-y-auto" id="terminal-content">
                <p>> welcome to wow-os 4.0</p>
                <p>> type 'help' for commands</p>
                <div class="flex gap-2 mt-2">
                    <span>$</span>
                    <input type="text" id="terminal-input" class="bg-transparent border-none outline-none w-full text-green-400" autofocus>
                </div>
            </div>
        </div>

        <!-- Stats Window -->
        <div id="app-stats" class="window glass rounded-xl overflow-hidden" style="top: 20%; left: 30%; width: 450px;">
            <div class="bg-white/10 p-3 flex justify-between items-center cursor-move window-header">
                <span class="text-sm font-bold">📈 Very Stats</span>
                <button onclick="closeApp('stats')" class="text-red-400 hover:text-red-200">✕</button>
            </div>
            <div class="p-4 grid grid-cols-2 gap-4">
                <div class="p-3 bg-white/5 rounded">
                    <p class="text-[10px] text-gray-400">Bloco Atual</p>
                    <p class="font-bold">#1,234,567</p>
                </div>
                <div class="p-3 bg-white/5 rounded">
                    <p class="text-[10px] text-gray-400">Hashrate</p>
                    <p class="font-bold">69.42 MH/s</p>
                </div>
                <div class="p-3 bg-white/5 rounded">
                    <p class="text-[10px] text-gray-400">Dificuldade</p>
                    <p class="font-bold">Much High</p>
                </div>
                <div class="p-3 bg-white/5 rounded">
                    <p class="text-[10px] text-gray-400">Nós Conectados</p>
                    <p class="font-bold">1337</p>
                </div>
            </div>
        </div>

        <nav class="absolute bottom-0 w-full h-14 glass border-t border-orange-500/30 z-50 flex items-center px-4 justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-orange-600 rounded-full flex items-center justify-center cursor-pointer hover:bg-orange-500 shadow-[0_0_15px_rgba(255,157,0,0.5)]">
                    🐕
                </div>
                <div id="active-apps" class="flex gap-2">
                    <!-- Dynamic active apps will show here on mobile -->
                </div>
            </div>
            
            <div class="flex flex-col items-end pr-2">
                <span id="clock" class="text-sm font-bold">00:00:00</span>
                <span class="text-[10px] text-orange-400 font-bold uppercase tracking-widest">Wow Mode Active</span>
            </div>
        </nav>
    </main>

    <script>
        /* Boot Sequence Logic */
        const bootLog = document.getElementById('boot-log');
        const lines = [
            "Initializing WowKernel v4.20.69...",
            "Loading privacy modules...",
            "Connecting to Wownero Network...",
            "Much security detected...",
            "Starting GUI...",
            "Welcome to the such privacy era."
        ];

        async function startBoot() {
            for(let line of lines) {
                const p = document.createElement('p');
                p.textContent = `> ${line}`;
                bootLog.appendChild(p);
                await new Promise(r => setTimeout(r, 400 + Math.random() * 600));
            }
            setTimeout(() => {
                document.getElementById('boot-screen').style.display = 'none';
                document.getElementById('desktop').classList.remove('hidden');
            }, 1000);
        }

        /* Window Management */
        function openApp(id) {
            const app = document.getElementById(`app-${id}`);
            app.style.display = 'flex';
            app.style.zIndex = Math.floor(Date.now() / 100000);
        }

        function closeApp(id) {
            document.getElementById(`app-${id}`).style.display = 'none';
        }

        /* Clock Logic */
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        /* Simple Terminal Logic */
        const terminalInput = document.getElementById('terminal-input');
        const terminalContent = document.getElementById('terminal-content');

        terminalInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmd = terminalInput.value.toLowerCase();
                const line = document.createElement('p');
                line.className = 'text-white';
                line.textContent = `$ ${cmd}`;
                terminalContent.insertBefore(line, terminalInput.parentElement);

                const response = document.createElement('p');
                if (cmd === 'help') {
                    response.textContent = "Available: status, balance, whoami, clear";
                } else if (cmd === 'whoami') {
                    response.textContent = "Such User. Very Privacy.";
                } else if (cmd === 'balance') {
                    response.textContent = "420.69 WOW (Locked in much cold storage)";
                } else if (cmd === 'status') {
                    response.textContent = "Network: Synced | Nodes: 1337 | Such: Wow";
                } else if (cmd === 'clear') {
                    terminalContent.innerHTML = '';
                    terminalContent.appendChild(terminalInput.parentElement);
                } else {
                    response.textContent = `Command not found: ${cmd}`;
                }
                
                terminalContent.insertBefore(response, terminalInput.parentElement);
                terminalInput.value = '';
                terminalContent.scrollTop = terminalContent.scrollHeight;
            }
        });

        /* Draggable Logic (Simplificada) */
        let activeWindow = null;
        let offset = { x: 0, y: 0 };

        document.querySelectorAll('.window-header').forEach(header => {
            header.addEventListener('mousedown', (e) => {
                activeWindow = header.parentElement;
                activeWindow.style.zIndex = 1000;
                offset.x = e.clientX - activeWindow.offsetLeft;
                offset.y = e.clientY - activeWindow.offsetTop;
            });
        });

        window.addEventListener('mousemove', (e) => {
            if (activeWindow && window.innerWidth > 640) {
                activeWindow.style.left = (e.clientX - offset.x) + 'px';
                activeWindow.style.top = (e.clientY - offset.y) + 'px';
            }
        });

        window.addEventListener('mouseup', () => {
            activeWindow = null;
        });

        /* Touch support for mobile */
        document.querySelectorAll('.window-header').forEach(header => {
            header.addEventListener('touchstart', (e) => {
                activeWindow = header.parentElement;
                const touch = e.touches[0];
                offset.x = touch.clientX - activeWindow.offsetLeft;
                offset.y = touch.clientY - activeWindow.offsetTop;
            }, {passive: true});
        });

        window.onload = startBoot;
    </script>
</body>
</html>
