# WowneroOS Visual (HTML + CSS + JS)

```html
<!DOCTYPE html>  
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WowneroOS Style</title>

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      font-family: 'VT323', monospace;
      background: #000;
      height: 100vh;
      color: #fff;
    }

    .desktop {
      width: 100%;
      height: 100vh;
      position: relative;
      background:
        radial-gradient(circle at top, rgba(255, 0, 170, 0.35), transparent 45%),
        radial-gradient(circle at bottom, rgba(255, 210, 0, 0.25), transparent 45%),
        linear-gradient(180deg, #1a0014 0%, #12000f 45%, #050505 100%);
      overflow: hidden;
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      transform: perspective(600px) rotateX(75deg);
      transform-origin: center bottom;
      opacity: 0.2;
      bottom: -50%;
    }

    .topbar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 48px;
      background: rgba(20,20,20,0.8);
      border-bottom: 2px solid #ff4fd8;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .logo {
      font-family: 'Press Start 2P', cursive;
      font-size: 12px;
      color: #ff4fd8;
      text-shadow: 0 0 12px #ff4fd8, 0 0 25px rgba(255,79,216,0.8);
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 6px #ff4fd8;
      }
      to {
        text-shadow: 0 0 24px #ff4fd8, 0 0 40px rgba(255,79,216,0.9);
      }
    }

    .clock {
      font-size: 24px;
      color: #ffd43b;
      text-shadow: 0 0 12px #ffd43b;
    }

    .icons {
      position: absolute;
      top: 80px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      z-index: 10;
    }

    .icon {
      width: 90px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }

    .icon:hover {
      transform: scale(1.08);
    }

    .icon-box {
      width: 70px;
      height: 70px;
      margin: auto;
      border-radius: 18px;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 24px rgba(255,79,216,0.5), 0 0 10px rgba(255,212,59,0.25);
    }

    .icon p {
      margin-top: 10px;
      font-size: 20px;
      color: #fff;
      text-shadow: 0 0 10px #000;
    }

    .window {
      width: 520px;
      height: 320px;
      position: absolute;
      top: 120px;
      left: 180px;
      background: rgba(20,20,20,0.85);
      border: 2px solid #ff4fd8;
      border-radius: 20px;
      overflow: hidden;
      backdrop-filter: blur(14px);
      box-shadow: 0 0 40px rgba(255,79,216,0.45), 0 0 80px rgba(255,212,59,0.15);
      animation: pop 0.4s ease;
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .window-header {
      height: 46px;
      background: linear-gradient(90deg, #ff4fd8 0%, #ffb300 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      font-family: 'Press Start 2P', cursive;
      font-size: 10px;
    }

    .buttons {
      display: flex;
      gap: 8px;
    }

    .btn {
      width: 16px;
      height: 16px;
      border-radius: 50%;
    }

    .red {
      background: #ff3b3b;
    }

    .yellow {
      background: #ffcf33;
    }

    .green {
      background: #00ff99;
    }

    .window-content {
      padding: 24px;
      height: calc(100% - 46px);
      overflow-y: auto;
    }

    .terminal {
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      border-radius: 12px;
      padding: 18px;
      color: #ffd43b;
      font-size: 24px;
      box-shadow: inset 0 0 25px rgba(255,212,59,0.2);
    }

    .typing::after {
      content: '_';
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .dock {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 18px;
      background: rgba(255,255,255,0.08);
      padding: 14px 20px;
      border-radius: 24px;
      border: 2px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(255,79,216,0.3), 0 0 60px rgba(255,212,59,0.15);
    }

    .dock-item {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      background: rgba(255,255,255,0.08);
      transition: 0.2s;
      cursor: pointer;
    }

    .dock-item:hover {
      transform: translateY(-8px) scale(1.1);
      box-shadow: 0 0 24px rgba(255,212,59,0.55), 0 0 40px rgba(255,79,216,0.35);
    }

    .particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      opacity: 0.6;
      animation: float linear infinite;
    }

    @keyframes float {
      from {
        transform: translateY(100vh);
      }
      to {
        transform: translateY(-100vh);
      }
    }

    @media (max-width: 768px) {
      .topbar {
        height: 56px;
        padding: 0 14px;
      }

      .logo {
        font-size: 9px;
      }

      .clock {
        font-size: 18px;
      }

      .icons {
        top: 72px;
        left: 12px;
        flex-direction: row;
        width: calc(100% - 24px);
        justify-content: space-between;
        gap: 10px;
      }

      .icon {
        width: 30%;
      }

      .icon-box {
        width: 56px;
        height: 56px;
        font-size: 26px;
        border-radius: 16px;
      }

      .icon p {
        font-size: 16px;
      }

      .window {
        width: calc(100% - 20px);
        height: 52vh;
        left: 10px !important;
        top: 160px !important;
        border-radius: 18px;
      }

      .window-header {
        height: 42px;
        font-size: 8px;
        padding: 0 10px;
      }

      .window-content {
        padding: 12px;
      }

      .terminal {
        font-size: 18px;
        padding: 14px;
        border-radius: 10px;
      }

      .dock {
        width: calc(100% - 20px);
        bottom: 10px;
        gap: 6px;
        padding: 10px;
        border-radius: 18px;
        justify-content: space-between;
      }

      .dock-item {
        width: 48px;
        height: 48px;
        font-size: 22px;
        border-radius: 14px;
      }

      .grid {
        transform: perspective(500px) rotateX(78deg);
      }
    }

    @media (max-width: 480px) {
      .window {
        height: 50vh;
        top: 150px !important;
      }

      .terminal {
        font-size: 16px;
      }

      .dock-item {
        width: 42px;
        height: 42px;
        font-size: 18px;
      }

      .icon-box {
        width: 52px;
        height: 52px;
        font-size: 22px;
      }

      .icon p {
        font-size: 14px;
      }
    }

      .dock {
        gap: 10px;
        padding: 10px 12px;
      }

      .dock-item {
        width: 50px;
        height: 50px;
      }

      .icon-box {
        width: 60px;
        height: 60px;
      }
    }
  </style>
</head>
<body>

  <div class="desktop">

    <div class="grid"></div>

    <div class="particles" id="particles"></div>

    <div class="topbar">
      <div class="logo">WowneroOS</div>
      <div class="clock" id="clock"></div>
    </div>

    <div class="icons">
      <div class="icon">
        <div class="icon-box">💎</div>
        <p>Wallet</p>
      </div>

      <div class="icon">
        <div class="icon-box">🚀</div>
        <p>Apps</p>
      </div>

      <div class="icon">
        <div class="icon-box">🖥️</div>
        <p>Terminal</p>
      </div>
    </div>

    <div class="window">
      <div class="window-header">
        <span>terminal.wownero</span>

        <div class="buttons">
          <div class="btn red"></div>
          <div class="btn yellow"></div>
          <div class="btn green"></div>
        </div>
      </div>

      <div class="window-content">
        <div class="terminal">
          <div>> booting wowneroOS...</div>
          <div>> loading memes...</div>
          <div>> syncing blockchain...</div>
          <br>
          <div class="typing">welcome anon</div>
        </div>
      </div>
    </div>

    <div class="dock">
      <div class="dock-item">🌐</div>
      <div class="dock-item">💬</div>
      <div class="dock-item">📁</div>
      <div class="dock-item">🎵</div>
      <div class="dock-item">⚙️</div>
    </div>

  </div>

  <script>
    function updateClock() {
      const now = new Date();
      const time = now.toLocaleTimeString('pt-BR', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });

      document.getElementById('clock').textContent = time;
    }

    setInterval(updateClock, 1000);
    updateClock();

    const particles = document.getElementById('particles');

    for (let i = 0; i < 80; i++) {
      const p = document.createElement('div');
      p.classList.add('particle');

      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (Math.random() * 10 + 5) + 's';
      p.style.animationDelay = Math.random() * 5 + 's';
      p.style.opacity = Math.random();

      particles.appendChild(p);
    }

    const windowEl = document.querySelector('.window');

    let isDragging = false;
    let offsetX = 0;
    let offsetY = 0;

    const header = document.querySelector('.window-header');

    header.addEventListener('mousedown', (e) => {
      isDragging = true;
      offsetX = e.clientX - windowEl.offsetLeft;
      offsetY = e.clientY - windowEl.offsetTop;
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;

      windowEl.style.left = e.clientX - offsetX + 'px';
      windowEl.style.top = e.clientY - offsetY + 'px';
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
    });
  </script>

</body>
</html>
