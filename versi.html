<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Monero Solar System 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #050510;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      user-select: none;
      touch-action: none;
      cursor: grab;
    }
    body:active { cursor: grabbing; }
    #loading {
      position: fixed;
      inset: 0;
      background: #050510;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 6px;
      color: #ff6600;
      z-index: 1000;
      transition: opacity 1.2s ease;
      text-shadow: 0 0 30px rgba(255,100,0,0.3);
    }
    #loading.hide { opacity: 0; pointer-events: none; }
    #loading span { animation: pulse 1.8s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    #planet-card {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(120%);
      background: rgba(8,8,20,0.92);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,150,50,0.2);
      border-radius: 24px;
      padding: 28px 34px;
      max-width: 460px;
      width: 90%;
      z-index: 200;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s;
      opacity: 0;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      pointer-events: none;
    }
    #planet-card.active {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      pointer-events: auto;
    }
    #planet-card .close-btn {
      position: absolute;
      top: 12px;
      right: 18px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 24px;
      cursor: pointer;
      transition: color 0.2s;
    }
    #planet-card .close-btn:hover { color: #fff; }
    #planet-card h2 {
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #ff8800;
    }
    #planet-card .subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 14px;
      letter-spacing: 1px;
    }
    #planet-card p {
      font-size: 16px;
      line-height: 1.6;
      color: rgba(255,255,255,0.85);
    }
    #planet-card .planet-price {
      margin-top: 14px;
      padding: 10px 16px;
      background: rgba(255,100,0,0.08);
      border-radius: 12px;
      border-left: 3px solid #ff8800;
      font-size: 15px;
      color: #ffaa55;
    }
    #zoom-indicator {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      color: #ffaa44;
      border: 1px solid rgba(255,150,50,0.2);
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
      z-index: 150;
      white-space: nowrap;
    }
    #zoom-indicator.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="loading"><span>₿ MONERO SYSTEM</span></div>
  <div id="planet-card">
    <button class="close-btn" id="close-card">✕</button>
    <h2 id="planet-name">Planeta</h2>
    <div class="subtitle" id="planet-subtitle">Sistema</div>
    <p id="planet-desc">Descrição do planeta.</p>
    <div class="planet-price" id="planet-price-info">Preço XMR: ---</div>
  </div>
  <div id="zoom-indicator">🔭 Navegando para o planeta...</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.126.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.126.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // --- CONFIGURAÇÃO DO SISTEMA SOLAR ---
    const SOLAR_SYSTEM_CONFIG = {
      baseRadius: 3.0,
      orbitSpacing: 0.8,
      planetsPerOrbit: 6,
      maxVerticalOffset: 0.8,
      baseSpeed: 0.08, // Reduzido drasticamente (era 0.3)
      speedVariation: 0.1 // Reduzido (era 0.4)
    };

    function generateOrganizedPlanetData(count = 72) {
      const planets = [];
      const names = [
        'Cypheria', 'Aurora', 'Krypton', 'Nebula', 'Solara',
        'Vortex', 'Pulsar', 'Quasar', 'Nova', 'Cosmos',
        'Eclipse', 'Zenith', 'Orion', 'Lyra', 'Andromeda',
        'Cassiopeia', 'Draco', 'Phoenix', 'Titan', 'Rhea',
        'Themis', 'Mnemosyne', 'Crius', 'Hyperion', 'Iapetus',
        'Phoebe', 'Janus', 'Epimetheus', 'Pandora', 'Prometheus',
        'Atlas', 'Calypso', 'Telesto', 'Helene', 'Polydeuces',
        'Daphnis', 'Pan', 'Mimas', 'Enceladus', 'Tethys',
        'Dione', 'Rhea', 'Titan', 'Iapetus', 'Phoebe',
        'Janus', 'Epimetheus', 'Pandora', 'Prometheus', 'Atlas',
        'Calypso', 'Telesto', 'Helene', 'Polydeuces', 'Daphnis',
        'Pan', 'Mimas', 'Enceladus', 'Tethys', 'Dione',
        'Astraea', 'Ceres', 'Pallas', 'Juno', 'Vesta',
        'Hygiea', 'Interamnia', 'Europa', 'Ganymede', 'Callisto',
        'Io', 'Triton'
      ];
      const colors = [
        0xff6600, 0x44aaff, 0xff4433, 0xaa66ff, 0xffcc00,
        0x66ff66, 0xff66aa, 0x66ccff, 0xffaa66, 0xcc66ff,
        0x66ffcc, 0xff6699, 0x99ccff, 0xffcc66, 0xcc99ff,
        0x66ff99, 0xff6666, 0x66cc99, 0xff99cc, 0x99ffcc
      ];
      const descriptions = [
        'Planeta vibrante com ecossistemas digitais.',
        'Mundo congelado de dados criptografados.',
        'Planeta vulcânico de mineração intensa.',
        'Nebulosa pulsante de mercado volátil.',
        'Estrela brilhante de prova de trabalho.',
        'Vórtice de transações rápidas.',
        'Pulsar de energia blockchain.',
        'Quasar de privacidade absoluta.',
        'Supernova de inovação financeira.',
        'Cosmos descentralizado e seguro.',
        'Eclipse de dados e anonimato.',
        'Zênite da computação distribuída.',
        'Constelação de nós validadores.',
        'Lira de transações harmônicas.',
        'Andrômeda de escalabilidade infinita.',
        'Cassiopéia de contratos inteligentes.',
        'Dragão de proteção de dados.',
        'Fênix de renovação de blocos.',
        'Titã de processamento massivo.',
        'Rhea de estabilidade monetária.'
      ];

      const orbitsNeeded = Math.ceil(count / SOLAR_SYSTEM_CONFIG.planetsPerOrbit);
      let planetIndex = 0;

      for (let orbit = 0; orbit < orbitsNeeded && planetIndex < count; orbit++) {
        const radius = SOLAR_SYSTEM_CONFIG.baseRadius + orbit * SOLAR_SYSTEM_CONFIG.orbitSpacing;
        const planetsInThisOrbit = Math.min(SOLAR_SYSTEM_CONFIG.planetsPerOrbit, count - planetIndex);
        const startAngle = Math.random() * Math.PI * 2;

        for (let pos = 0; pos < planetsInThisOrbit; pos++) {
          const angle = startAngle + (pos / planetsInThisOrbit) * Math.PI * 2;
          const speedFactor = 1 - (orbit / orbitsNeeded) * 0.7;
          const speed = SOLAR_SYSTEM_CONFIG.baseSpeed * speedFactor + (Math.random() - 0.5) * SOLAR_SYSTEM_CONFIG.speedVariation * 0.3;

          const name = names[planetIndex % names.length];
          const color = colors[planetIndex % colors.length];
          const desc = descriptions[planetIndex % descriptions.length];
          const sizeBase = 0.15 + (1 - orbit / orbitsNeeded) * 0.15;
          const size = sizeBase + Math.random() * 0.15;
          const orbitType = ['Núcleo', 'Interna', 'Média', 'Externa', 'Periférica', 'Distante', 'Extrema'][Math.min(orbit, 6)];
          const subtitle = `Sistema Monero • Órbita ${orbit + 1} • ${orbitType}`;

          planets.push({
            name, subtitle, desc, color, size,
            distance: radius,
            speed: Math.max(0.03, speed), // Garantir velocidade mínima bem baixa
            angle: angle,
            verticalOffset: (Math.random() - 0.5) * SOLAR_SYSTEM_CONFIG.maxVerticalOffset * (1 - orbit * 0.05),
            orbitIndex: orbit,
            index: planetIndex
          });
          planetIndex++;
        }
      }
      return planets;
    }

    const PLANET_DATA = generateOrganizedPlanetData(72);

    let currentPrice = 0;
    let priceChangePercent = 0;

    async function fetchPrice() {
      try {
        const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=monero&vs_currencies=usd&include_24hr_change=true');
        const data = await res.json();
        if (data.monero) {
          currentPrice = data.monero.usd;
          priceChangePercent = data.monero.usd_24h_change || 0;
          updatePriceDisplay();
        }
      } catch (e) {
        console.warn('Erro ao buscar preço:', e);
      }
    }

    function updatePriceDisplay() {
      if (priceTextSprite) {
        const text = currentPrice ? `$ ${currentPrice.toFixed(2)}` : '---';
        const change = priceChangePercent || 0;
        const sign = change >= 0 ? '+' : '';
        const fullText = `${text}  ${sign}${change.toFixed(2)}%`;
        updateTextSprite(priceTextSprite, fullText);
      }
    }

    // --- CENA 3D ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
    let cameraPosition = new THREE.Vector3(0, 8, 45);
    let targetPosition = new THREE.Vector3(0, 0, 0);
    let cameraRadius = 45;
    let cameraTheta = 0;
    let cameraPhi = Math.PI / 3;
    const minPhi = 0.1;
    const maxPhi = Math.PI / 1.6;
    const minRadius = 2.0;
    const maxRadius = 90;

    camera.position.copy(cameraPosition);
    camera.lookAt(targetPosition);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // --- LUZES ---
    const ambient = new THREE.AmbientLight(0x222244, 0.5);
    scene.add(ambient);

    const mainLight = new THREE.DirectionalLight(0xffeedd, 1.0);
    mainLight.position.set(10, 20, 5);
    mainLight.castShadow = true;
    scene.add(mainLight);

    const backLight = new THREE.DirectionalLight(0x4488ff, 0.3);
    backLight.position.set(-10, 0, -10);
    scene.add(backLight);

    const sunLight = new THREE.PointLight(0xff6600, 1.5, 40);
    sunLight.position.set(0, 0, 0);
    scene.add(sunLight);

    // --- ESTRELAS ---
    function createStarField() {
      const starsGroup = new THREE.Group();
      const starCount = 8000;
      const positions = new Float32Array(starCount * 3);
      const colors = new Float32Array(starCount * 3);

      for (let i = 0; i < starCount; i++) {
        const radius = 150 + Math.random() * 300;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos((Math.random() * 2) - 1);
        positions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
        positions[i*3+1] = radius * Math.cos(phi);
        positions[i*3+2] = radius * Math.sin(phi) * Math.sin(theta);
        const colorChoice = Math.random();
        if (colorChoice < 0.6) {
          colors[i*3] = 0.8 + Math.random() * 0.2;
          colors[i*3+1] = 0.8 + Math.random() * 0.2;
          colors[i*3+2] = 1.0;
        } else if (colorChoice < 0.8) {
          colors[i*3] = 1.0;
          colors[i*3+1] = 0.8 + Math.random() * 0.2;
          colors[i*3+2] = 0.4 + Math.random() * 0.2;
        } else {
          colors[i*3] = 1.0;
          colors[i*3+1] = 0.3 + Math.random() * 0.3;
          colors[i*3+2] = 0.1 + Math.random() * 0.2;
        }
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      const material = new THREE.PointsMaterial({
        size: 0.15,
        vertexColors: true,
        transparent: true,
        opacity: 0.9,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true
      });
      const stars = new THREE.Points(geometry, material);
      starsGroup.add(stars);

      const bigStarCount = 300;
      const bigPositions = new Float32Array(bigStarCount * 3);
      const bigColors = new Float32Array(bigStarCount * 3);
      for (let i = 0; i < bigStarCount; i++) {
        const radius = 120 + Math.random() * 250;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos((Math.random() * 2) - 1);
        bigPositions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
        bigPositions[i*3+1] = radius * Math.cos(phi);
        bigPositions[i*3+2] = radius * Math.sin(phi) * Math.sin(theta);
        bigColors[i*3] = 0.9 + Math.random() * 0.1;
        bigColors[i*3+1] = 0.8 + Math.random() * 0.2;
        bigColors[i*3+2] = 0.6 + Math.random() * 0.4;
      }
      const bigGeometry = new THREE.BufferGeometry();
      bigGeometry.setAttribute('position', new THREE.BufferAttribute(bigPositions, 3));
      bigGeometry.setAttribute('color', new THREE.BufferAttribute(bigColors, 3));
      const bigMaterial = new THREE.PointsMaterial({
        size: 0.5,
        vertexColors: true,
        transparent: true,
        opacity: 0.7,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true
      });
      const bigStars = new THREE.Points(bigGeometry, bigMaterial);
      starsGroup.add(bigStars);
      return starsGroup;
    }

    const starField = createStarField();
    scene.add(starField);

    // --- NEBULOSA ---
    function createNebula() {
      const nebulaGroup = new THREE.Group();
      for (let i = 0; i < 30; i++) {
        const size = 10 + Math.random() * 30;
        const geometry = new THREE.SphereGeometry(size, 8, 8);
        const material = new THREE.MeshBasicMaterial({
          color: new THREE.Color().setHSL(0.6 + Math.random() * 0.3, 0.5, 0.03 + Math.random() * 0.02),
          transparent: true,
          opacity: 0.2,
          wireframe: true,
          blending: THREE.AdditiveBlending
        });
        const mesh = new THREE.Mesh(geometry, material);
        const radius = 60 + Math.random() * 150;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos((Math.random() * 2) - 1);
        mesh.position.set(
          radius * Math.sin(phi) * Math.cos(theta),
          radius * Math.cos(phi),
          radius * Math.sin(phi) * Math.sin(theta)
        );
        mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
        nebulaGroup.add(mesh);
      }
      return nebulaGroup;
    }

    const nebula = createNebula();
    scene.add(nebula);

    // --- SOL COM PULSO SOLAR ---
    const sunGroup = new THREE.Group();
    
    const sunGeo = new THREE.SphereGeometry(1.2, 48, 48);
    const sunMat = new THREE.MeshStandardMaterial({
      color: 0xff6600,
      emissive: 0xff4400,
      emissiveIntensity: 0.6,
      roughness: 0.2,
      metalness: 0.3
    });
    const sunMesh = new THREE.Mesh(sunGeo, sunMat);
    sunGroup.add(sunMesh);

    const glowGeo = new THREE.SphereGeometry(1.5, 32, 32);
    const glowMat = new THREE.MeshBasicMaterial({
      color: 0xff8800,
      transparent: true,
      opacity: 0.25,
      wireframe: true
    });
    const glowMesh = new THREE.Mesh(glowGeo, glowMat);
    sunGroup.add(glowMesh);

    const ringGeo = new THREE.TorusGeometry(1.8, 0.05, 16, 64);
    const ringMat = new THREE.MeshStandardMaterial({
      color: 0xff8800,
      emissive: 0xff4400,
      emissiveIntensity: 0.5,
      transparent: true,
      opacity: 0.7
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2.5;
    ring.rotation.z = 0.3;
    sunGroup.add(ring);

    const ring2Geo = new THREE.TorusGeometry(2.1, 0.04, 16, 64);
    const ring2Mat = new THREE.MeshStandardMaterial({
      color: 0xffaa44,
      emissive: 0xff6600,
      emissiveIntensity: 0.4,
      transparent: true,
      opacity: 0.5
    });
    const ring2 = new THREE.Mesh(ring2Geo, ring2Mat);
    ring2.rotation.x = Math.PI / 1.8;
    ring2.rotation.z = -0.2;
    sunGroup.add(ring2);

    const ring3Geo = new THREE.TorusGeometry(2.5, 0.03, 16, 64);
    const ring3Mat = new THREE.MeshStandardMaterial({
      color: 0xffaa44,
      emissive: 0xff8800,
      emissiveIntensity: 0.3,
      transparent: true,
      opacity: 0.3
    });
    const ring3 = new THREE.Mesh(ring3Geo, ring3Mat);
    ring3.rotation.x = Math.PI / 2.2;
    ring3.rotation.z = 0.5;
    sunGroup.add(ring3);

    scene.add(sunGroup);

    // --- TEXTO 3D ---
    function createTextSprite(text, fontSize = 48, color = '#ff8800') {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = 512;
      canvas.height = 128;
      ctx.shadowColor = 'rgba(0,0,0,0.8)';
      ctx.shadowBlur = 20;
      ctx.font = `bold ${fontSize}px 'Segoe UI', Arial, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(255,100,0,0.3)';
      ctx.shadowBlur = 30;
      ctx.fillStyle = color;
      ctx.fillText(text, canvas.width/2, canvas.height/2);
      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        depthTest: false,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(6, 1.5, 1);
      return sprite;
    }

    function updateTextSprite(sprite, text) {
      const canvas = sprite.material.map.image;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.shadowColor = 'rgba(0,0,0,0.8)';
      ctx.shadowBlur = 20;
      ctx.font = `bold 48px 'Segoe UI', Arial, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(255,100,0,0.3)';
      ctx.shadowBlur = 30;
      ctx.fillStyle = '#ff8800';
      ctx.fillText(text, canvas.width/2, canvas.height/2);
      sprite.material.map.needsUpdate = true;
    }

    let priceTextSprite = createTextSprite('$ ---  ---%');
    priceTextSprite.position.set(0, -2.8, 0);
    scene.add(priceTextSprite);

    const titleSprite = createTextSprite('₿ MONERO', 56, '#ffaa44');
    titleSprite.position.set(0, 3.2, 0);
    titleSprite.scale.set(7, 1.8, 1);
    scene.add(titleSprite);

    // --- ÓRBITAS VISÍVEIS ---
    function createOrbitLines() {
      const orbitGroup = new THREE.Group();
      const maxOrbit = Math.max(...PLANET_DATA.map(p => p.orbitIndex || 0));
      for (let orbit = 0; orbit <= maxOrbit; orbit++) {
        const radius = SOLAR_SYSTEM_CONFIG.baseRadius + orbit * SOLAR_SYSTEM_CONFIG.orbitSpacing;
        const points = [];
        const segments = 64;
        for (let i = 0; i <= segments; i++) {
          const angle = (i / segments) * Math.PI * 2;
          points.push(new THREE.Vector3(Math.cos(angle) * radius, 0, Math.sin(angle) * radius));
        }
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        const material = new THREE.LineBasicMaterial({
          color: 0x334466,
          transparent: true,
          opacity: 0.08 + (orbit / maxOrbit) * 0.12
        });
        const orbitLine = new THREE.Line(geometry, material);
        orbitGroup.add(orbitLine);
      }
      return orbitGroup;
    }

    const orbitLines = createOrbitLines();
    scene.add(orbitLines);

    // --- PLANETAS ---
    const planets = [];
    const planetMeshes = [];

    PLANET_DATA.forEach((data, index) => {
      const group = new THREE.Group();
      const geo = new THREE.SphereGeometry(data.size, 16, 16);
      const mat = new THREE.MeshStandardMaterial({
        color: data.color,
        roughness: 0.3,
        metalness: 0.5,
        emissive: data.color,
        emissiveIntensity: 0.1
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.userData = { index };
      group.add(mesh);

      group.position.set(
        Math.cos(data.angle) * data.distance,
        data.verticalOffset || 0,
        Math.sin(data.angle) * data.distance
      );
      group.userData = {
        planetData: data,
        angle: data.angle,
        distance: data.distance,
        speed: data.speed,
        index,
        verticalOffset: data.verticalOffset || 0
      };
      scene.add(group);
      planets.push(group);
      planetMeshes.push(mesh);
    });

    // --- NAVEGAÇÃO PARA PLANETA (ZOOM) ---
    let isZooming = false;
    let zoomTarget = null;
    let zoomProgress = 0;
    let zoomStartPos = new THREE.Vector3();
    let zoomEndPos = new THREE.Vector3();
    let zoomStartTarget = new THREE.Vector3();
    let zoomEndTarget = new THREE.Vector3();
    const ZOOM_DURATION = 1.5;
    const ZOOM_DISTANCE = 1.8;

    const zoomIndicator = document.getElementById('zoom-indicator');

    function startZoomToPlanet(index) {
      const data = PLANET_DATA[index];
      if (!data) return;
      
      const planetGroup = planets[index];
      if (!planetGroup) return;
      
      const worldPos = new THREE.Vector3();
      planetGroup.getWorldPosition(worldPos);
      
      const direction = new THREE.Vector3().subVectors(camera.position, worldPos).normalize();
      const finalPos = worldPos.clone().add(direction.multiplyScalar(ZOOM_DISTANCE));
      
      zoomStartPos.copy(camera.position);
      zoomEndPos.copy(finalPos);
      zoomStartTarget.copy(targetPosition);
      zoomEndTarget.copy(worldPos);
      
      zoomProgress = 0;
      isZooming = true;
      zoomTarget = index;
      
      zoomIndicator.textContent = `🔭 Navegando para ${data.name}...`;
      zoomIndicator.classList.add('show');
      
      card.classList.remove('active');
    }

    function updateZoom(delta) {
      if (!isZooming) return;
      
      zoomProgress += delta / ZOOM_DURATION;
      
      if (zoomProgress >= 1) {
        zoomProgress = 1;
        isZooming = false;
        zoomIndicator.classList.remove('show');
        zoomTarget = null;
      }
      
      const t = zoomProgress < 0.5 ? 2 * zoomProgress * zoomProgress : 1 - Math.pow(-2 * zoomProgress + 2, 2) / 2;
      
      camera.position.lerpVectors(zoomStartPos, zoomEndPos, t);
      targetPosition.lerpVectors(zoomStartTarget, zoomEndTarget, t);
      
      const offset = new THREE.Vector3().subVectors(camera.position, targetPosition);
      cameraRadius = offset.length();
      cameraTheta = Math.atan2(offset.x, offset.z);
      cameraPhi = Math.acos(offset.y / cameraRadius);
      
      camera.lookAt(targetPosition);
    }

    // --- FUNÇÕES DA CÂMERA ---
    function updateCameraFromAngles() {
      if (isZooming) return;
      const offset = new THREE.Vector3(
        cameraRadius * Math.sin(cameraPhi) * Math.sin(cameraTheta),
        cameraRadius * Math.cos(cameraPhi),
        cameraRadius * Math.sin(cameraPhi) * Math.cos(cameraTheta)
      );
      cameraPosition.copy(targetPosition).add(offset);
      camera.position.copy(cameraPosition);
      camera.lookAt(targetPosition);
    }

    // --- CONTROLES POR TOQUE ---
    let touchStartX = 0, touchStartY = 0;
    let touchStartDist = 0;
    let isTouching = false;
    let isPinching = false;
    let velocityX = 0, velocityY = 0;
    let touchMoveCount = 0;
    const DAMPING = 0.92;
    const SENSITIVITY = 0.008;
    const MOVE_SENSITIVITY = 0.04;
    let lastTapTime = 0;
    let tapTimeout = null;

    renderer.domElement.addEventListener('touchstart', (e) => {
      if (isZooming) return;
      if (e.touches.length === 1) {
        const touch = e.touches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
        isTouching = true;
        isPinching = false;
        velocityX = 0;
        velocityY = 0;
        touchMoveCount = 0;
      } else if (e.touches.length === 2) {
        isPinching = true;
        isTouching = false;
        touchStartDist = getTouchDistance(e.touches);
      }
    }, { passive: true });

    renderer.domElement.addEventListener('touchmove', (e) => {
      if (isZooming) return;
      e.preventDefault();
      if (e.touches.length === 1 && isTouching) {
        const touch = e.touches[0];
        const dx = touch.clientX - touchStartX;
        const dy = touch.clientY - touchStartY;
        touchMoveCount++;
        if (touchMoveCount < 3 && Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
        
        const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
        forward.y = 0;
        forward.normalize();
        const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
        right.y = 0;
        right.normalize();
        const moveVector = new THREE.Vector3();
        moveVector.add(right.clone().multiplyScalar(-dx * MOVE_SENSITIVITY * 0.5));
        moveVector.add(forward.clone().multiplyScalar(dy * MOVE_SENSITIVITY * 0.5));
        cameraPosition.add(moveVector);
        targetPosition.add(moveVector);
        cameraTheta -= dx * SENSITIVITY * 0.3;
        cameraPhi += dy * SENSITIVITY * 0.15;
        cameraPhi = Math.max(minPhi, Math.min(maxPhi, cameraPhi));
        velocityX = -dx * SENSITIVITY * 0.5;
        velocityY = dy * SENSITIVITY * 0.3;
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
        updateCameraFromAngles();
      } else if (e.touches.length === 2 && isPinching) {
        const dist = getTouchDistance(e.touches);
        const delta = dist - touchStartDist;
        cameraRadius = Math.max(minRadius, Math.min(maxRadius, cameraRadius - delta * 0.08));
        touchStartDist = dist;
        updateCameraFromAngles();
      }
    }, { passive: false });

    renderer.domElement.addEventListener('touchend', (e) => {
      if (e.touches.length < 2) isPinching = false;
      if (e.touches.length === 0) {
        isTouching = false;
        isPinching = false;
      }
    }, { passive: true });

    function getTouchDistance(touches) {
      if (touches.length < 2) return 0;
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.sqrt(dx*dx + dy*dy);
    }

    // --- CONTROLES POR MOUSE ---
    let mouseDown = false;
    let mouseX = 0, mouseY = 0;
    let isDragging = false;
    let dragStartX = 0, dragStartY = 0;
    let clickTimer = null;
    let clickCount = 0;

    renderer.domElement.addEventListener('mousedown', (e) => {
      if (isZooming) return;
      mouseDown = true;
      mouseX = e.clientX;
      mouseY = e.clientY;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      isDragging = false;
    });

    window.addEventListener('mousemove', (e) => {
      if (isZooming) return;
      if (mouseDown) {
        const dx = e.clientX - mouseX;
        const dy = e.clientY - mouseY;
        if (Math.abs(e.clientX - dragStartX) > 5 || Math.abs(e.clientY - dragStartY) > 5) {
          isDragging = true;
        }
        if (isDragging) {
          const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
          forward.y = 0;
          forward.normalize();
          const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
          right.y = 0;
          right.normalize();
          const moveVector = new THREE.Vector3();
          moveVector.add(right.clone().multiplyScalar(-dx * MOVE_SENSITIVITY * 0.5));
          moveVector.add(forward.clone().multiplyScalar(dy * MOVE_SENSITIVITY * 0.5));
          cameraPosition.add(moveVector);
          targetPosition.add(moveVector);
          cameraTheta -= dx * SENSITIVITY * 0.3;
          cameraPhi += dy * SENSITIVITY * 0.15;
          cameraPhi = Math.max(minPhi, Math.min(maxPhi, cameraPhi));
          mouseX = e.clientX;
          mouseY = e.clientY;
          updateCameraFromAngles();
        }
      }
    });

    window.addEventListener('mouseup', (e) => {
      if (mouseDown && !isDragging) {
        const now = Date.now();
        const timeSinceLastTap = now - lastTapTime;
        
        if (timeSinceLastTap < 400) {
          // Duplo clique -> abrir card
          clickCount = 2;
          if (clickTimer) {
            clearTimeout(clickTimer);
            clickTimer = null;
          }
          onPointerDown({ clientX: e.clientX, clientY: e.clientY, isDouble: true });
        } else {
          // Clique simples -> navegar (zoom)
          clickCount = 1;
          if (clickTimer) {
            clearTimeout(clickTimer);
          }
          clickTimer = setTimeout(() => {
            onPointerDown({ clientX: e.clientX, clientY: e.clientY, isDouble: false });
            clickTimer = null;
          }, 400);
        }
        lastTapTime = now;
      }
      mouseDown = false;
      isDragging = false;
    });

    renderer.domElement.addEventListener('wheel', (e) => {
      if (isZooming) return;
      e.preventDefault();
      cameraRadius += e.deltaY * 0.03;
      cameraRadius = Math.max(minRadius, Math.min(maxRadius, cameraRadius));
      updateCameraFromAngles();
    }, { passive: false });

    // --- SELEÇÃO DE PLANETAS ---
    const raycaster = new THREE.Raycaster();
    const mouse2 = new THREE.Vector2();
    let selectedPlanetIndex = null;

    function onPointerDown(event) {
      if (isZooming) return;
      
      const rect = renderer.domElement.getBoundingClientRect();
      const x = ((event.clientX || event.pageX) - rect.left) / rect.width * 2 - 1;
      const y = -((event.clientY || event.pageY) - rect.top) / rect.height * 2 + 1;
      mouse2.set(x, y);
      raycaster.setFromCamera(mouse2, camera);
      const intersects = raycaster.intersectObjects(planetMeshes);
      
      if (intersects.length > 0) {
        const hit = intersects[0].object;
        const index = hit.userData.index;
        if (index !== undefined) {
          if (event.isDouble) {
            // Duplo clique: mostrar card
            showPlanetCard(index);
            selectedPlanetIndex = index;
          } else {
            // Clique simples: navegar até o planeta
            startZoomToPlanet(index);
          }
        }
      } else {
        card.classList.remove('active');
      }
    }

    // --- CARD DO PLANETA ---
    const card = document.getElementById('planet-card');
    const closeBtn = document.getElementById('close-card');
    const planetName = document.getElementById('planet-name');
    const planetSubtitle = document.getElementById('planet-subtitle');
    const planetDesc = document.getElementById('planet-desc');
    const planetPrice = document.getElementById('planet-price-info');

    function showPlanetCard(index) {
      const data = PLANET_DATA[index];
      if (!data) return;
      planetName.textContent = data.name;
      planetSubtitle.textContent = data.subtitle;
      planetDesc.textContent = data.desc;
      const priceText = currentPrice ? `$ ${currentPrice.toFixed(2)} USD` : 'carregando...';
      planetPrice.textContent = `💰 Preço XMR: ${priceText}`;
      card.classList.add('active');
    }

    closeBtn.addEventListener('click', () => card.classList.remove('active'));
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') card.classList.remove('active');
    });

    // --- ANIMAÇÃO COM PULSO SOLAR ---
    const clock = new THREE.Clock();

    function animate() {
      const delta = clock.getDelta();
      const time = clock.getElapsedTime();

      if (isZooming) {
        updateZoom(delta);
      }

      if (!isTouching && !mouseDown && !isPinching && !isZooming) {
        if (Math.abs(velocityX) > 0.0001 || Math.abs(velocityY) > 0.0001) {
          cameraTheta += velocityX;
          cameraPhi += velocityY * 0.3;
          cameraPhi = Math.max(minPhi, Math.min(maxPhi, cameraPhi));
          velocityX *= DAMPING;
          velocityY *= DAMPING;
          updateCameraFromAngles();
        }
      }

      // Movimento orbital dos planetas (velocidade reduzida)
      planets.forEach((group, i) => {
        const data = group.userData;
        if (!data) return;
        data.angle += delta * data.speed * 0.2; // Fator adicional reduzido
        group.position.x = Math.cos(data.angle) * data.distance;
        group.position.z = Math.sin(data.angle) * data.distance;
        group.position.y = data.verticalOffset + Math.sin(time * 0.2 + i * 0.3) * 0.2;
        const mesh = group.children[0];
        if (mesh) mesh.rotation.y += delta * 0.15;
      });

      // Pulso solar
      const pulse = Math.sin(time * 1.2) * 0.5 + 0.5;
      const scalePulse = 1 + pulse * 0.15;
      ring.scale.set(scalePulse, scalePulse, scalePulse);
      ring.material.opacity = 0.5 + pulse * 0.4;
      ring.material.emissiveIntensity = 0.3 + pulse * 0.6;
      ring2.scale.set(scalePulse * 0.98, scalePulse * 0.98, scalePulse * 0.98);
      ring2.material.opacity = 0.3 + pulse * 0.5;
      ring2.material.emissiveIntensity = 0.2 + pulse * 0.5;
      ring3.scale.set(scalePulse * 0.95, scalePulse * 0.95, scalePulse * 0.95);
      ring3.material.opacity = 0.2 + pulse * 0.4;
      ring3.material.emissiveIntensity = 0.1 + pulse * 0.4;
      glowMesh.scale.set(scalePulse * 1.1, scalePulse * 1.1, scalePulse * 1.1);
      glowMesh.material.opacity = 0.15 + pulse * 0.25;
      ring.rotation.z += delta * 0.1;
      ring2.rotation.x += delta * 0.08;
      ring3.rotation.y += delta * 0.06;
      sunMesh.rotation.y += delta * 0.1;

      starField.rotation.y += delta * 0.001;
      starField.rotation.x += delta * 0.0005;
      nebula.rotation.y += delta * 0.0008;
      nebula.rotation.x += delta * 0.0004;

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    animate();

    // --- RESPONSIVIDADE ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- LOADING ---
    setTimeout(() => {
      document.getElementById('loading').classList.add('hide');
    }, 1200);

    // --- BUSCAR PREÇO ---
    fetchPrice();
    setInterval(fetchPrice, 30000);

    setInterval(() => {
      if (card.classList.contains('active')) {
        const priceText = currentPrice ? `$ ${currentPrice.toFixed(2)} USD` : 'carregando...';
        planetPrice.textContent = `💰 Preço XMR: ${priceText}`;
      }
    }, 5000);

    updateCameraFromAngles();
    console.log('🚀 Sistema Solar Monero - 1 clique: navegar | 2 cliques: info | Velocidade reduzida');
  </script>
</body>
