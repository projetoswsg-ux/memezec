<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>XMR Battlefield</title>
<style>
  :root{
    --bg:#0a0e0d; --panel:rgba(10,16,15,.78); --line:rgba(120,170,140,.22);
    --green:#5fd06a; --green-dim:#2f7d38; --red:#ff5a52; --red-dim:#8a2c28;
    --amber:#ffc24b; --ink:#c9e6d0; --ink-dim:#6f8a78; --mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);overflow:hidden;font-family:var(--mono);color:var(--ink);-webkit-font-smoothing:antialiased}
  #app{position:fixed;inset:0}
  canvas{display:block}
  #scan{position:fixed;inset:0;pointer-events:none;z-index:50;mix-blend-mode:overlay;opacity:.5;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0 2px,rgba(0,0,0,.18) 2px 3px)}
  .panel{position:fixed;z-index:40;background:var(--panel);border:1px solid var(--line);
    backdrop-filter:blur(3px);padding:9px 11px;font-size:11px;line-height:1.5;letter-spacing:.02em;
    box-shadow:0 0 0 1px rgba(0,0,0,.4),0 8px 30px rgba(0,0,0,.5)}
  .panel h4{margin:0 0 5px;font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim)}
  .kv{display:flex;justify-content:space-between;gap:14px;white-space:nowrap}
  .kv b{font-weight:600}
  .green{color:var(--green)} .red{color:var(--red)} .amber{color:var(--amber)} .dim{color:var(--ink-dim)}
  #status{position:absolute;top:12px;left:12px;z-index:40;font-size:11px;letter-spacing:.16em;
    padding:4px 10px;border:1px solid var(--line);border-radius:3px;background:rgba(10,14,13,.55);
    text-transform:uppercase;display:none;backdrop-filter:blur(4px)}
  #status.live{color:var(--green);border-color:rgba(95,208,106,.5)}
  #status.rec{color:var(--amber);border-color:rgba(255,194,75,.45)}
  #topc{position:absolute;left:0;top:0;text-align:center;z-index:40;pointer-events:none;will-change:left,top;
    text-shadow:0 2px 18px rgba(0,0,0,.9),0 0 34px rgba(0,0,0,.7);display:none}
  #price{font-size:clamp(30px,4.5vw,58px);font-weight:800;letter-spacing:.01em;line-height:.95;transition:color .12s;
    font-variant-numeric:tabular-nums;color:#fff}
  #delta{margin-top:1px;font-size:clamp(11px,1.4vw,16px);letter-spacing:.14em;text-transform:uppercase}
  #delta b{font-weight:700;color:#fff}
  #winning{margin-top:2px;font-size:clamp(11px,1.4vw,16px);letter-spacing:.14em;text-transform:uppercase;font-weight:800}
  #credit{position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:60;
    font-family:var(--mono);font-size:clamp(9px,1.1vw,12px);letter-spacing:.06em;line-height:1.4;
    text-align:center;color:#fff;max-width:min(94vw,720px);pointer-events:auto;
    text-shadow:0 1px 8px rgba(0,0,0,.9)}
  #credit a{color:var(--green);text-decoration:none;border-bottom:1px dotted var(--green-dim)}
  #credit a.mdt{color:var(--amber);border-bottom-color:rgba(255,194,75,.5)}
  #credit a:hover{opacity:.8}
  @media (max-width:560px){ #credit{font-size:9px;top:4px;max-width:96vw} }
  #whale.candle{color:var(--green);text-shadow:0 0 30px rgba(95,208,106,.8)}
  #whale.nuke{color:var(--red);text-shadow:0 0 30px rgba(255,90,82,.8)}
  #left{top:96px;left:10px;width:210px}
  #right{top:96px;right:10px;width:210px;text-align:right}
  #right .kv{flex-direction:row-reverse}
  .wall{font-size:10px;color:var(--ink-dim);display:flex;justify-content:space-between;gap:8px}
  #right .wall{flex-direction:row-reverse}
  #score{bottom:112px;left:50%;transform:translateX(-50%);width:min(560px,86vw);padding:8px 11px 10px}
  #tug{position:relative;height:14px;margin-top:6px;background:var(--red-dim);border:1px solid var(--line);overflow:hidden}
  #tugfill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--green-dim),var(--green));width:50%;transition:width .4s}
  #tugmid{position:absolute;left:50%;top:-3px;bottom:-3px;width:1px;background:var(--amber);opacity:.7}
  .sclabel{display:flex;justify-content:space-between;font-size:10px;margin-top:4px;color:var(--ink-dim)}
  #log{bottom:10px;left:50%;transform:translateX(-50%);width:min(560px,86vw);height:92px;overflow:hidden;padding:8px 11px}
  #log .row{font-size:10.5px;opacity:.9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    animation:fadein .25s ease}
  @keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:.9;transform:none}}
  #ctl{top:10px;right:10px;display:flex;flex-direction:column;gap:6px;align-items:flex-end}
  #ctl .grp{display:flex;gap:5px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
  .btn{font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--ink);background:rgba(20,30,26,.8);
    border:1px solid var(--line);padding:4px 8px;cursor:pointer;transition:all .12s;text-transform:uppercase}
  .btn:hover{border-color:var(--green);color:var(--green)}
  .btn.on{background:rgba(95,208,106,.16);border-color:var(--green);color:var(--green)}
  input[type=range]{width:96px;accent-color:var(--green)}
  .slab{font-size:9px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.1em}
  #fps{top:10px;left:10px;font-size:11px;color:var(--ink-dim);z-index:40;background:var(--panel);
    border:1px solid var(--line);padding:3px 7px;display:none}
  #tip{position:fixed;z-index:45;pointer-events:none;display:none;background:rgba(6,10,9,.92);
    border:1px solid var(--line);padding:6px 9px;font-size:10.5px;line-height:1.5;max-width:220px;
    box-shadow:0 6px 24px rgba(0,0,0,.6)}
  #whale{position:fixed;top:44%;left:50%;transform:translate(-50%,-50%) scale(.8);z-index:46;
    font-size:26px;font-weight:800;letter-spacing:.1em;text-align:center;pointer-events:none;opacity:0;
    text-shadow:0 0 24px rgba(255,90,82,.7)}
  #toast{position:fixed;bottom:118px;left:50%;transform:translateX(-50%);z-index:47;background:rgba(6,10,9,.94);
    border:1px solid var(--red);color:var(--red);padding:8px 14px;font-size:11px;display:none}
  #hud-bl{position:fixed;left:10px;bottom:10px;z-index:40;display:flex;flex-direction:column;gap:7px;
    padding:9px 11px;max-width:210px}
  #hud-bl .chaos-lab{display:flex;justify-content:space-between;align-items:center;font-size:9px;
    text-transform:uppercase;letter-spacing:.12em;color:var(--ink-dim)}
  #hud-bl .chaos-lab b{color:var(--amber);font-weight:700;font-size:10px;letter-spacing:.14em}
  #chaos{width:100%;accent-color:var(--amber);margin:0}
  #hud-bl .avol{width:100%;accent-color:var(--green);margin:0}
  #hud-bl .legend{font-size:9.5px;line-height:1.7;color:var(--ink-dim);letter-spacing:.03em;
    border-top:1px solid var(--line);padding-top:7px}
  #hud-bl .legend b{color:var(--ink);font-weight:700}
  #chatbtn{position:fixed;right:16px;bottom:16px;z-index:55;font-family:var(--mono);font-size:12px;
    font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green);cursor:pointer;
    background:rgba(12,20,16,.92);border:1px solid var(--green);border-radius:4px;padding:10px 14px;
    box-shadow:0 4px 18px rgba(0,0,0,.5)}
  #chatbtn.on{background:rgba(95,208,106,.18)}
  #chatbtn .dot{color:var(--green)}
  #chatpanel{position:fixed;right:16px;bottom:62px;width:330px;height:min(440px,68vh);z-index:55;display:none;
    flex-direction:column;background:rgba(8,13,11,.95);border:1px solid var(--line);border-radius:6px;
    overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.6)}
  #chathead{display:flex;align-items:center;gap:8px;padding:9px 11px;border-bottom:1px solid var(--line);
    background:rgba(20,30,26,.7)}
  #chathead .t{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);flex:1}
  #chatonline{font-size:10px;color:var(--green);letter-spacing:.06em}
  #chatclose{background:none;border:none;color:var(--ink-dim);font-size:14px;cursor:pointer;padding:0 2px}
  #chatclose:hover{color:var(--red)}
  #chatlog{flex:1;overflow-y:auto;padding:9px 11px;display:flex;flex-direction:column;gap:5px;font-size:12px;line-height:1.4}
  #chatlog .m{word-wrap:break-word;overflow-wrap:anywhere}
  #chatlog .m .who{color:var(--green);font-weight:700}
  #chatlog .m .who.me{color:var(--amber)}
  #chatlog .sys{color:var(--ink-dim);font-style:italic;font-size:10.5px}
  #chatlog .chatdown{margin:auto;text-align:center;color:var(--amber);font-size:12.5px;line-height:1.8;padding:22px 14px}
  #chatlog .tm{color:var(--ink-dim);font-size:9px;margin-right:4px}
  .chatrow{display:flex;gap:6px;padding:8px;border-top:1px solid var(--line);background:rgba(20,30,26,.5)}
  .chatrow input{flex:1;min-width:0;font-family:var(--mono);font-size:12px;color:var(--ink);
    background:rgba(6,10,9,.8);border:1px solid var(--line);border-radius:3px;padding:7px 9px;outline:none}
  .chatrow input:focus{border-color:var(--green)}
  .chatrow button{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:var(--green);background:rgba(95,208,106,.14);border:1px solid var(--green);border-radius:3px;padding:0 12px;cursor:pointer}
  @media (max-width:760px){
    #chatpanel{right:8px;left:8px;width:auto;bottom:60px;height:66vh}
    #chatbtn{bottom:74px;right:10px}
  }
  #camtoggle,#mobhint{display:none}
  @media (max-width:760px){
    #hud-bl{display:none}
    #left,#right{width:150px;top:88px;font-size:10px}
    #ctl .slab,#dens-wrap,#speed-wrap{display:none}
    #price{font-size:24px}
    #left,#right,#log,#score,#status,#fps,#tug{pointer-events:none}
    #camtoggle{display:inline-flex;align-items:center;gap:7px;position:fixed;right:10px;bottom:12px;z-index:44;
      font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
      color:var(--green);background:rgba(12,20,16,.92);border:1px solid var(--green);border-radius:4px;
      padding:11px 15px;box-shadow:0 4px 18px rgba(0,0,0,.5)}
    #camtoggle.cine{color:var(--amber);border-color:var(--amber)}
    #mobhint{display:block;position:fixed;right:12px;bottom:120px;z-index:44;text-align:right;max-width:150px;
      font-family:var(--mono);font-size:9px;line-height:1.5;letter-spacing:.06em;color:var(--ink);pointer-events:none;
      text-shadow:0 1px 6px rgba(0,0,0,.95)}
    #log{left:10px;transform:none;width:58vw;height:76px}
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="scan"></div>
<audio id="music" src="music.mp3" loop preload="auto"></audio>

<div id="fps" class="panel"></div>
<div id="status"></div>

<div id="credit">
  Created by <a href="https://www.motionbynick.com/" target="_blank" rel="noopener">Nick Greenawalt</a>,
  the inventor of the <a class="mdt" href="https://milliondollartoilet.com/" target="_blank" rel="noopener">Million Dollar Toilet</a>
</div>

<div id="topc">
  <div id="price">—</div>
  <div id="delta"><span id="sym">XMRUSDT</span></div>
  <div id="winning"></div>
</div>

<div id="log" class="panel"><h4>Killfeed</h4><div id="logrows"></div></div>

<div id="ctl">
  <div class="grp">
    <button class="btn on" data-sym="XMRUSDT">XMR</button>
    <button class="btn" data-sym="BTCUSDT">BTC</button>
    <button class="btn" data-sym="ETHUSDT">ETH</button>
    <button class="btn" data-sym="SOLUSDT">SOL</button>
  </div>
  <div class="grp">
    <button class="btn on" data-cam="CINEMATIC">Cinematic</button>
    <button class="btn" data-cam="FOLLOW">Follow</button>
    <button class="btn" data-cam="FREE">Free</button>
  </div>
  <div class="grp">
    <button class="btn" data-mode="SIM">Sim</button>
    <button class="btn" data-mode="LIVE">Live</button>
  </div>
  <div class="grp" id="speed-wrap"><span class="slab">Speed</span><input id="speed" type="range" min="0.5" max="4" step="0.1" value="1"></div>
  <div class="grp" id="dens-wrap"><span class="slab">Density</span><input id="dens" type="range" min="0.4" max="1" step="0.05" value="1"></div>
</div>

<div id="tip"></div>
<div id="whale"></div>
<div id="toast"></div>

<div id="mobhint">1 finger · move<br>2 fingers · pinch + turn</div>
<button id="camtoggle">◎ Free</button>

<button id="chatbtn"><span class="dot">●</span> Chat</button>
<div id="chatpanel">
  <div id="chathead">
    <span class="t">Battlefield Chat</span>
    <span id="chatonline">● 0</span>
    <button id="chatclose" title="Close">✕</button>
  </div>
  <div id="chatlog"></div>
  <div class="chatrow" id="chatjoin">
    <input id="chatnick" maxlength="24" placeholder="Pick a nickname…" autocomplete="off">
    <button id="chatjoinbtn">Join</button>
  </div>
  <div class="chatrow" id="chatinput" style="display:none">
    <input id="chatmsg" maxlength="2000" placeholder="Message…" autocomplete="off">
    <button id="chatsend">Send</button>
  </div>
</div>

<div id="hud-bl" class="panel">
  <div class="chaos-lab"><span>Chaos</span><b id="chaosval">·</b></div>
  <input id="chaos" type="range" min="1" max="8" step="1" value="6">
  <div class="chaos-lab"><span>Music</span><b id="musicval">35%</b></div>
  <input id="musicvol" class="avol" type="range" min="0" max="100" step="1" value="35">
  <div class="chaos-lab"><span>SFX</span><b id="sfxval">55%</b></div>
  <input id="sfxvol" class="avol" type="range" min="0" max="100" step="1" value="55">
  <div class="legend">
    <b>WASD</b> move &nbsp; <b>Q/E</b> down/up<br>
    <b>Shift</b> boost &nbsp; <b>drag</b> orbit &nbsp; <b>scroll</b> zoom<br>
    <b>1/2/3</b> cinematic / follow / free
  </div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import * as BGU from 'three/addons/utils/BufferGeometryUtils.js';

/* ============================================================ CONFIG */
const CONFIG = {
  dataMode:'LIVE', symbol:'XMRUSDT',
  levelsPerSide:18, fieldWidth:200, fieldDepth:150,
  maxSoldiersPerSide:2000, maxSoldiersPerLevel:300,
  soldiersPerRow:26, soldierSpacing:{x:1.15,z:1.5},
  unitQty:{XMRUSDT:0.9, BTCUSDT:0.05, ETHUSDT:0.8, SOLUSDT:25},
  startPrice:{XMRUSDT:220, BTCUSDT:63000, ETHUSDT:3050, SOLUSDT:145},
  priceDecimals:{XMRUSDT:2, BTCUSDT:2, ETHUSDT:2, SOLUSDT:2},
  bandPct:0.025,            // field spans anchor ±2.5%
  recenterAt:0.72,
  eventMovePct:0.018,
  streakUnitEvery:3,
  supportDwellSec:10,
  tankQtyThreshold:14, soldiersPerTank:20,
  whaleNotionalUSD:150000,  // XMR whales are smaller notional
  maxCorpses:340, maxTracers:380,
  killsScale:6, killNotionalUnit:400, maxKillsPerTrade:80,
  bobAmplitude:0.07, bobHz:2.2, waddleAmplitude:0.10,
  pixelRatioCap:1.75, mobileSoldierCap:850, simSpeed:1.0, audioEnabled:false,
  density:1.0,
};
const IS_MOBILE = matchMedia('(pointer:coarse)').matches && innerWidth < 820;
if(IS_MOBILE){ CONFIG.maxSoldiersPerSide=CONFIG.mobileSoldierCap; CONFIG.pixelRatioCap=1.25; CONFIG.maxCorpses=170; }

/* ============================================================ UTIL */
const TAU=Math.PI*2, clamp=(v,a,b)=>v<a?a:v>b?b:v, lerp=(a,b,t)=>a+(b-a)*t;
const rnd=(a=1,b)=> b===undefined ? Math.random()*a : a+Math.random()*(b-a);
let _g=0,_g2; function gauss(){ if(_g){_g=0;return _g2;} const u=Math.random()||1e-9,v=Math.random();const r=Math.sqrt(-2*Math.log(u));_g=1;_g2=r*Math.sin(TAU*v);return r*Math.cos(TAU*v);}
function hash2(x,y){ let n=Math.sin(x*127.1+y*311.7)*43758.5453; return n-Math.floor(n); }
function vnoise(x,y){ const xi=Math.floor(x),yi=Math.floor(y),xf=x-xi,yf=y-yi;
  const u=xf*xf*(3-2*xf),v=yf*yf*(3-2*yf);
  const a=hash2(xi,yi),b=hash2(xi+1,yi),c=hash2(xi,yi+1),d=hash2(xi+1,yi+1);
  return lerp(lerp(a,b,u),lerp(c,d,u),v); }
function fbm(x,y){ let s=0,amp=.5,f=1; for(let i=0;i<3;i++){ s+=amp*vnoise(x*f,y*f); f*=2.03; amp*=.5;} return s; }
function terrainHeight(x,z){
  const base=(fbm(x*0.03+10, z*0.03-4)-0.5)*2.4;
  const flat=THREE.MathUtils.smoothstep(Math.abs(z),4,34);
  return base*flat + (fbm(x*0.12,z*0.12)-0.5)*0.25;
}
const _m=new THREE.Matrix4(),_p=new THREE.Vector3(),_q=new THREE.Quaternion(),_s=new THREE.Vector3(),
      _e=new THREE.Euler(),_up=new THREE.Vector3(0,1,0),_zero=new THREE.Matrix4().makeScale(0,0,0),
      _v2=new THREE.Vector3();
const _zAxis=new THREE.Vector3(0,0,1);
const fmtUSD=n=> n>=1e9?'$'+(n/1e9).toFixed(2)+'b': n>=1e6?'$'+(n/1e6).toFixed(2)+'m': n>=1e3?'$'+(n/1e3).toFixed(0)+'k':'$'+n.toFixed(0);
const fmtPrice=n=> '$'+n.toLocaleString('en-US',{minimumFractionDigits:CONFIG.priceDecimals[CONFIG.symbol],maximumFractionDigits:CONFIG.priceDecimals[CONFIG.symbol]});
const fmtAxis=n=> '$'+n.toLocaleString('en-US',{maximumFractionDigits:0});

/* ============================================================ THREE CORE */
const app=document.getElementById('app');
const renderer=new THREE.WebGLRenderer({antialias:!IS_MOBILE,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,CONFIG.pixelRatioCap));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=!IS_MOBILE; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.32;
app.appendChild(renderer.domElement);

const scene=new THREE.Scene();
const horizon=new THREE.Color(0xbcd8f0);
scene.fog=new THREE.Fog(horizon,220,820);

{ const g=new THREE.SphereGeometry(700,24,16);
  const m=new THREE.ShaderMaterial({side:THREE.BackSide,uniforms:{top:{value:new THREE.Color(0x2f74c0)},bot:{value:new THREE.Color(0xbcd8f0)}},
    vertexShader:`varying float h;void main(){h=normalize(position).y;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`varying float h;uniform vec3 top;uniform vec3 bot;void main(){float t=smoothstep(-.05,.55,h);gl_FragColor=vec4(mix(bot,top,t),1.);}`});
  scene.add(new THREE.Mesh(g,m)); }

const camera=new THREE.PerspectiveCamera(52,innerWidth/innerHeight,0.5,900);
camera.position.set(0,42,-78);
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=.08; controls.minDistance=15; controls.maxDistance=175;
controls.maxPolarAngle=1.46; controls.target.set(0,3,0); controls.enabled=false;
controls.enablePan=true; controls.screenSpacePanning=false; controls.panSpeed=1.1;
controls.touches={ ONE:THREE.TOUCH.PAN, TWO:THREE.TOUCH.DOLLY_ROTATE };

const key=new THREE.DirectionalLight(0xfff2e0,2.6); key.position.set(-60,80,-30);
key.castShadow=!IS_MOBILE; key.shadow.mapSize.set(2048,2048);
const sc=key.shadow.camera; sc.left=-110;sc.right=110;sc.top=90;sc.bottom=-90;sc.near=10;sc.far=260; sc.updateProjectionMatrix();
key.shadow.bias=-0.0006; scene.add(key);
const fill=new THREE.DirectionalLight(0xbcd0ff,0.7); fill.position.set(70,45,60); scene.add(fill);
scene.add(new THREE.HemisphereLight(0xa8c6ff,0x6a5a40,1.05));
scene.add(new THREE.AmbientLight(0x50524a,0.8));

/* ============================================================ TERRAIN */
const TERR_SEG_X=96,TERR_SEG_Z=72;
const terrGeo=new THREE.PlaneGeometry(CONFIG.fieldWidth,CONFIG.fieldDepth,TERR_SEG_X,TERR_SEG_Z);
terrGeo.rotateX(-Math.PI/2);
{ const pos=terrGeo.attributes.position, col=[];
  const cGrass=new THREE.Color(0x6f7c48),cMud=new THREE.Color(0x82704c),cDirt=new THREE.Color(0x9c855c);
  const tmp=new THREE.Color();

function onBook(book){

function reconcileArmies(){

  const k=e.key.toLowerCase(); if(['w','a','s','d','q','e','arrowup','arrowdown','arrowleft','arrowright','shift'].includes(k)){ keys.add(k); if(k.startsWith('arrow'))e.preventDefault(); } });
addEventListener('keyup',e=>{ if(typingInField(e))return; keys.delete(e.key.toLowerCase()); });
blur&&addEventListener('blur',()=>keys.clear());

(function chat(){
  const WS_URL='wss://bitcoin-battlefield-chat.nickgreenawalt.workers.dev/';
  const btn=$('chatbtn'), panel=$('chatpanel'), logEl=$('chatlog'), onlineEl=$('chatonline');
  const joinRow=$('chatjoin'), inputRow=$('chatinput'), nickI=$('chatnick'), msgI=$('chatmsg');
  let ws=null, nick=localStorage.getItem('bb_nick')||'', joined=false, open=false, retry=0;
  const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const hhmm=ts=>{ const d=new Date(ts||Date.now()); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); };
  const atBottom=()=> logEl.scrollHeight-logEl.scrollTop-logEl.clientHeight < 40;
  function append(html){ const stick=atBottom(); logEl.insertAdjacentHTML('beforeend',html); if(stick)logEl.scrollTop=logEl.scrollHeight; }
  function addMsg(n,text,ts){ const me=(n===nick)?' me':''; append(`<div class="m"><span class="tm">${hhmm(ts)}</span><span class="who${me}">${esc(n)}</span> ${esc(text)}</div>`); }
  function addSys(text){ append(`<div class="sys">${esc(text)}</div>`); }
  let connected=false;
  function showDown(){ logEl.innerHTML='<div class="chatdown">⚠ Chat is temporarily down<br>due to unexpectedly high activity.<br>Please check back soon.</div>'; joinRow.style.display='none'; inputRow.style.display='none'; onlineEl.textContent=''; }
  function restoreUI(){ if(nick){ joined=true; joinRow.style.display='none'; inputRow.style.display='flex'; } else { joinRow.style.display='flex'; inputRow.style.display='none'; } }
  function connect(){
    ws=new WebSocket(WS_URL);
    ws.onopen=()=>{ retry=0; connected=true; if(joined&&nick)ws.send(JSON.stringify({type:'join',nick})); };
    ws.onmessage=e=>{ let d; try{d=JSON.parse(e.data);}catch{ return; }
      if(d.type==='history'){ connected=true; restoreUI(); logEl.innerHTML=''; (d.messages||[]).forEach(m=>addMsg(m.nick,m.text,m.ts)); logEl.scrollTop=logEl.scrollHeight; }
      else if(d.type==='msg') addMsg(d.nick,d.text,d.ts);
      else if(d.type==='system') addSys(d.text);
      else if(d.type==='presence') onlineEl.textContent='● '+d.count; };
    ws.onclose=()=>{ ws=null; const was=connected; connected=false; if(open){ if(!was)showDown(); retry=Math.min(retry+1,8); setTimeout(connect,Math.min(20000,2000*retry)); } };
    ws.onerror=()=>{ try{ws.close();}catch{} };
  }
  function doJoin(){ const n=nickI.value.trim(); if(!n)return; nick=n; localStorage.setItem('bb_nick',n);
    joined=true; if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'join',nick}));
    joinRow.style.display='none'; inputRow.style.display='flex'; msgI.focus(); }
  function send(){ const t=msgI.value; if(!t.trim()||!ws||ws.readyState!==1)return; ws.send(JSON.stringify({type:'msg',text:t})); msgI.value=''; }
  function openChat(){ open=true; panel.style.display='flex'; btn.classList.add('on');
    if(!ws)connect();
    if(nick){ joined=true; joinRow.style.display='none'; inputRow.style.display='flex'; } else { joinRow.style.display='flex'; inputRow.style.display='none'; }
    logEl.scrollTop=logEl.scrollHeight; }
  function closeChat(){ open=false; panel.style.display='none'; btn.classList.remove('on'); }
  btn.onclick=()=>{ open?closeChat():openChat(); };
  $('chatclose').onclick=closeChat;
  $('chatjoinbtn').onclick=doJoin;
  nickI.addEventListener('keydown',e=>{ if(e.key==='Enter')doJoin(); });
  $('chatsend').onclick=send;
  msgI.addEventListener('keydown',e=>{ if(e.key==='Enter')send(); });
})();
