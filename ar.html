<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>WebAR - Teste de Emergência (Cilindro)</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    
    <style>
      /* CSS resistente a telas pretas/azuis em mobile */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #f0f0f0 !important; /* Cor de fundo para saber se a cena carregou */
      }
      
      /* Força o elemento de vídeo injetado pelo AR.js a ficar visível */
      video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100% !important;
        height: 100% !important;
        object-fit: cover;
        z-index: -2 !important;
      }

      .hud-emergencia {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.9);
        color: #ff3333; /* Vermelho para alerta */
        padding: 15px;
        border-radius: 10px;
        font-family: sans-serif;
        text-align: center;
        z-index: 999;
        border: 2px solid #ff3333;
        width: 85%;
        box-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
      }
    </style>
  </head>

  <body>
    
    <div class="hud-emergencia" id="hud">
      Iniciando diagnósticos de Câmera e GPS...<br>
      Aguarde o feed da câmera aparecer no fundo.
    </div>

    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true; antialias: false; precision: medium;"
    >
      <a-camera gps-camera rotation-reader active="true"></a-camera>

      <a-entity id="alvo-estatico"></a-entity>
    </a-scene>

    <script>
      // Função simplificada para obter o GPS sem timeout agressivo
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          
          // Deslocamento de teste: coloca o cilindro a cerca de 6 metros na sua frente.
          // Isso é necessário porque se colocarmos na sua lat/lon exata, 
          // você ficaria "dentro" do objeto e não veria nada.
          const alvoLat = lat + 0.00006;
          const alvoLon = lon + 0.00006;

          const alvo = document.getElementById('alvo-estatico');
          
          // Configura as coordenadas reais
          alvo.setAttribute('gps-entity-place', `latitude: ${alvoLat}; longitude: ${alvoLon};`);
          
          // Define o visual: Um cilindro estático vermelho, 1.5m de altura.
          alvo.setAttribute('geometry', 'primitive: cylinder; radius: 1; height: 1.5;');
          alvo.setAttribute('material', 'color: #ff3333; emissive: #ff3333; opacity: 1.0;');
          
          // Atualiza o HUD com a confirmação
          document.getElementById('hud').style.color = '#00ffcc'; // Verde neon
          document.getElementById('hud').innerHTML = `✅ GPS ATIVO!<br>Cilindro gerado na sua área.<br>Gire o celular devagar para encontrar o pilar vermelho.`;
        },
        (error) => {
          document.getElementById('hud').style.color = '#ff3333';
          document.getElementById('hud').innerHTML = `Erro no GPS [Código ${error.code}]: ${error.message}. Verifique as permissões de localização do celular.`;
        },
        { enableHighAccuracy: true, maximumAge: 0 } // Solicita o GPS mais preciso possível
      );
    </script>
  </body>
</html>
