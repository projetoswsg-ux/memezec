<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WebAR - Criatura Real 3D</title>
    <!-- Bibliotecas de AR, Renderização 3D e o componente de animação extra -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <style>
      .hud-aviso {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.85);
        color: #00ffcc;
        padding: 15px;
        border-radius: 10px;
        font-family: sans-serif;
        text-align: center;
        z-index: 999;
        border: 1px solid #00ffcc;
        width: 85%;
        box-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <div class="hud-aviso" id="hud">
      Sintonizando sensores de GPS... Garanta que você está em um local aberto.
    </div>

    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;"
    >
      <!-- Gerenciador de Assets: Carrega o modelo 3D antes do jogo começar -->
      <a-assets>
        <a-asset-item id="modelo-dragao" src="https://stemkoski.github.io/A-Frame-Examples/models/Dragon.glb"></a-asset-item>
      </a-assets>

      <!-- Câmera AR vinculada aos sensores do celular -->
      <a-camera gps-camera rotation-reader></a-camera>

      <!-- A Criatura 3D real -->
      <a-entity 
        id="criatura-3d"
        gltf-model="#modelo-dragao"
        scale="0.5 0.5 0.5"
        animation-mixer>
      </a-entity>
    </a-scene>

    <script>
      // Obtém a posição real do seu celular
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          
          // Deslocamento de segurança: coloca a criatura cerca de 6 metros à sua frente
          // para evitar que você spawne "dentro" dela.
          const localLat = lat + 0.00006;
          const localLon = lon + 0.00006;

          const dragao = document.getElementById('criatura-3d');
          
          // Aplica as coordenadas reais ao modelo 3D
          dragao.setAttribute('gps-entity-place', `latitude: ${localLat}; longitude: ${localLon};`);
          
          // Atualiza a interface na tela
          document.getElementById('hud').innerHTML = `🐉 Criatura gerada na sua área!<br>Gire 360° devagar para encontrá-la voando por perto.`;
        },
        (error) => {
          document.getElementById('hud').style.color = '#ff3333';
          document.getElementById('hud').innerHTML = `Erro de Conexão GPS: ${error.message}. Ative a localização de alta precisão.`;
        },
        { enableHighAccuracy: true }
      );
    </script>
  </body>
</html>
