<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolha sua Pílula</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Bangers', cursive;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4/5;
            background-color: #000;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
            border: 4px solid #222;
        }

        #character-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 1;
            filter: blur(20px);
            transition: filter 4s ease-out;
        }

        #top-curtain, #bottom-curtain {
            position: absolute;
            left: 0;
            width: 100%;
            background: #000;
            z-index: 10;
            pointer-events: none;
            animation: curtainFlicker 2s ease-in-out forwards;
            animation-delay: 1s;
        }

        #top-curtain {
            top: 0;
            height: 50%;
        }

        #bottom-curtain {
            bottom: 0;
            height: 50%;
        }

        @keyframes curtainFlicker {
            0%   { height: 50%; }
            15%  { height: 0%; }
            25%  { height: 50%; }
            35%  { height: 0%; }
            45%  { height: 50%; }
            55%  { height: 0%; }
            65%  { height: 50%; }
            85%  { height: 0%; }
            100% { height: 0%; opacity: 0; }
        }

        #dialog-wrapper {
            position: absolute;
            bottom: 12%;  /* subiu 10% (era 22%) */
            left: 50%;
            transform: translateX(-50%);
            width: 48%; 
            max-width: 380px;
            z-index: 5;
            opacity: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.5s;
        }

        .dialog-box {
            background: #fceb6b;
            border: 4px solid #000;
            border-radius: 10px;
            padding: 12px 16px;
            box-shadow: 6px 6px 0px #000;
            position: relative;
            width: 100%;
        }

        .dialog-box::before {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            margin-left: -10px;
            border-width: 0 10px 15px 10px;
            border-style: solid;
            border-color: transparent transparent #000 transparent;
        }
        .dialog-box::after {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            margin-left: -9px;
            border-width: 0 9px 13px 9px;
            border-style: solid;
            border-color: transparent transparent #fceb6b transparent;
        }

        #dialog-text {
            font-family: 'Bangers', cursive;
            font-size: 1.0rem;
            line-height: 1.2;
            color: #000;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-height: 40px;
        }

        .pill-hitbox {
            position: absolute;
            width: 18%;
            height: 25%;
            z-index: 7;
            cursor: pointer;
            pointer-events: none;
            border-radius: 50%;
            transition: all 0.2s ease;
            border: 3px solid transparent; 
        }

        .pill-hitbox:hover {
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 35px rgba(255, 255, 255, 0.7);
            transform: scale(1.1);
        }

        .pill-hitbox.active {
            pointer-events: auto;
            animation: pulseHitbox 2s infinite;
        }

        @keyframes pulseHitbox {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 255, 255, 0.2); }
            50% { box-shadow: 0 0 25px rgba(255, 255, 255, 0.8); }
        }

        #blue-pill { bottom: 18%; left: 12%; }
        #orange-pill { bottom: 18%; right: 12%; }

        #result-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 2rem;
            text-align: center;
            padding: 20px;
            animation: blinkResult 0.3s forwards;
        }

        @keyframes blinkResult {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        #result-screen.blue-screen {
            background: rgba(0, 0, 0, 0.95);
            color: #00ff41;
            font-family: monospace;
            text-shadow: 0 0 15px #00ff41;
        }

        #result-screen.orange-screen {
            background: rgba(10, 10, 10, 0.95);
            color: #ff8800;
            text-shadow: 0 0 20px #ff8800, 0 0 40px #ff2200;
        }

        #result-text {
            border: 4px solid currentColor;
            padding: 25px;
            background: rgba(0,0,0,0.6);
            max-width: 90%;
        }

        @media (max-width: 600px) {
            #dialog-wrapper { width: 70%; bottom: 10%; }
            #dialog-text { font-size: 0.9rem; min-height: 40px; }
            #result-screen { font-size: 1.2rem; }
            .pill-hitbox { width: 25%; height: 20%; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        
        <img id="character-image" src="https://i.postimg.cc/FFJYB674/8d585bb7-f119-42fd-9ba0-2a3e749a50b1.png" alt="Personagem Mascarado">

        <div id="top-curtain"></div>
        <div id="bottom-curtain"></div>

        <div id="blue-pill" class="pill-hitbox" onclick="makeChoice('blue')"></div>
        <div id="orange-pill" class="pill-hitbox" onclick="makeChoice('orange')"></div>

        <div id="dialog-wrapper">
            <div class="dialog-box">
                <div id="dialog-text"></div>
            </div>
        </div>

        <div id="result-screen">
            <div id="result-text">A REALIDADE É UMA ILUSÃO</div>
        </div>

    </div>

    <script>
        const dialogTextEl = document.getElementById('dialog-text');
        const dialogWrapper = document.getElementById('dialog-wrapper');
        const pills = document.querySelectorAll('.pill-hitbox');
        const resultScreen = document.getElementById('result-screen');
        const resultText = document.getElementById('result-text');
        const characterImg = document.getElementById('character-image');

        // Lista de diálogos (3)
        const dialogPhrases = [
            "A pílula laranja vai te revelar os segredos mais profundos",
            "A azul você volta para sua casa e esqueça essa conversa",
            "Você precisa fazer uma escolha"
        ];

        let currentDialogIndex = 0;
        let typingTimeout = null;

        // === INÍCIO DO DESEMBAÇO: junto com o início do piscar (após 1s) ===
        setTimeout(() => {
            characterImg.style.filter = 'blur(0px)';
        }, 1000);

        // === DIÁLOGO E DIGITAÇÃO: SÓ APÓS O DESEMBAÇO COMPLETO (5s) ===
        setTimeout(() => {
            dialogWrapper.style.display = 'flex';
            dialogWrapper.style.opacity = '1';
            startNextDialog(); // inicia o primeiro diálogo
        }, 5000);

        function startNextDialog() {
            if (currentDialogIndex >= dialogPhrases.length) {
                // Todos os diálogos foram mostrados, ativar pílulas
                pills.forEach(pill => pill.classList.add('active'));
                return;
            }

            // Limpa o texto anterior e começa a digitar o atual
            dialogTextEl.innerHTML = '';
            let index = 0;
            const currentPhrase = dialogPhrases[currentDialogIndex];

            function typeNextChar() {
                if (index < currentPhrase.length) {
                    dialogTextEl.innerHTML += currentPhrase.charAt(index);
                    index++;
                    typingTimeout = setTimeout(typeNextChar, 35);
                } else {
                    // Terminou de digitar, espera 1 segundo e vai para o próximo
                    typingTimeout = setTimeout(() => {
                        currentDialogIndex++;
                        startNextDialog();
                    }, 1000);
                }
            }

            typeNextChar();
        }

        function makeChoice(color) {
            // Cancela qualquer digitação pendente
            if (typingTimeout) clearTimeout(typingTimeout);
            pills.forEach(pill => pill.classList.remove('active')); 
            pills.forEach(pill => pill.style.pointerEvents = 'none');
            
            characterImg.style.opacity = '0';
            dialogWrapper.style.opacity = '0';

            setTimeout(() => {
                if (color === 'blue') {
                    resultScreen.className = 'blue-screen';
                    resultText.innerHTML = "VOCÊ TOMOU A PÍLULA AZUL.<br><br>SUA MENTE FOI APAGADA. VOCÊ NUNCA ESTEVE AQUI.<br>ACORDE.";
                } else {
                    resultScreen.className = 'orange-screen';
                    resultText.innerHTML = "VOCÊ TOMOU A PÍLULA LARANJA.<br><br>BEM-VINDO À REALIDADE. O MUNDO NUNCA MAIS SERÁ O MESMO.";
                }
                resultScreen.style.display = 'flex';
            }, 1000);
        }
    </script>
</body>
</html>
