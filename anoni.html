<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolha sua Pílula</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Bangers', cursive;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: min(100vw, 800px);
            height: min(100vh, 1000px);
            aspect-ratio: 4 / 5;
            background-color: #000;
            overflow: hidden;
            box-shadow: 0 0 clamp(20px, 4vw, 40px) rgba(255, 255, 255, 0.1);
            border: clamp(2px, 0.3vw, 4px) solid #222;
        }

        #character-image {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
            opacity: 1;
            filter: blur(20px);
            transition: filter 4s ease-out;
        }

        #top-curtain, #bottom-curtain {
            position: absolute;
            left: 0;
            width: 100%;
            background: #000;
            z-index: 10;
            pointer-events: none;
            animation: curtainFlicker 2s ease-in-out forwards;
            animation-delay: 1s;
        }

        #top-curtain {
            top: 0;
            height: 50%;
        }

        #bottom-curtain {
            bottom: 0;
            height: 50%;
        }

        @keyframes curtainFlicker {
            0%   { height: 50%; }
            15%  { height: 0%; }
            25%  { height: 50%; }
            35%  { height: 0%; }
            45%  { height: 50%; }
            55%  { height: 0%; }
            65%  { height: 50%; }
            85%  { height: 0%; }
            100% { height: 0%; opacity: 0; }
        }

        #dialog-wrapper {
            position: absolute;
            bottom: clamp(25%, 30vh, 40%);
            left: 50%;
            transform: translateX(-50%);
            width: min(55%, 380px);
            z-index: 5;
            opacity: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.5s;
        }

        .dialog-box {
            background: #fceb6b;
            border: clamp(2px, 0.3vw, 4px) solid #000;
            border-radius: clamp(6px, 1vw, 10px);
            padding: clamp(8px, 1.2vh, 16px) clamp(10px, 1.5vw, 20px);
            box-shadow: clamp(3px, 0.5vw, 6px) clamp(3px, 0.5vw, 6px) 0px #000;
            position: relative;
            width: 100%;
        }

        .dialog-box::before {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            margin-left: clamp(-6px, -1vw, -10px);
            border-width: 0 clamp(6px, 1vw, 10px) clamp(10px, 1.5vw, 15px) clamp(6px, 1vw, 10px);
            border-style: solid;
            border-color: transparent transparent #000 transparent;
        }
        
        .dialog-box::after {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            margin-left: clamp(-5px, -0.8vw, -9px);
            border-width: 0 clamp(5px, 0.8vw, 9px) clamp(8px, 1.2vw, 13px) clamp(5px, 0.8vw, 9px);
            border-style: solid;
            border-color: transparent transparent #fceb6b transparent;
        }

        #dialog-text {
            font-family: 'Bangers', cursive;
            font-size: clamp(0.75rem, 2vw, 1.2rem);
            line-height: 1.2;
            color: #000;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-height: clamp(30px, 4vh, 50px);
            word-wrap: break-word;
        }

        .pill-hitbox {
            position: absolute;
            width: clamp(14%, 17%, 20%);
            height: clamp(18%, 21%, 25%);
            z-index: 7;
            cursor: pointer;
            pointer-events: none;
            border-radius: 50%;
            transition: all 0.2s ease;
            border: clamp(2px, 0.25vw, 3px) solid transparent;
        }

        .pill-hitbox:hover {
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 clamp(15px, 2.5vw, 35px) rgba(255, 255, 255, 0.7);
            transform: scale(1.1);
        }

        .pill-hitbox.active {
            pointer-events: auto;
            animation: pulseHitbox 2s infinite;
        }

        @keyframes pulseHitbox {
            0%, 100% { box-shadow: 0 0 clamp(5px, 0.8vw, 10px) rgba(255, 255, 255, 0.2); }
            50% { box-shadow: 0 0 clamp(12px, 2vw, 25px) rgba(255, 255, 255, 0.8); }
        }

        #blue-pill { 
            bottom: clamp(12%, 14vh, 18%);
            left: clamp(6%, 8vw, 12%);
        }
        
        #orange-pill { 
            bottom: clamp(12%, 14vh, 18%);
            right: clamp(6%, 8vw, 12%);
        }

        #result-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: clamp(1.2rem, 3vw, 2.5rem);
            text-align: center;
            padding: clamp(10px, 2vh, 30px);
            animation: blinkResult 0.3s forwards;
        }

        @keyframes blinkResult {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        #result-screen.blue-screen {
            background: rgba(0, 0, 0, 0.95);
            color: #00ff41;
            font-family: monospace;
            text-shadow: 0 0 15px #00ff41;
        }

        #result-screen.orange-screen {
            background: rgba(10, 10, 10, 0.95);
            color: #ff8800;
            text-shadow: 0 0 20px #ff8800, 0 0 40px #ff2200;
        }

        #result-text {
            border: clamp(2px, 0.3vw, 4px) solid currentColor;
            padding: clamp(12px, 2.5vh, 25px);
            background: rgba(0,0,0,0.6);
            max-width: 90%;
            font-size: clamp(0.9rem, 2.2vw, 2rem);
            line-height: 1.4;
        }

        /* Ajustes para telas muito pequenas (celulares) */
        @media (max-width: 480px) {
            #dialog-wrapper {
                bottom: clamp(15%, 18vh, 22%);
                width: min(75%, 320px);
            }
            
            #dialog-text {
                font-size: clamp(0.7rem, 2.5vw, 0.85rem);
                min-height: 28px;
            }
            
            .pill-hitbox {
                width: clamp(18%, 20%, 22%);
                height: clamp(18%, 20%, 22%);
            }
            
            #blue-pill { 
                bottom: clamp(10%, 12vh, 15%); 
                left: clamp(5%, 6vw, 8%); 
            }
            
            #orange-pill { 
                bottom: clamp(10%, 12vh, 15%); 
                right: clamp(5%, 6vw, 8%); 
            }
            
            #result-text {
                font-size: clamp(0.75rem, 2.5vw, 0.9rem);
                padding: clamp(10px, 1.5vh, 15px);
            }
            
            .dialog-box {
                padding: clamp(6px, 1vh, 10px) clamp(8px, 1.5vw, 14px);
            }
        }

        /* Ajustes para tablets */
        @media (min-width: 481px) and (max-width: 1024px) {
            #dialog-wrapper {
                width: min(50%, 350px);
                bottom: clamp(20%, 25vh, 30%);
            }
            
            #dialog-text {
                font-size: clamp(0.9rem, 1.8vw, 1.1rem);
            }
            
            .pill-hitbox {
                width: clamp(15%, 17%, 19%);
                height: clamp(19%, 21%, 23%);
            }
        }

        /* Ajustes para telas grandes (desktop) */
        @media (min-width: 1025px) {
            #game-container {
                max-width: 800px;
                max-height: 1000px;
            }
            
            #dialog-wrapper {
                bottom: clamp(30%, 35vh, 40%);
            }
            
            #dialog-text {
                font-size: clamp(1rem, 1.5vw, 1.2rem);
            }
        }

        /* Ajustes para telas muito altas (celulares em portrait) */
        @media (max-height: 700px) {
            #dialog-wrapper {
                bottom: clamp(20%, 22vh, 28%);
            }
            
            .pill-hitbox {
                height: clamp(16%, 18%, 20%);
            }
            
            #blue-pill, #orange-pill {
                bottom: clamp(8%, 10vh, 14%);
            }
        }

        /* Ajustes para telas muito largas */
        @media (min-aspect-ratio: 1/1) {
            #game-container {
                max-width: 800px;
                max-height: 1000px;
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        
        <img id="character-image" src="https://i.postimg.cc/FFJYB674/8d585bb7-f119-42fd-9ba0-2a3e749a50b1.png" alt="Personagem Mascarado">

        <div id="top-curtain"></div>
        <div id="bottom-curtain"></div>

        <div id="blue-pill" class="pill-hitbox" onclick="makeChoice('blue')"></div>
        <div id="orange-pill" class="pill-hitbox" onclick="makeChoice('orange')"></div>

        <div id="dialog-wrapper">
            <div class="dialog-box">
                <div id="dialog-text"></div>
            </div>
        </div>

        <div id="result-screen">
            <div id="result-text">A REALIDADE É UMA ILUSÃO</div>
        </div>

    </div>

    <script>
        const dialogTextEl = document.getElementById('dialog-text');
        const dialogWrapper = document.getElementById('dialog-wrapper');
        const pills = document.querySelectorAll('.pill-hitbox');
        const resultScreen = document.getElementById('result-screen');
        const resultText = document.getElementById('result-text');
        const characterImg = document.getElementById('character-image');

        const dialogPhrases = [
            "A pílula laranja vai te revelar os segredos mais profundos",
            "A azul você volta para sua casa e esqueça essa conversa",
            "Você precisa fazer uma escolha"
        ];

        let currentDialogIndex = 0;
        let typingTimeout = null;

        setTimeout(() => {
            characterImg.style.filter = 'blur(0px)';
        }, 1000);

        setTimeout(() => {
            dialogWrapper.style.display = 'flex';
            dialogWrapper.style.opacity = '1';
            startNextDialog();
        }, 5000);

        function startNextDialog() {
            if (currentDialogIndex >= dialogPhrases.length) {
                pills.forEach(pill => pill.classList.add('active'));
                return;
            }

            dialogTextEl.innerHTML = '';
            let index = 0;
            const currentPhrase = dialogPhrases[currentDialogIndex];

            function typeNextChar() {
                if (index < currentPhrase.length) {
                    dialogTextEl.innerHTML += currentPhrase.charAt(index);
                    index++;
                    typingTimeout = setTimeout(typeNextChar, 35);
                } else {
                    typingTimeout = setTimeout(() => {
                        currentDialogIndex++;
                        startNextDialog();
                    }, 1000);
                }
            }

            typeNextChar();
        }

        function makeChoice(color) {
            if (typingTimeout) clearTimeout(typingTimeout);
            pills.forEach(pill => pill.classList.remove('active'));
            pills.forEach(pill => pill.style.pointerEvents = 'none');
            
            characterImg.style.opacity = '0';
            dialogWrapper.style.opacity = '0';

            setTimeout(() => {
                if (color === 'blue') {
                    resultScreen.className = 'blue-screen';
                    resultText.innerHTML = "VOCÊ TOMOU A PÍLULA AZUL.<br><br>SUA MENTE FOI APAGADA. VOCÊ NUNCA ESTEVE AQUI.<br>ACORDE.";
                } else {
                    resultScreen.className = 'orange-screen';
                    resultText.innerHTML = "VOCÊ TOMOU A PÍLULA LARANJA.<br><br>BEM-VINDO À REALIDADE. O MUNDO NUNCA MAIS SERÁ O MESMO.";
                }
                resultScreen.style.display = 'flex';
            }, 1000);
        }
    </script>
</body>
</html>
