<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolha sua Pílula</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Bangers', cursive;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 800px;
            max-height: 1000px;
            aspect-ratio: 4/5;
            background-color: #000;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
            border: clamp(2px, 0.5vw, 4px) solid #222;
            display: flex;
            flex-direction: column;
        }

        /* Área da imagem ocupa a maior parte */
        #image-area {
            position: relative;
            flex: 1;
            min-height: 0;
            overflow: hidden;
            background: #000;
        }

        #character-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 1;
            filter: blur(20px);
            transition: filter 4s ease-out;
        }

        #top-curtain, #bottom-curtain {
            position: absolute;
            left: 0;
            width: 100%;
            background: #000;
            z-index: 10;
            pointer-events: none;
            animation: curtainFlicker 2s ease-in-out forwards;
            animation-delay: 1s;
        }

        #top-curtain {
            top: 0;
            height: 50%;
        }

        #bottom-curtain {
            bottom: 0;
            height: 50%;
        }

        @keyframes curtainFlicker {
            0%   { height: 50%; }
            15%  { height: 0%; }
            25%  { height: 50%; }
            35%  { height: 0%; }
            45%  { height: 50%; }
            55%  { height: 0%; }
            65%  { height: 50%; }
            85%  { height: 0%; }
            100% { height: 0%; opacity: 0; }
        }

        #dialog-wrapper {
            position: absolute;
            bottom: clamp(10%, 15vh, 20%);
            left: 50%;
            transform: translateX(-50%);
            width: min(55%, 380px);
            z-index: 5;
            opacity: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.5s;
        }

        .dialog-box {
            background: #fceb6b;
            border: clamp(2px, 0.4vw, 4px) solid #000;
            border-radius: clamp(6px, 1.2vw, 10px);
            padding: clamp(8px, 1.5vh, 16px) clamp(10px, 2vw, 20px);
            box-shadow: clamp(3px, 0.6vw, 6px) clamp(3px, 0.6vw, 6px) 0px #000;
            position: relative;
            width: 100%;
        }

        .dialog-box::before {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            margin-left: clamp(-6px, -1.2vw, -10px);
            border-width: 0 clamp(6px, 1.2vw, 10px) clamp(10px, 1.8vw, 15px) clamp(6px, 1.2vw, 10px);
            border-style: solid;
            border-color: transparent transparent #000 transparent;
        }
        
        .dialog-box::after {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            margin-left: clamp(-5px, -1vw, -9px);
            border-width: 0 clamp(5px, 1vw, 9px) clamp(8px, 1.5vw, 13px) clamp(5px, 1vw, 9px);
            border-style: solid;
            border-color: transparent transparent #fceb6b transparent;
        }

        #dialog-text {
            font-family: 'Bangers', cursive;
            font-size: clamp(0.8rem, 2.5vw, 1.2rem);
            line-height: 1.2;
            color: #000;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-height: clamp(30px, 5vh, 50px);
            word-wrap: break-word;
        }

        /* === ÁREA DOS BOTÕES (abaixo da imagem) === */
        #buttons-area {
            position: relative;
            z-index: 15;
            background: #0a0a0a;
            padding: clamp(8px, 2vh, 20px) clamp(10px, 3vw, 30px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: clamp(12px, 3vw, 30px);
            border-top: 2px solid #222;
            min-height: clamp(80px, 18vh, 160px);
            flex-shrink: 0;
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }

        #buttons-area.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .pill-btn {
            flex: 1;
            max-width: clamp(120px, 28vw, 200px);
            aspect-ratio: 1/1;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 -8px 12px rgba(0,0,0,0.5);
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bangers', cursive;
            font-size: clamp(0.9rem, 2vw, 1.6rem);
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.7);
            background: radial-gradient(circle at 30% 30%, #fff, #888);
            background-blend-mode: overlay;
            margin: 0 auto;
            transition: all 0.3s ease;
        }

        .pill-btn:hover {
            transform: scale(1.08);
            border-color: rgba(255,255,240,0.9);
            box-shadow: 0 0 50px rgba(255,255,200,0.5);
        }

        .pill-btn:active {
            transform: scale(0.95);
        }

        #blue-btn {
            background: radial-gradient(circle at 30% 30%, #6ab0ff, #0033aa);
            border-color: #8ac4ff;
        }

        #orange-btn {
            background: radial-gradient(circle at 30% 30%, #ffb347, #cc5500);
            border-color: #ffa500;
        }

        .pill-btn .label {
            background: rgba(0,0,0,0.35);
            padding: 4px 12px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.15);
        }

        /* Resultado cobre tudo */
        #result-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: clamp(1.2rem, 3vw, 2.5rem);
            text-align: center;
            padding: clamp(10px, 3vh, 30px);
            animation: blinkResult 0.3s forwards;
        }

        @keyframes blinkResult {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        #result-screen.blue-screen {
            background: rgba(0, 0, 0, 0.95);
            color: #00ff41;
            font-family: monospace;
            text-shadow: 0 0 15px #00ff41;
        }

        #result-screen.orange-screen {
            background: rgba(10, 10, 10, 0.95);
            color: #ff8800;
            text-shadow: 0 0 20px #ff8800, 0 0 40px #ff2200;
        }

        #result-text {
            border: clamp(2px, 0.4vw, 4px) solid currentColor;
            padding: clamp(12px, 3vh, 25px);
            background: rgba(0,0,0,0.6);
            max-width: 90%;
            font-size: clamp(1rem, 2.5vw, 2rem);
            line-height: 1.4;
        }

        /* Ajustes responsivos */
        @media (max-width: 480px) {
            #dialog-wrapper {
                bottom: 8%;
                width: 75%;
            }
            #dialog-text {
                font-size: 0.8rem;
                min-height: 30px;
            }
            #buttons-area {
                padding: 8px 12px;
                min-height: 70px;
                gap: 10px;
            }
            .pill-btn {
                max-width: 70px;
                font-size: 0.6rem;
            }
            .pill-btn .label {
                padding: 2px 6px;
            }
            #result-text {
                font-size: 0.85rem;
                padding: 12px;
            }
        }

        @media (min-width: 481px) and (max-width: 1024px) {
            #dialog-wrapper {
                width: 55%;
                bottom: 12%;
            }
            #dialog-text {
                font-size: 1rem;
            }
            #buttons-area {
                min-height: 100px;
                padding: 12px 20px;
            }
            .pill-btn {
                max-width: 110px;
                font-size: 1rem;
            }
        }

        @media (min-width: 1025px) {
            #game-container {
                max-width: 800px;
                max-height: 1000px;
            }
            #buttons-area {
                min-height: 140px;
                padding: 18px 30px;
            }
            .pill-btn {
                max-width: 160px;
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        
        <!-- Área da imagem -->
        <div id="image-area">
            <img id="character-image" src="https://i.postimg.cc/FFJYB674/8d585bb7-f119-42fd-9ba0-2a3e749a50b1.png" alt="Personagem Mascarado">

            <div id="top-curtain"></div>
            <div id="bottom-curtain"></div>

            <div id="dialog-wrapper">
                <div class="dialog-box">
                    <div id="dialog-text"></div>
                </div>
            </div>
        </div>

        <!-- Área dos botões (abaixo da imagem) -->
        <div id="buttons-area">
            <div id="blue-btn" class="pill-btn" onclick="makeChoice('blue')">
                <span class="label">AZUL</span>
            </div>
            <div id="orange-btn" class="pill-btn" onclick="makeChoice('orange')">
                <span class="label">LARANJA</span>
            </div>
        </div>

        <!-- Tela de resultado -->
        <div id="result-screen">
            <div id="result-text">A REALIDADE É UMA ILUSÃO</div>
        </div>

    </div>

    <script>
        const dialogTextEl = document.getElementById('dialog-text');
        const dialogWrapper = document.getElementById('dialog-wrapper');
        const buttonsArea = document.getElementById('buttons-area');
        const resultScreen = document.getElementById('result-screen');
        const resultText = document.getElementById('result-text');
        const characterImg = document.getElementById('character-image');
        const blueBtn = document.getElementById('blue-btn');
        const orangeBtn = document.getElementById('orange-btn');

        const dialogPhrases = [
            "A pílula laranja vai te revelar os segredos mais profundos",
            "A azul você volta para sua casa e esqueça essa conversa",
            "Você precisa fazer uma escolha"
        ];

        let currentDialogIndex = 0;
        let typingTimeout = null;
        let dialogFinished = false;

        // Desfoca a imagem após 1s
        setTimeout(() => {
            characterImg.style.filter = 'blur(0px)';
        }, 1000);

        // Inicia o diálogo após 5s
        setTimeout(() => {
            dialogWrapper.style.display = 'flex';
            dialogWrapper.style.opacity = '1';
            startNextDialog();
        }, 5000);

        function startNextDialog() {
            if (currentDialogIndex >= dialogPhrases.length) {
                // Diálogo terminado → mostrar botões
                dialogFinished = true;
                buttonsArea.classList.add('visible');
                return;
            }

            dialogTextEl.innerHTML = '';
            let index = 0;
            const currentPhrase = dialogPhrases[currentDialogIndex];

            function typeNextChar() {
                if (index < currentPhrase.length) {
                    dialogTextEl.innerHTML += currentPhrase.charAt(index);
                    index++;
                    typingTimeout = setTimeout(typeNextChar, 35);
                } else {
                    typingTimeout = setTimeout(() => {
                        currentDialogIndex++;
                        startNextDialog();
                    }, 1000);
                }
            }

            typeNextChar();
        }

        function makeChoice(color) {
            // Impede múltiplos cliques
            if (!dialogFinished) return;
            
            // Desativa os botões
            buttonsArea.classList.remove('visible');
            blueBtn.style.pointerEvents = 'none';
            orangeBtn.style.pointerEvents = 'none';
            
            if (typingTimeout) clearTimeout(typingTimeout);
            
            characterImg.style.opacity = '0';
            dialogWrapper.style.opacity = '0';

            setTimeout(() => {
                if (color === 'blue') {
                    resultScreen.className = 'blue-screen';
                    resultText.innerHTML = "VOCÊ TOMOU A PÍLULA AZUL.<br><br>SUA MENTE FOI APAGADA. VOCÊ NUNCA ESTEVE AQUI.<br>ACORDE.";
                } else {
                    resultScreen.className = 'orange-screen';
                    resultText.innerHTML = "VOCÊ TOMOU A PÍLULA LARANJA.<br><br>BEM-VINDO À REALIDADE. O MUNDO NUNCA MAIS SERÁ O MESMO.";
                }
                resultScreen.style.display = 'flex';
            }, 1000);
        }
    </script>
</body>
</html>
