<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sound of Monero — Perpétuo Binance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0e14;
            color: #e0e4ed;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }
        #canvas3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            display: block;
        }
        .ui-overlay {
            position: fixed;
            z-index: 10;
            pointer-events: none;
        }
        .ui-overlay * {
            pointer-events: auto;
        }
        .header {
            top: 24px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 0 32px;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 0.3px;
            background: rgba(11, 14, 20, 0.65);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .header h1 span {
            color: #f7931a;
        }
        .header .status {
            font-size: 13px;
            opacity: 0.6;
            background: rgba(11, 14, 20, 0.5);
            backdrop-filter: blur(10px);
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .header .status .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            background: #4ade80;
            animation: pulse-dot 1.8s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.3;
                transform: scale(0.7);
            }
        }
        .market-panel {
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 48px;
            background: rgba(11, 14, 20, 0.6);
            backdrop-filter: blur(16px);
            padding: 20px 44px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }
        .market-item {
            text-align: center;
        }
        .market-item .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.4;
            margin-bottom: 4px;
        }
        .market-item .value {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.2px;
        }
        .market-item .value.xmr {
            color: #f7931a;
        }
        .market-item .value.volume {
            color: #60a5fa;
        }
        .market-item .value.change {
            font-size: 18px;
        }
        .market-item .value.change.positive {
            color: #4ade80;
        }
        .market-item .value.change.negative {
            color: #f87171;
        }
        .market-item .value.bpm {
            color: #c084fc;
        }
        .play-btn {
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(247, 147, 26, 0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(247, 147, 26, 0.3);
            color: #f7931a;
            padding: 14px 48px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }
        .play-btn:hover {
            background: rgba(247, 147, 26, 0.25);
            border-color: #f7931a;
            transform: translateX(-50%) scale(1.03);
            box-shadow: 0 0 40px rgba(247, 147, 26, 0.15);
        }
        .play-btn.playing {
            border-color: #4ade80;
            color: #4ade80;
            background: rgba(74, 222, 128, 0.12);
        }
        .footer {
            bottom: 100px;
            right: 32px;
            font-size: 11px;
            opacity: 0.25;
            text-align: right;
            line-height: 1.6;
            pointer-events: none;
        }
        @media (max-width: 720px) {
            .header {
                padding: 0 16px;
                top: 16px;
                flex-direction: column;
                gap: 8px;
            }
            .header h1 {
                font-size: 16px;
                padding: 6px 14px;
            }
            .market-panel {
                bottom: 100px;
                padding: 14px 20px;
                gap: 20px;
                flex-wrap: wrap;
                justify-content: center;
                border-radius: 32px;
                width: calc(100% - 32px);
            }
            .market-item .value {
                font-size: 17px;
            }
            .play-btn {
                padding: 12px 32px;
                font-size: 14px;
                bottom: 28px;
            }
            .footer {
                display: none;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas3d"></canvas>

    <div class="ui-overlay header">
        <h1>✦ <span>Sound</span> of Monero</h1>
        <div class="status">
            <span class="dot"></span>
            <span id="statusText">conectando...</span>
        </div>
    </div>

    <div class="ui-overlay market-panel">
        <div class="market-item">
            <div class="label">XMR / USDT</div>
            <div class="value xmr" id="priceDisplay">—</div>
        </div>
        <div class="market-item">
            <div class="label">Volume 24h</div>
            <div class="value volume" id="volumeDisplay">—</div>
        </div>
        <div class="market-item">
            <div class="label">Variação 24h</div>
            <div class="value change" id="changeDisplay">—</div>
        </div>
        <div class="market-item">
            <div class="label">BPM</div>
            <div class="value bpm" id="bpmDisplay">—</div>
        </div>
    </div>

    <button class="ui-overlay play-btn" id="playBtn">▶ Iniciar</button>
    <div class="ui-overlay footer">Dados: Binance · XMRUSDT Perpétuo</div>

    <script>
        // ═══════════════════════════════════════════════════════════
        //  CONFIGURAÇÕES
        // ═══════════════════════════════════════════════════════════

        const SYMBOL = 'XMRUSDT';
        const BINANCE_TICKER = `https://api.binance.com/api/v3/ticker/24hr?symbol=${SYMBOL}`;
        const BINANCE_KLINES = `https://api.binance.com/api/v3/klines?symbol=${SYMBOL}&interval=1d&limit=7`;

        // Mapeamento musical
        const NOTE_BASE = 48; // C3
        const NOTE_RANGE = 36; // 3 oitavas
        const PRICE_MIN = 50;
        const PRICE_MAX = 250;

        // Estado
        let isPlaying = false;
        let audioCtx = null;
        let gainNode = null;
        let currentOsc = null;
        let bpm = 80;
        let price = 0;
        let volume = 0;
        let change24h = 0;
        let historicalPrices = [];
        let melodyNotes = [];
        let melodyIndex = 0;

        // Timers
        let dataInterval = null;
        let melodyInterval = null;
        let animationId = null;

        // DOM
        const priceDisplay = document.getElementById('priceDisplay');
        const volumeDisplay = document.getElementById('volumeDisplay');
        const changeDisplay = document.getElementById('changeDisplay');
        const bpmDisplay = document.getElementById('bpmDisplay');
        const statusText = document.getElementById('statusText');
        const playBtn = document.getElementById('playBtn');

        // ═══════════════════════════════════════════════════════════
        //  CANVAS 3D (mesmo código de antes, mantido)
        // ═══════════════════════════════════════════════════════════

        const canvas = document.getElementById('canvas3d');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const EARTH_POINTS = 600;
        const earthPoints = [];
        for (let i = 0; i < EARTH_POINTS; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = 180 + Math.random() * 30;
            earthPoints.push({
                x: r * Math.sin(phi) * Math.cos(theta),
                y: r * Math.cos(phi),
                z: r * Math.sin(phi) * Math.sin(theta),
                baseR: r,
            });
        }

        const NUM_PARTICLES = 400;
        const particles = [];
        for (let i = 0; i < NUM_PARTICLES; i++) {
            particles.push({
                x: (Math.random() - 0.5) * 1200,
                y: (Math.random() - 0.5) * 800,
                z: (Math.random() - 0.5) * 800,
                size: 1 + Math.random() * 2.5,
                speed: 0.2 + Math.random() * 0.4,
                phase: Math.random() * Math.PI * 2,
            });
        }

        let rotX = 0.3;
        let rotY = 0;

        function project(x, y, z) {
            const cx = W / 2;
            const cy = H / 2;
            const fov = 500;
            const scale = fov / (fov + z);
            return { x: cx + x * scale, y: cy + y * scale, s: scale };
        }

        function drawEarth(time, intensity) {
            ctx.clearRect(0, 0, W, H);
            const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, 600);
            grad.addColorStop(0, '#141a24');
            grad.addColorStop(1, '#07090e');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            rotY += 0.002 + intensity * 0.001;
            const cosY = Math.cos(rotY);
            const sinY = Math.sin(rotY);
            const cosX = Math.cos(rotX);
            const sinX = Math.sin(rotX);

            const projected = [];
            for (const p of earthPoints) {
                let x = p.x,
                    y = p.y,
                    z = p.z;
                let x1 = x * cosY - z * sinY;
                let z1 = x * sinY + z * cosY;
                let y1 = y;
                let y2 = y1 * cosX - z1 * sinX;
                let z2 = y1 * sinX + z1 * cosX;
                let x2 = x1;
                const proj = project(x2, y2, z2);
                if (proj.s > 0) projected.push({ x: proj.x, y: proj.y, s: proj.s, z: z2 });
            }
            projected.sort((a, b) => a.z - b.z);

            ctx.strokeStyle = `rgba(247, 147, 26, ${0.04 + intensity * 0.06})`;
            ctx.lineWidth = 0.6;
            for (let i = 0; i < projected.length; i++) {
                for (let j = i + 1; j < projected.length; j++) {
                    const dx = projected[i].x - projected[j].x;
                    const dy = projected[i].y - projected[j].y;
                    if (dx * dx + dy * dy < 2500) {
                        ctx.beginPath();
                        ctx.moveTo(projected[i].x, projected[i].y);
                        ctx.lineTo(projected[j].x, projected[j].y);
                        ctx.stroke();
                    }
                }
            }
            for (const p of projected) {
                const size = (1.2 + intensity * 1.5) * p.s;
                ctx.beginPath();
                ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(247, 147, 26, ${0.5 + intensity * 0.4})`;
                ctx.fill();
            }

            const time2 = Date.now() * 0.0003;
            for (const p of particles) {
                const x = p.x + Math.sin(time2 * p.speed + p.phase) * 30;
                const y = p.y + Math.cos(time2 * p.speed * 0.7 + p.phase) * 20;
                const z = p.z + Math.sin(time2 * p.speed * 0.5 + p.phase * 2) * 40;
                const proj = project(x, y, z);
                if (proj.s > 0) {
                    const alpha = 0.2 + 0.4 * (0.5 + 0.5 * Math.sin(time2 * 0.5 + p.phase));
                    ctx.beginPath();
                    ctx.arc(proj.x, proj.y, p.size * proj.s * 0.6, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(200, 215, 255, ${alpha * (0.6 + intensity * 0.4)})`;
                    ctx.fill();
                }
            }

            const sunX = W / 2 + 300;
            const sunY = H / 2 - 100;
            const sunRadius = 50 + intensity * 20;
            const gradSun = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, sunRadius);
            const sunAlpha = 0.6 + intensity * 0.3;
            gradSun.addColorStop(0, `rgba(255, 220, 100, ${sunAlpha})`);
            gradSun.addColorStop(0.4, `rgba(255, 180, 50, ${sunAlpha * 0.6})`);
            gradSun.addColorStop(1, `rgba(255, 150, 30, 0)`);
            ctx.fillStyle = gradSun;
            ctx.beginPath();
            ctx.arc(sunX, sunY, sunRadius, 0, Math.PI * 2);
            ctx.fill();

            const glow = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, sunRadius * 2.5);
            glow.addColorStop(0, `rgba(255, 200, 80, ${0.08 + intensity * 0.08})`);
            glow.addColorStop(1, `rgba(255, 200, 80, 0)`);
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(sunX, sunY, sunRadius * 2.5, 0, Math.PI * 2);
            ctx.fill();
        }

        // ═══════════════════════════════════════════════════════════
        //  ÁUDIO
        // ═══════════════════════════════════════════════════════════

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                gainNode = audioCtx.createGain();
                gainNode.gain.value = 0.25;
                gainNode.connect(audioCtx.destination);
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playNote(pitch, velocity, duration) {
            if (!audioCtx || !isPlaying) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = pitch;
            const vol = 0.08 + velocity * 0.25;
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(gainNode);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playDrone(pitch, intensity) {
            if (currentOsc) {
                try { currentOsc.stop(); } catch (_) {}
            }
            if (!audioCtx || !isPlaying) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = pitch;
            const vol = 0.04 + intensity * 0.12;
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(gainNode);
            osc.start();
            currentOsc = osc;
        }

        function stopDrone() {
            if (currentOsc) {
                try { currentOsc.stop(); } catch (_) {}
                currentOsc = null;
            }
        }

        // ═══════════════════════════════════════════════════════════
        //  API BINANCE
        // ═══════════════════════════════════════════════════════════

        async function fetchMarketData() {
            try {
                const resp = await fetch(BINANCE_TICKER);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();

                price = parseFloat(data.lastPrice) || 0;
                volume = parseFloat(data.quoteVolume) || 0;
                change24h = parseFloat(data.priceChangePercent) || 0;

                priceDisplay.textContent = price ? `$${price.toFixed(2)}` : '—';
                volumeDisplay.textContent = volume ? `$${(volume / 1e6).toFixed(2)}M` : '—';

                const changeEl = changeDisplay;
                if (change24h !== 0) {
                    changeEl.textContent = `${change24h > 0 ? '+' : ''}${change24h.toFixed(2)}%`;
                    changeEl.className = 'value change ' + (change24h >= 0 ? 'positive' : 'negative');
                } else {
                    changeEl.textContent = '—';
                }

                statusText.textContent = 'ao vivo';
                return { price, volume, change24h };
            } catch (err) {
                console.warn('Erro na Binance:', err);
                statusText.textContent = '⚠️ erro';
                return null;
            }
        }

        async function fetchHistoricalPrices() {
            try {
                const resp = await fetch(BINANCE_KLINES);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();
                historicalPrices = data.map(candle => parseFloat(candle[4])); // close price
                return historicalPrices;
            } catch (err) {
                console.warn('Erro ao buscar histórico:', err);
                return [];
            }
        }

        // ═══════════════════════════════════════════════════════════
        //  LÓGICA MUSICAL
        // ═══════════════════════════════════════════════════════════

        function mapPriceToNote(priceVal) {
            const clamped = Math.max(PRICE_MIN, Math.min(PRICE_MAX, priceVal));
            const normalized = (clamped - PRICE_MIN) / (PRICE_MAX - PRICE_MIN);
            return NOTE_BASE + normalized * NOTE_RANGE;
        }

        function mapChangeToBpm(change) {
            const clamped = Math.max(-15, Math.min(15, change));
            const normalized = (clamped + 15) / 30;
            return 60 + normalized * 80;
        }

        function mapVolumeToIntensity(vol) {
            const maxVol = 200e6; // ~200M USD de volume diário para XMR
            return Math.min(1, vol / maxVol);
        }

        function generateMelody() {
            if (historicalPrices.length < 7) return [];
            const recent = historicalPrices.slice(-7);
            const step = recent.length > 1 ? (recent.length - 1) / 16 : 1;
            const notes = [];
            for (let i = 0; i < 16; i++) {
                const idx = Math.floor(i * step);
                const val = recent[Math.min(idx, recent.length - 1)];
                if (val) notes.push(mapPriceToNote(val));
            }
            return notes;
        }

        function playMelodyNote() {
            if (!isPlaying || !audioCtx) return;
            if (melodyNotes.length === 0) {
                melodyNotes = generateMelody();
                if (melodyNotes.length === 0) return;
                melodyIndex = 0;
            }
            const note = melodyNotes[melodyIndex % melodyNotes.length];
            const intensity = mapVolumeToIntensity(volume);
            const vel = 0.3 + intensity * 0.5;
            playNote(note, vel, 0.4);
            melodyIndex++;
            if (melodyIndex >= melodyNotes.length) {
                melodyNotes = generateMelody() || melodyNotes;
                melodyIndex = 0;
            }
        }

        // ═══════════════════════════════════════════════════════════
        //  CONTROLE PLAY / STOP
        // ═══════════════════════════════════════════════════════════

        async function start() {
            if (isPlaying) return;
            initAudio();
            if (audioCtx && audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }
            isPlaying = true;
            playBtn.textContent = '⏹ Parar';
            playBtn.classList.add('playing');
            statusText.textContent = 'carregando...';

            // Busca dados iniciais
            await fetchMarketData();
            await fetchHistoricalPrices();
            melodyNotes = generateMelody();
            melodyIndex = 0;

            if (price > 0) {
                const pitch = mapPriceToNote(price);
                const intensity = mapVolumeToIntensity(volume);
                playDrone(pitch, intensity);
                bpm = mapChangeToBpm(change24h);
                bpmDisplay.textContent = Math.round(bpm);
            }

            // Atualiza dados a cada 5s
            if (dataInterval) clearInterval(dataInterval);
            dataInterval = setInterval(async () => {
                const result = await fetchMarketData();
                if (result && result.price > 0) {
                    const pitch = mapPriceToNote(result.price);
                    const intensity = mapVolumeToIntensity(result.volume);
                    playDrone(pitch, intensity);
                    bpm = mapChangeToBpm(result.change24h);
                    bpmDisplay.textContent = Math.round(bpm);
                }
                // Atualiza histórico a cada 30s
                if (Math.random() < 0.2) { // a cada ~5 ciclos
                    await fetchHistoricalPrices();
                    melodyNotes = generateMelody();
                    melodyIndex = 0;
                }
            }, 5000);

            // Toca melodia a cada ~500ms (baseado no BPM)
            if (melodyInterval) clearInterval(melodyInterval);
            melodyInterval = setInterval(() => {
                playMelodyNote();
            }, 500);

            statusText.textContent = 'ao vivo';
        }

        function stop() {
            isPlaying = false;
            playBtn.textContent = '▶ Iniciar';
            playBtn.classList.remove('playing');
            stopDrone();
            if (dataInterval) { clearInterval(dataInterval);
                dataInterval = null; }
            if (melodyInterval) { clearInterval(melodyInterval);
                melodyInterval = null; }
            statusText.textContent = 'pausado';
        }

        playBtn.addEventListener('click', () => {
            if (isPlaying) stop();
            else start();
        });

        // ═══════════════════════════════════════════════════════════
        //  LOOP DE RENDERIZAÇÃO (sempre rodando)
        // ═══════════════════════════════════════════════════════════

        function renderLoop(timestamp) {
            const intensity = mapVolumeToIntensity(volume);
            drawEarth(timestamp, intensity);
            animationId = requestAnimationFrame(renderLoop);
        }

        // Inicia o loop de renderização
        renderLoop(0);

        // Atualiza status inicial
        statusText.textContent = 'pronto';
        console.log('🎵 Sound of Monero carregado (Binance)');
        console.log('📊 Clique em "Iniciar" para sonificar o mercado XMRUSDT perpétuo.');
    </script>
</body>
</html>
