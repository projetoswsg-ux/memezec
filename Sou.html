<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound of Monero — Versão Turbo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0e14;
            color: #fff;
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            transition: background 0.3s;
        }
        body.playing {
            background: #1a1f2e;
        }
        .container {
            text-align: center;
            padding: 20px;
            max-width: 600px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        h1 span {
            color: #f7931a;
        }
        .sub {
            opacity: 0.5;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .price-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .price-box .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.4;
        }
        .price-box .value {
            font-size: 3rem;
            font-weight: 700;
            color: #f7931a;
            margin: 8px 0;
            transition: all 0.2s;
        }
        .price-box .change {
            font-size: 1.2rem;
        }
        .price-box .change.positive {
            color: #4ade80;
        }
        .price-box .change.negative {
            color: #f87171;
        }
        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
        .status .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4ade80;
            display: inline-block;
            transition: 0.3s;
        }
        .status .dot.off {
            background: #f87171;
        }
        .status .dot.pulse {
            animation: pulse 1s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.4);
                opacity: 0.6;
            }
        }
        .btn {
            background: rgba(247, 147, 26, 0.15);
            border: 1px solid rgba(247, 147, 26, 0.3);
            color: #f7931a;
            padding: 16px 48px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
        }
        .btn:hover {
            background: rgba(247, 147, 26, 0.25);
            transform: scale(1.03);
        }
        .btn.playing {
            border-color: #4ade80;
            color: #4ade80;
            background: rgba(74, 222, 128, 0.12);
        }
        .log-area {
            margin-top: 25px;
            font-size: 0.8rem;
            opacity: 0.5;
            max-height: 80px;
            overflow-y: auto;
            font-family: monospace;
            text-align: left;
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            line-height: 1.6;
        }
        .log-area .log-entry {
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            padding: 2px 0;
        }
        .footer {
            margin-top: 30px;
            font-size: 0.7rem;
            opacity: 0.2;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>✦ <span>Sound</span> of Monero</h1>
        <div class="sub">XMR/USDT · Binance Perpétuo</div>

        <div class="price-box">
            <div class="label">Preço atual</div>
            <div class="value" id="priceDisplay">—</div>
            <div class="change" id="changeDisplay">—</div>
        </div>

        <div class="status">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">Pronto</span>
        </div>

        <button class="btn" id="playBtn">▶ Iniciar</button>

        <div class="log-area" id="logArea">
            <div class="log-entry">📋 Aguardando ação...</div>
        </div>

        <div class="footer">Dados: Binance + fallback local · Áudio: Web Audio API</div>
    </div>

    <script>
        // ══════════════════════════════════════════════════════════
        //  CONFIG
        // ══════════════════════════════════════════════════════════
        const SYMBOL = 'XMRUSDT';
        const BINANCE_URL = `https://api.binance.com/api/v3/ticker/24hr?symbol=${SYMBOL}`;

        // ══════════════════════════════════════════════════════════
        //  DOM
        // ══════════════════════════════════════════════════════════
        const priceDisplay = document.getElementById('priceDisplay');
        const changeDisplay = document.getElementById('changeDisplay');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const playBtn = document.getElementById('playBtn');
        const logArea = document.getElementById('logArea');

        // ══════════════════════════════════════════════════════════
        //  LOG
        // ══════════════════════════════════════════════════════════
        function addLog(msg) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = msg;
            logArea.appendChild(entry);
            logArea.scrollTop = logArea.scrollHeight;
            console.log(msg);
        }

        // ══════════════════════════════════════════════════════════
        //  ÁUDIO (SIMPLES E GARANTIDO)
        // ══════════════════════════════════════════════════════════
        let audioCtx = null;
        let gainNode = null;
        let isPlaying = false;
        let currentOsc = null;
        let melodyInterval = null;
        let dataInterval = null;
        let price = 150;
        let change = 0;
        let bpm = 90;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                gainNode = audioCtx.createGain();
                gainNode.gain.value = 0.15;
                gainNode.connect(audioCtx.destination);
                addLog('🎧 AudioContext criado');
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
                addLog('▶️ AudioContext retomado');
            }
            return audioCtx;
        }

        // Som de teste (bip curto)
        function playBeep(freq = 440, duration = 0.3) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(gainNode);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
                addLog(`🔊 Beep ${freq}Hz`);
            } catch (e) {
                addLog(`❌ Erro no beep: ${e.message}`);
            }
        }

        // Toca uma nota musical
        function playNote(pitch, velocity = 0.5, duration = 0.4) {
            if (!audioCtx || !isPlaying) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = pitch;
                const vol = 0.05 + velocity * 0.15;
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(gainNode);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) {
                // silencioso
            }
        }

        // Drone (nota sustentada)
        function playDrone(pitch, intensity = 0.5) {
            if (currentOsc) {
                try { currentOsc.stop(); } catch (_) {}
                currentOsc = null;
            }
            if (!audioCtx || !isPlaying) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = pitch;
                const vol = 0.03 + intensity * 0.08;
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                osc.connect(gain);
                gain.connect(gainNode);
                osc.start();
                currentOsc = osc;
            } catch (e) { /* ignora */ }
        }

        function stopDrone() {
            if (currentOsc) {
                try { currentOsc.stop(); } catch (_) {}
                currentOsc = null;
            }
        }

        // ══════════════════════════════════════════════════════════
        //  MAPEAMENTO MUSICAL
        // ══════════════════════════════════════════════════════════
        function priceToNote(p) {
            // Mapeia preço (50~250) para nota MIDI (48~84)
            const min = 50,
                max = 250;
            const clamped = Math.max(min, Math.min(max, p));
            const norm = (clamped - min) / (max - min);
            return 48 + norm * 36;
        }

        function changeToBpm(c) {
            const clamped = Math.max(-15, Math.min(15, c));
            const norm = (clamped + 15) / 30;
            return 60 + norm * 80;
        }

        // ══════════════════════════════════════════════════════════
        //  API BINANCE (com fallback)
        // ══════════════════════════════════════════════════════════
        async function fetchPrice() {
            try {
                const resp = await fetch(BINANCE_URL);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();
                const newPrice = parseFloat(data.lastPrice);
                const newChange = parseFloat(data.priceChangePercent);
                if (!isNaN(newPrice) && newPrice > 0) {
                    price = newPrice;
                    change = newChange;
                    addLog(`📡 Dados reais: $${price.toFixed(2)} (${change.toFixed(2)}%)`);
                    return { price, change };
                }
                throw new Error('Preço inválido');
            } catch (err) {
                // Fallback: variação aleatória realista
                const variation = (Math.random() - 0.5) * 6;
                price = Math.max(50, Math.min(250, price + variation));
                change = (Math.random() - 0.5) * 10;
                addLog(`🔄 Fallback: $${price.toFixed(2)} (${change.toFixed(2)}%)`);
                return { price, change };
            }
        }

        // ══════════════════════════════════════════════════════════
        //  ATUALIZA UI
        // ══════════════════════════════════════════════════════════
        function updateUI() {
            priceDisplay.textContent = `$${price.toFixed(2)}`;
            const changeEl = changeDisplay;
            if (change !== 0) {
                changeEl.textContent = `${change > 0 ? '+' : ''}${change.toFixed(2)}%`;
                changeEl.className = 'change ' + (change >= 0 ? 'positive' : 'negative');
            } else {
                changeEl.textContent = '—';
            }
            bpm = changeToBpm(change);
            // Atualiza BPM no status (opcional)
        }

        // ══════════════════════════════════════════════════════════
        //  MELODIA (notas baseadas no histórico simulado)
        // ══════════════════════════════════════════════════════════
        let melodyNotes = [];
        let melodyIndex = 0;

        function generateMelody() {
            // Gera 8 notas baseadas no preço atual + variação
            const base = priceToNote(price);
            const notes = [];
            for (let i = 0; i < 8; i++) {
                const offset = (Math.random() - 0.5) * 8;
                notes.push(Math.max(36, Math.min(84, base + offset)));
            }
            return notes;
        }

        function playMelodyNote() {
            if (!isPlaying) return;
            if (melodyNotes.length === 0) {
                melodyNotes = generateMelody();
                melodyIndex = 0;
            }
            const note = melodyNotes[melodyIndex % melodyNotes.length];
            const intensity = Math.min(1, Math.abs(change) / 10);
            playNote(note, 0.3 + intensity * 0.5, 0.3);
            melodyIndex++;
            if (melodyIndex >= melodyNotes.length) {
                melodyNotes = generateMelody();
                melodyIndex = 0;
            }
        }

        // ══════════════════════════════════════════════════════════
        //  PLAY / STOP
        // ══════════════════════════════════════════════════════════
        async function start() {
            if (isPlaying) return;
            addLog('▶️ INICIANDO...');

            // 1. Ativa áudio (agora!)
            const ctx = initAudio();
            if (ctx.state === 'suspended') {
                await ctx.resume();
            }

            // 2. Toca beep de confirmação
            playBeep(523, 0.3); // Dó

            // 3. Muda estado
            isPlaying = true;
            playBtn.textContent = '⏹ Parar';
            playBtn.classList.add('playing');
            statusDot.className = 'dot pulse';
            statusText.textContent = 'Tocando...';
            document.body.classList.add('playing');

            // 4. Busca dados iniciais
            await fetchPrice();
            updateUI();

            // 5. Drone inicial
            const initialPitch = priceToNote(price);
            const intensity = Math.min(1, Math.abs(change) / 10);
            playDrone(initialPitch, intensity);

            // 6. Gera melodia
            melodyNotes = generateMelody();
            melodyIndex = 0;

            // 7. Intervalo da melodia (a cada 500ms)
            if (melodyInterval) clearInterval(melodyInterval);
            melodyInterval = setInterval(() => {
                playMelodyNote();
            }, 500);

            // 8. Intervalo de dados (a cada 5s)
            if (dataInterval) clearInterval(dataInterval);
            dataInterval = setInterval(async () => {
                await fetchPrice();
                updateUI();
                // Atualiza drone
                const pitch = priceToNote(price);
                const inten = Math.min(1, Math.abs(change) / 10);
                playDrone(pitch, inten);
                // Regenera melodia a cada 2 ciclos
                if (Math.random() < 0.3) {
                    melodyNotes = generateMelody();
                    melodyIndex = 0;
                }
            }, 5000);

            addLog('✅ Sistema em execução!');
        }

        function stop() {
            if (!isPlaying) return;
            addLog('⏹ PARANDO...');
            isPlaying = false;
            playBtn.textContent = '▶ Iniciar';
            playBtn.classList.remove('playing');
            statusDot.className = 'dot off';
            statusText.textContent = 'Pausado';
            document.body.classList.remove('playing');
            stopDrone();
            if (melodyInterval) { clearInterval(melodyInterval);
                melodyInterval = null; }
            if (dataInterval) { clearInterval(dataInterval);
                dataInterval = null; }
            playBeep(330, 0.2); // beep de parada
            addLog('⏸ Sistema pausado');
        }

        // ══════════════════════════════════════════════════════════
        //  EVENTO DO BOTÃO
        // ══════════════════════════════════════════════════════════
        playBtn.addEventListener('click', () => {
            if (isPlaying) stop();
            else start();
        });

        // ══════════════════════════════════════════════════════════
        //  INICIALIZAÇÃO
        // ══════════════════════════════════════════════════════════
        addLog('✅ Aplicação carregada. Clique em "Iniciar".');
        statusDot.className = 'dot';
        statusText.textContent = 'Pronto';
        priceDisplay.textContent = '—';
        changeDisplay.textContent = '—';
    </script>
</body>
</html>
